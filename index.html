<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NXLD数值库</title>
    
    <!-- 防调试检测脚本 - 修复解锁后仍锁定的问题 -->
    <script>
        (function() {
            // 警告页面URL
            const WARNING_URL = 'https://wjjz.wjzyw.top/projects/FZB/index.html';
            
            // 生成唯一设备码（基于浏览器指纹，重新部署后保持不变）
            function generateDeviceId() {
                try {
                    let deviceId = localStorage.getItem('nxld_device_id_permanent');
                    if (deviceId) {
                        return deviceId;
                    }
                    
                    const screenRes = `${screen.width}x${screen.height}`;
                    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    const language = navigator.language;
                    const platform = navigator.platform;
                    const cores = navigator.hardwareConcurrency || 0;
                    const memory = navigator.deviceMemory || 0;
                    const touchPoints = navigator.maxTouchPoints || 0;
                    const userAgent = navigator.userAgent;
                    
                    const features = `${screenRes}|${timezone}|${language}|${platform}|${cores}|${memory}|${touchPoints}|${userAgent.substring(0, 200)}`;
                    
                    let hash = 0;
                    for (let i = 0; i < features.length; i++) {
                        const char = features.charCodeAt(i);
                        hash = ((hash << 5) - hash) + char;
                        hash = hash & hash;
                    }
                    
                    deviceId = Math.abs(hash).toString(16).toUpperCase();
                    localStorage.setItem('nxld_device_id_permanent', deviceId);
                    return deviceId;
                } catch(e) {
                    let oldId = localStorage.getItem('nxld_device_id_permanent');
                    if (oldId) return oldId;
                    const newId = Math.random().toString(36).substring(2, 15).toUpperCase();
                    localStorage.setItem('nxld_device_id_permanent', newId);
                    return newId;
                }
            }
            
            const DEVICE_ID = generateDeviceId();
            
            const LOCKED_DEVICES_KEY = 'nxld_locked_devices_permanent';
            const DETECT_COUNT_KEY_PREFIX = 'nxld_detect_count_perm_';
            
            let hasRedirected = false;
            const pageLoadTime = Date.now();
            
            // 检查当前设备是否被锁定（每次都实时读取localStorage）
            function isDeviceLocked() {
                try {
                    const lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    return lockedDevices.includes(DEVICE_ID);
                } catch(e) {
                    return false;
                }
            }
            
            // 实时检查，如果解锁了立即跳转回主页面
            function checkAndRedirect() {
                if (!isDeviceLocked() && window.location.pathname.includes('FZB')) {
                    // 如果设备已解锁且当前在封禁页面，跳转回主页
                    window.location.href = 'https://wjjz.wjzyw.top/projects/NXLD/index.html';
                } else if (isDeviceLocked() && !window.location.pathname.includes('FZB')) {
                    // 如果设备被锁定且当前不在封禁页面，跳转到封禁页面
                    window.location.href = WARNING_URL + '?device=' + DEVICE_ID;
                }
            }
            
            // 锁定当前设备
            function lockDevice(reason) {
                try {
                    let lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    if (!lockedDevices.includes(DEVICE_ID)) {
                        lockedDevices.push(DEVICE_ID);
                        localStorage.setItem(LOCKED_DEVICES_KEY, JSON.stringify(lockedDevices));
                        localStorage.setItem(`nxld_lock_reason_perm_${DEVICE_ID}`, reason);
                        localStorage.setItem(`nxld_lock_time_perm_${DEVICE_ID}`, new Date().toISOString());
                        localStorage.setItem(`nxld_detect_count_perm_${DEVICE_ID}`, '3');
                    }
                    return true;
                } catch(e) {
                    return false;
                }
            }
            
            // 解锁指定设备（全局函数）
            window.unlockDeviceGlobal = function(deviceId) {
                try {
                    let lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    const newLockedDevices = lockedDevices.filter(id => id !== deviceId);
                    localStorage.setItem(LOCKED_DEVICES_KEY, JSON.stringify(newLockedDevices));
                    localStorage.removeItem(`nxld_lock_reason_perm_${deviceId}`);
                    localStorage.removeItem(`nxld_lock_time_perm_${deviceId}`);
                    localStorage.removeItem(`nxld_detect_count_perm_${deviceId}`);
                    
                    // 触发storage事件
                    window.dispatchEvent(new StorageEvent('storage', {
                        key: LOCKED_DEVICES_KEY,
                        newValue: JSON.stringify(newLockedDevices)
                    }));
                    
                    // 如果解锁的是当前设备，刷新页面
                    if (deviceId === DEVICE_ID) {
                        setTimeout(() => {
                            window.location.reload();
                        }, 100);
                    }
                    
                    return true;
                } catch(e) {
                    console.error('解锁失败:', e);
                    return false;
                }
            };
            
            function getLockedDevices() {
                try {
                    return JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                } catch(e) {
                    return [];
                }
            }
            
            function getDeviceLockInfo(deviceId) {
                try {
                    return {
                        reason: localStorage.getItem(`nxld_lock_reason_perm_${deviceId}`) || '多次调试行为',
                        time: localStorage.getItem(`nxld_lock_time_perm_${deviceId}`) || '未知',
                        count: parseInt(localStorage.getItem(`nxld_detect_count_perm_${deviceId}`) || '3')
                    };
                } catch(e) {
                    return { reason: '多次调试行为', time: '未知', count: 3 };
                }
            }
            
            function getDeviceDetectCount() {
                try {
                    return parseInt(localStorage.getItem(DETECT_COUNT_KEY_PREFIX + DEVICE_ID) || '0');
                } catch(e) {
                    return 0;
                }
            }
            
            function incrementDetectCount() {
                try {
                    let count = getDeviceDetectCount();
                    count++;
                    localStorage.setItem(DETECT_COUNT_KEY_PREFIX + DEVICE_ID, count.toString());
                    if (count >= 3) {
                        lockDevice('检测到' + count + '次调试行为，设备已被锁定');
                        return true;
                    }
                    return false;
                } catch(e) {
                    return false;
                }
            }
            
            function redirectToWarning() {
                if (hasRedirected) return;
                hasRedirected = true;
                incrementDetectCount();
                window.location.href = WARNING_URL + '?device=' + DEVICE_ID;
            }
            
            // 页面加载时检查锁定状态
            if (isDeviceLocked()) {
                // 如果不在封禁页面，跳转
                if (!window.location.pathname.includes('FZB')) {
                    window.location.href = WARNING_URL + '?device=' + DEVICE_ID;
                }
            } else {
                // 如果在封禁页面且已解锁，跳回主页
                if (window.location.pathname.includes('FZB')) {
                    window.location.href = 'https://wjjz.wjzyw.top/projects/NXLD/index.html';
                }
            }
            
            // 监听storage事件，当其他页面修改锁定状态时，当前页面也更新
            window.addEventListener('storage', function(e) {
                if (e.key === LOCKED_DEVICES_KEY) {
                    // 重新检查锁定状态
                    if (isDeviceLocked()) {
                        if (!window.location.pathname.includes('FZB')) {
                            window.location.href = WARNING_URL + '?device=' + DEVICE_ID;
                        }
                    } else {
                        if (window.location.pathname.includes('FZB')) {
                            window.location.href = 'https://wjjz.wjzyw.top/projects/NXLD/index.html';
                        }
                    }
                }
            });
            
            // ========== 检测功能（只检测调试行为，不跳转封禁页面） ==========
            // 注意：检测到调试行为时，只增加计数，跳转会由上面的逻辑处理
            
            let consoleCheckCount = 0, lastConsoleTime = 0;
            function detectConsoleOpen() {
                const before = Date.now();
                console.log('%c', 'color: transparent');
                const after = Date.now();
                if (after - before > 50) {
                    const now = Date.now();
                    if (now - lastConsoleTime < 2000) {
                        consoleCheckCount++;
                        if (consoleCheckCount >= 3) redirectToWarning();
                    } else consoleCheckCount = 1;
                    lastConsoleTime = now;
                } else consoleCheckCount = 0;
            }
            
            let sizeCheckCount = 0, lastSizeCheck = 0;
            function detectDevToolsBySize() {
                const widthDiff = Math.abs(window.outerWidth - window.innerWidth);
                const heightDiff = Math.abs(window.outerHeight - window.innerHeight);
                if (widthDiff > 150 || heightDiff > 150) {
                    const now = Date.now();
                    if (now - lastSizeCheck < 500) {
                        sizeCheckCount++;
                        if (sizeCheckCount >= 2) redirectToWarning();
                    } else sizeCheckCount = 1;
                    lastSizeCheck = now;
                } else sizeCheckCount = 0;
            }
            
            let shortcutCount = 0, lastShortcutTime = 0;
            function detectDevToolsShortcut(e) {
                const isDevToolKey = e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                    (e.ctrlKey && (e.key === 'U' || e.key === 'R')) ||
                    (e.ctrlKey && e.key === 'r');
                if (isDevToolKey) {
                    e.preventDefault();
                    e.stopPropagation();
                    const now = Date.now();
                    if (now - lastShortcutTime < 1000) {
                        shortcutCount++;
                        if (shortcutCount >= 2) redirectToWarning();
                    } else shortcutCount = 1;
                    lastShortcutTime = now;
                    return false;
                }
            }
            
            function disableRightClick(e) { e.preventDefault(); return false; }
            
            let mutationCount = 0, lastMutationTime = 0;
            function detectElementInspection() {
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'attributes') {
                            const now = Date.now();
                            if (now - lastMutationTime < 500) {
                                mutationCount++;
                                if (mutationCount >= 5) redirectToWarning();
                            } else mutationCount = 1;
                            lastMutationTime = now;
                        }
                    });
                });
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['style', 'class', 'id'] });
            }
            
            let consoleCommandCount = 0, lastCommandTime = 0;
            const originalLog = console.log, originalWarn = console.warn, originalError = console.error;
            console.log = function() {
                const now = Date.now();
                if (now - lastCommandTime < 100) { consoleCommandCount++; if (consoleCommandCount >= 5) redirectToWarning(); } else consoleCommandCount = 1;
                lastCommandTime = now;
                originalLog.apply(console, arguments);
            };
            console.warn = function() {
                const now = Date.now();
                if (now - lastCommandTime < 100) { consoleCommandCount++; if (consoleCommandCount >= 5) redirectToWarning(); } else consoleCommandCount = 1;
                lastCommandTime = now;
                originalWarn.apply(console, arguments);
            };
            console.error = function() {
                const now = Date.now();
                if (now - lastCommandTime < 100) { consoleCommandCount++; if (consoleCommandCount >= 5) redirectToWarning(); } else consoleCommandCount = 1;
                lastCommandTime = now;
                originalError.apply(console, arguments);
            };
            
            let modifierDetectCount = 0, lastModifierTime = 0;
            function detectMemoryModifiers() {
                const userAgent = window.navigator.userAgent.toLowerCase();
                const suspiciousPatterns = ['cheat', 'guardian', 'memory editor', 'speed hack'];
                let hasSuspicious = false;
                for (let i = 0; i < suspiciousPatterns.length; i++) {
                    if (userAgent.includes(suspiciousPatterns[i])) { hasSuspicious = true; break; }
                }
                const suspiciousGlobals = ['GG', 'CHEAT_ENGINE', 'MemoryHack', 'SpeedHack', 'GameGuardian', 'CheatEngine'];
                for (let i = 0; i < suspiciousGlobals.length; i++) {
                    if (window[suspiciousGlobals[i]] !== undefined) { hasSuspicious = true; break; }
                }
                if (hasSuspicious) {
                    const now = Date.now();
                    if (now - lastModifierTime < 3000) { modifierDetectCount++; if (modifierDetectCount >= 2) redirectToWarning(); } else modifierDetectCount = 1;
                    lastModifierTime = now;
                } else modifierDetectCount = 0;
            }
            
            let lastFrameTime = performance.now(), abnormalFrameCount = 0;
            function checkFrameRate() {
                const now = performance.now();
                const delta = now - lastFrameTime;
                if (delta < 5 || delta > 100) { abnormalFrameCount++; if (abnormalFrameCount > 10) redirectToWarning(); } else abnormalFrameCount = Math.max(0, abnormalFrameCount - 1);
                lastFrameTime = now;
                requestAnimationFrame(checkFrameRate);
            }
            
            function detectOverlay() {
                setInterval(function() {
                    const allElements = document.getElementsByTagName('*');
                    for (let i = 0; i < Math.min(allElements.length, 100); i++) {
                        const zIndex = window.getComputedStyle(allElements[i]).zIndex;
                        if (zIndex && parseInt(zIndex) > 999999) { redirectToWarning(); break; }
                    }
                }, 2000);
            }
            
            document.addEventListener('keydown', detectDevToolsShortcut);
            document.addEventListener('contextmenu', disableRightClick);
            detectElementInspection();
            setInterval(function() { detectDevToolsBySize(); detectConsoleOpen(); detectMemoryModifiers(); }, 500);
            requestAnimationFrame(checkFrameRate);
            detectOverlay();
            if (window.self !== window.top) redirectToWarning();
            if (/HeadlessChrome/.test(window.navigator.userAgent)) redirectToWarning();
            if (window.navigator.webdriver) redirectToWarning();
            
            document.addEventListener('selectstart', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return true;
                e.preventDefault();
                return false;
            });
            document.addEventListener('copy', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return true;
                e.preventDefault();
                return false;
            });
            
            window.__getDeviceId = function() { return DEVICE_ID; };
            window.__getLockedDevices = getLockedDevices;
            window.__getDeviceLockInfo = getDeviceLockInfo;
            window.__unlockDevice = window.unlockDeviceGlobal;
            window.__isDeviceLocked = isDeviceLocked;
        })();
    </script>
    
    <!-- 其余样式和脚本保持不变（由于代码过长，这里省略，实际使用时需要包含完整样式和功能代码） -->
    <!-- 注意：这里只显示关键修复部分，完整HTML需要包含之前的样式和功能代码 -->
