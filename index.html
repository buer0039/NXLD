            let historyStack = [];

            // 数据缓存
            let pendingSignatures = [];

            // 当前选中的标签页

            // 设置云同步状态
            function setCloudStatus(status, message) {
                cloudText.textContent = message;
                cloudIcon.className = 'fas';
                
                switch(status) {
                    case 'syncing':
                        cloudIcon.classList.add('fa-sync-alt');
                        cloudStatus.classList.add('syncing');
                        break;
                    case 'synced':
                        cloudIcon.classList.add('fa-cloud');
                        cloudStatus.classList.remove('syncing');
                        break;
                    case 'error':
                        cloudIcon.classList.add('fa-exclamation-triangle');
                        cloudStatus.classList.remove('syncing');
                        break;
                    default:
                        cloudIcon.classList.add('fa-cloud');
                        cloudStatus.classList.remove('syncing');
                }
            }

            // 从 Supabase 加载数据
            async function loadFromSupabase() {
                try {
                    setCloudStatus('syncing', '加载数据...');
                    
                    const { data: signatures, error } = await supabase
                        .from('nxld_data')
                        .select('*')
                        .order('submit_time', { ascending: false });
                    
                    if (error) throw error;
                    
                    // 分类数据
                    fixedSignatures = signatures.filter(s => s.type === 'fixed');
                    pendingSignatures = signatures.filter(s => s.status === 'pending' && s.type === 'user');
                    approvedSignatures = signatures.filter(s => s.status === 'approved' && s.type === 'user');
                    
                    const { data: logs, error: logError } = await supabase
                        .from('nxld_data')
                        .select('*')
                        .eq('type', 'log')
                        .order('action_time', { ascending: false })
                        .limit(100);
                    
                    if (!logError && logs) {
                        operationLogs = logs.map(log => ({
                            time: new Date(log.action_time).toLocaleString(),
                            action: log.action,
                            details: log.action_details,
                            status: log.status
                        }));
                    }
                    
                    setCloudStatus('synced', '已同步');
                    return signatures;
                    
                } catch (error) {
                    setCloudStatus('error', '同步失败');
                    showToast('加载云端数据失败');
                    return [];
                }
            }

            // 保存到 Supabase
            async function saveToSupabase(data) {
                try {
                    setCloudStatus('syncing', '保存中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .insert([data]);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '已同步');
                    return true;
                } catch (error) {
                    setCloudStatus('error', '保存失败');
                    return false;
                }
            }

            // 更新数据到 Supabase
            async function updateInSupabase(id, updates) {
                try {
                    setCloudStatus('syncing', '更新中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .update(updates)
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '已同步');
                    return true;
                } catch (error) {
                    setCloudStatus('error', '更新失败');
                    return false;
                }
            }

            // 删除数据（仅超级管理员可用）
            async function deleteFromSupabase(id) {
                if (currentAdminLevel !== 'super') {
                    showToast('只有超级管理员可以删除');
                    return false;
                }
                
                try {
                    setCloudStatus('syncing', '删除中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '已同步');
                    return true;
                } catch (error) {
                    setCloudStatus('error', '删除失败');
                    return false;
                }
            }

            // 添加操作日志
            async function addLog(action, details, status = 'info') {
                const logData = {
                    qq: 'system',
                    content: '系统日志',
                    action: action,
                    action_details: details,
                    status: status,
                    type: 'log',
                    action_time: new Date().toISOString()
                };
                
                await saveToSupabase(logData);
            }

            // 检查重复签名
            function checkDuplicate(content) {
                const fixedDuplicate = fixedSignatures.find(s => s.content === content);
                if (fixedDuplicate) return { duplicate: true, type: 'fixed', qq: fixedDuplicate.qq };
                
                const approvedDuplicate = approvedSignatures.find(s => s.content === content);
                if (approvedDuplicate) return { duplicate: true, type: 'approved', qq: approvedDuplicate.qq };
                
                const pendingDuplicate = pendingSignatures.find(s => s.content === content);
                if (pendingDuplicate) return { duplicate: true, type: 'pending', qq: pendingDuplicate.qq };
                
                return { duplicate: false };
            }

                    .channel('nxld_changes')
                    .on('postgres_changes',

                        async (payload) => {
                            await loadFromSupabase();
                            
                            const currentView = historyStack[historyStack.length - 1];
                            if (currentView === VIEWS.SIGNATURE_PAGE) {
                                showSignaturePage(false);
                            } else if (currentView === VIEWS.ADMIN_PAGE && currentAdminLevel !== 'guest') {
                                showAdminPanel();
                            }
                        }
                    )
                    .subscribe();
            }

                            const platformDisplay = sig.platform === 'qq' ? 'QQ' : '抖音';

            // 绑定管理员事件
            function bindAdminEvents() {
                window.approveSignature = async (id) => {
                    const updates = {
                        status: 'approved',
                        review_time: new Date().toISOString(),
                        reviewed_by: currentAdminLevel
                    };
                    
                    const success = await updateInSupabase(id, updates);
                    
                    if (success) {
                        const sig = pendingSignatures.find(s => s.id === id);
                        await addLog('通过', `${sig.platform === 'qq' ? 'QQ' : '抖音'}:${sig.qq} 的${sig.submit_type === 'signature' ? '签名' : sig.submit_type === 'report' ? '举报' : '反馈'}已通过`, 'approved');
                        showToast('已通过');
                        await loadFromSupabase();
                        showAdminPanel();
                    }
                };
                
                window.rejectSignature = async (id) => {
                    const updates = {
                        status: 'rejected',
                        review_time: new Date().toISOString(),
                        reviewed_by: currentAdminLevel
                    };
                    
                    const success = await updateInSupabase(id, updates);
                    
                    if (success) {
                        const sig = pendingSignatures.find(s => s.id === id);
                        await addLog('拒绝', `${sig.platform === 'qq' ? 'QQ' : '抖音'}:${sig.qq} 的${sig.submit_type === 'signature' ? '签名' : sig.submit_type === 'report' ? '举报' : '反馈'}被拒绝`, 'rejected');
                        showToast('已拒绝');
                        await loadFromSupabase();
                        showAdminPanel();
                    }
                };
                
                window.deleteAnyItem = async (id) => {

            // 签名页面
            async function showSignaturePage(pushToHistory = true) {

            // 提交页面

                        <div class="type-desc">反馈问题</div>
                    </div>
                `;
                
                const platformSelector = document.createElement('div');
                platformSelector.className = 'platform-selector';
                platformSelector.innerHTML = `
                    <div class="platform-option selected" data-platform="qq">
                        <div class="platform-icon"><i class="fab fa-qq"></i></div>
                        <div class="platform-name">QQ</div>
                    </div>
                    <div class="platform-option" data-platform="douyin">
                        <div class="platform-icon"><i class="fab fa-tiktok"></i></div>
                        <div class="platform-name">抖音</div>
                    </div>
                `;
                
                const form = document.createElement('div');
                form.innerHTML = `
                    <div class="form-group">
                        <label class="form-label" id="accountLabel">你的QQ号</label>
                        <input type="text" class="form-input" id="submitAccount" placeholder="请输入账号" maxlength="50">

                    <div class="form-group" id="contentGroup">
                        <label class="form-label" id="contentLabel">签名内容</label>

                        </div>
                        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
                        <div class="image-preview" id="imagePreview"></div>
                    </div>
                    <button class="submit-button" id="doSubmitBtn">提交</button>
                    <div class="submit-info" id="submitInfo"></div>
                `;
                
                container.appendChild(typeSelector);
                container.appendChild(platformSelector);
                container.appendChild(form);
                
                const querySection = document.createElement('div');
                querySection.className = 'query-section';
                querySection.innerHTML = `
                    <div class="query-input-group">
                        <input type="text" class="form-input" id="queryAccount" placeholder="输入账号查询提交状态" style="flex: 1;">
                        <button class="query-button" id="queryBtn">查询</button>
                    </div>
                    <div class="query-result" id="queryResult"></div>
                `;
                
                container.appendChild(querySection);
                
                innerDynamic.appendChild(container);
                
                const typeOptions = document.querySelectorAll('.type-option');
                let currentType = 'signature';
                let uploadedImages = [];
                
                typeOptions.forEach(opt => {
                    opt.addEventListener('click', function() {
                        typeOptions.forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        currentType = this.dataset.type;
                        
                        const contentGroup = document.getElementById('contentGroup');
                        const imageUploadGroup = document.getElementById('imageUploadGroup');
                        const contentLabel = document.getElementById('contentLabel');
                        const accountLabel = document.getElementById('accountLabel');
                        
                        if (currentType === 'signature') {
                            contentGroup.style.display = 'block';
                            imageUploadGroup.style.display = 'none';
                            contentLabel.textContent = '签名内容';
                            accountLabel.textContent = '你的QQ号';
                        } else if (currentType === 'report') {
                            contentGroup.style.display = 'block';
                            imageUploadGroup.style.display = 'block';
                            contentLabel.textContent = '举报说明';
                            accountLabel.textContent = '你的QQ号';
                        } else if (currentType === 'bug') {
                            contentGroup.style.display = 'block';
                            imageUploadGroup.style.display = 'none';
                            contentLabel.textContent = 'Bug描述';
                            accountLabel.textContent = '你的QQ号';
                        }
                    });
                });
                
                const platformOptions = document.querySelectorAll('.platform-option');
                let currentPlatform = 'qq';
                
                platformOptions.forEach(opt => {
                    opt.addEventListener('click', function() {
                        platformOptions.forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        currentPlatform = this.dataset.platform;
                        
                        const accountLabel = document.getElementById('accountLabel');
                        accountLabel.textContent = currentPlatform === 'qq' ? '你的QQ号' : '你的抖音号';
                    });
                });
                
                const imageUploadArea = document.getElementById('imageUploadArea');
                const fileInput = document.getElementById('fileInput');
                const imagePreview = document.getElementById('imagePreview');
                
                imageUploadArea.addEventListener('click', () => {
                    fileInput.click();
                });
                
                fileInput.addEventListener('change', (e) => {
                    const files = Array.from(e.target.files);
                    uploadedImages = [];
                    imagePreview.innerHTML = '';
                    
                    files.slice(0, 9).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            uploadedImages.push(e.target.result);
                            
                            const previewItem = document.createElement('div');
                            previewItem.className = 'preview-item';
                            previewItem.innerHTML = `
                                <img src="${e.target.result}" alt="preview">
                                <div class="remove-image" onclick="this.parentElement.remove()">×</div>

                            imagePreview.appendChild(previewItem);
                        };
                        reader.readAsDataURL(file);
                    });

                document.getElementById('doSubmitBtn').addEventListener('click', async function() {

                    const content = document.getElementById('submitContent').value.trim();
                    const infoDiv = document.getElementById('submitInfo');
                    
                    if (!account) {
                        infoDiv.textContent = `请输入${currentPlatform === 'qq' ? 'QQ号' : '抖音号'}`;

                            infoDiv.style.color = '#ef4444';
                            return;
                        }
                        
                        const duplicate = checkDuplicate(content);
                        if (duplicate.duplicate) {
                            let msg = '';
                            if (duplicate.type === 'fixed') msg = `该签名已存在于固定签名中 (原作者: ${duplicate.qq})`;
                            else if (duplicate.type === 'approved') msg = `该签名已通过审核 (原作者: ${duplicate.qq})`;
                            else if (duplicate.type === 'pending') msg = `该签名正在审核中 (提交者: ${duplicate.qq})`;
                            
                            infoDiv.textContent = msg;
                            infoDiv.style.color = '#f59e0b';
                            return;
                        }
                    }
                    
                    if (currentType === 'report' && !content) {
                        infoDiv.textContent = '请输入举报说明';
                        infoDiv.style.color = '#ef4444';
                        return;
                    }
                    
                    if (currentType === 'bug' && !content) {
                        infoDiv.textContent = '请输入Bug描述';
                        infoDiv.style.color = '#ef4444';
                        return;
                    }
                    
                    const newSubmission = {
                        qq: account,
                        content: content || '无内容',
                        platform: currentPlatform,
                        status: 'pending',
                        type: 'user',
                        submit_type: currentType,
                        images: uploadedImages,
                        submit_time: new Date().toISOString(),
                        last_update: new Date().toISOString()
                    };
                    
                    const success = await saveToSupabase(newSubmission);
                    
                    if (success) {
                        await addLog('提交', `${currentPlatform === 'qq' ? 'QQ' : '抖音'}:${account} 提交了${currentType === 'signature' ? '签名' : currentType === 'report' ? '举报' : 'Bug反馈'}`, 'info');
                        
                        let successMsg = '';
                        if (currentType === 'signature') successMsg = '签名提交成功！管理员审核后将显示';
                        else if (currentType === 'report') successMsg = '举报提交成功！管理员将尽快处理';
                        else if (currentType === 'bug') successMsg = 'Bug反馈提交成功！感谢您的反馈';
                        
                        infoDiv.textContent = successMsg;
                        infoDiv.style.color = '#10b981';
                        
                        document.getElementById('submitAccount').value = '';
                        document.getElementById('submitContent').value = '';
                        uploadedImages = [];
                        imagePreview.innerHTML = '';
                        
                        await loadFromSupabase();
                    } else {
                        infoDiv.textContent = '提交失败，请稍后重试';
                        infoDiv.style.color = '#ef4444';
                    }
                });
                
                document.getElementById('queryBtn').addEventListener('click', function() {
                    const account = document.getElementById('queryAccount').value.trim();
                    const resultDiv = document.getElementById('queryResult');
                    
                    if (!account) {
                        resultDiv.innerHTML = '<div style="color: #ef4444; padding: 1rem; text-align: center;">请输入账号</div>';
                        return;
                    }
                    
                    const userSubmissions = [...pendingSignatures, ...approvedSignatures].filter(s => s.qq === account);
                    
                    let html = '';
                    
                    if (userSubmissions.length > 0) {
                        userSubmissions.forEach(s => {
                            const typeText = s.submit_type === 'signature' ? '签名投稿' : s.submit_type === 'report' ? '倒卖举报' : 'Bug反馈';
                            const platformText = s.platform === 'qq' ? 'QQ' : '抖音';
                            
                            html += `
                                <div class="query-item">
                                    <div class="query-item-info">
                                        <div>${typeText} - ${platformText}:${s.qq}</div>
                                        <div class="query-item-qq">提交时间: ${new Date(s.submit_time).toLocaleString()}</div>
                                        ${s.submit_type === 'signature' ? `<div style="font-size:0.7rem; color:#9ca3af; margin-top:0.2rem;">${s.content.substring(0,50)}${s.content.length>50?'...':''}</div>` : ''}
                                    </div>
                                    <span class="query-item-status ${s.status === 'pending' ? 'pending' : ''}">${s.status === 'pending' ? '待审核' : '已通过'}</span>
                                </div>
                            `;
                        });
                    } else {
                        html = '<div style="color: #9ca3af; padding: 1rem; text-align: center;">没有找到提交记录</div>';
                    }
                    
                    resultDiv.innerHTML = html;
                });
                
                refreshBackButton();
            }

            // 辅助函数：转换内容为HTML显示
            function convertToHtml(content) {
                if (!content) return '';
                
                let html = content
                    .replace(/<color=#([A-Fa-f0-9]{6})>/g, '<span style="color: #$1;">')
                    .replace(/<color=#([A-Fa-f0-9]{3})>/g, '<span style="color: #$1;">')
                    .replace(/<size=(\d+)>/g, function(match, size) {
                        const remSize = parseInt(size) / 16;
                        return `<span style="font-size: ${remSize}rem;">`;
                    })
                    .replace(/<\/color>/g, '</span>')
                    .replace(/<\/size>/g, '</span>')
                    .replace(/<b>/g, '<b>').replace(/<\/b>/g, '</b>')
                    .replace(/<i>/g, '<i>').replace(/<\/i>/g, '</i>')
                    .replace(/<u>/g, '<u>').replace(/<\/u>/g, '</u>');
                
                return html;
            }

            function resetAll() {
                innerDynamic.innerHTML = '';
                backContainer.innerHTML = '';
            }
            
            function copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('复制成功');
                }).catch(err => {
                    alert('复制失败，请手动复制');
                });
            }
            
            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
                toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            }

            function createBackButton() {
                const backBtn = document.createElement('div');
                backBtn.className = 'back-btn-modern';
                backBtn.innerHTML = '<i class="fas fa-arrow-left"></i> 返回';
                backBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    historyStack.pop();
                    
                    if (historyStack.length === 0) {
                        showSupernaturalInitial(false);
                        return;
                    }
                    
                    const prevView = historyStack[historyStack.length - 1];
                    
                    switch(prevView) {
                        case VIEWS.SUPERNATURAL_INITIAL:
                            showSupernaturalInitial(false);
                            break;
                        case VIEWS.SIGNATURE_PAGE:
                            showSignaturePage(false);
                            break;
                        case VIEWS.SUBMIT_SIGNATURE:
                            showSubmitSignature(false);
                            break;
                        case VIEWS.ADMIN_PAGE:
                            showAdminPage(false);
                            break;
                        default:
                            showSupernaturalInitial(false);
                    }
                    
                    searchInput.value = '';
                    setTimeout(() => {
                        const contentArea = document.querySelector('.content-area');
                        if (contentArea) contentArea.scrollTop = 0;
                    }, 10);
                });
                return backBtn;
            }
            
            function refreshBackButton() {
                backContainer.innerHTML = '';
                if (historyStack.length >= 2) {
                    const backBtn = createBackButton();
                    backContainer.appendChild(backBtn);
                }
            }

            function performGlobalSearch() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const allCurrentCards = document.querySelectorAll('#innerDynamic .menu-card, #innerDynamic .category-card, #innerDynamic .item-card, #innerDynamic .signature-card, #innerDynamic .value-card-modern');
                
                if (searchTerm === '') {
                    allCurrentCards.forEach(card => {
                        if (card) {
                            card.style.display = '';
                            card.classList.remove('search-highlight');
                        }
                    });
                    const existingTip = document.getElementById('searchNoResultTip');
                    if (existingTip) existingTip.remove();
                    return;
                }
                
                let hasMatch = false;
                
                allCurrentCards.forEach(card => {
                    if (!card) return;
                    const cardText = card.textContent ? card.textContent.toLowerCase() : '';
                    if (cardText.includes(searchTerm)) {
                        card.style.display = '';
                        card.classList.add('search-highlight');
                        hasMatch = true;
                    } else {
                        card.style.display = 'none';
                        card.classList.remove('search-highlight');
                    }
                });
                
                const existingTip = document.getElementById('searchNoResultTip');
                if (existingTip) existingTip.remove();
                
                if (!hasMatch && allCurrentCards.length > 0) {
                    const tip = document.createElement('div');
                    tip.id = 'searchNoResultTip';
                    tip.style.cssText = `
                        text-align: center;
                        color: #9ca3af;
                        padding: 2rem;
                        font-size: 1rem;
                        background: rgba(30,20,50,0.3);
                        border-radius: 2rem;
                        margin-top: 1rem;
                        line-height: 1.6;
                    `;
                    tip.innerHTML = `🔍 未找到"${searchInput.value}"`;
                    innerDynamic.appendChild(tip);
                }
                
                const contentArea = document.querySelector('.content-area');
                if (contentArea) contentArea.scrollTop = 0;
            }

            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(performGlobalSearch, 50);
            });

                });
                
                const skinCard = document.createElement('div');

                skinCard.innerHTML = `

                });
                
                const signatureCard = document.createElement('div');
                signatureCard.className = 'menu-card signature';
                signatureCard.setAttribute('data-name', '主页签名');
                signatureCard.innerHTML = `
                    <div class="menu-icon"><i class="fas fa-signature"></i></div>

                    <small>点击查看</small>
                `;
                signatureCard.addEventListener('click', (e) => {

                menuGrid.appendChild(modeCard);
                menuGrid.appendChild(itemCard);
                menuGrid.appendChild(skinCard);
                menuGrid.appendChild(signatureCard);
                
                innerDynamic.appendChild(menuGrid);
                
                refreshBackButton();
                setTimeout(performGlobalSearch, 10);
            }

            const VIEWS = {
                SUPERNATURAL_INITIAL: 'supernaturalInitial',
                SIGNATURE_PAGE: 'signaturePage',
                SUBMIT_SIGNATURE: 'submitSignature',
                ADMIN_PAGE: 'adminPage'
            };

            supernaturalBtn.addEventListener('click', function() {
                if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== VIEWS.SUPERNATURAL_INITIAL) {
                    historyStack = [];
                    showSupernaturalInitial();
                    searchInput.value = '';

            });

            agreementBtn.addEventListener('click', function() {
                agreementModal.classList.add('show');

            agreementModal.addEventListener('click', function(e) {

            thanksBtn.addEventListener('click', function() {
                thanksModal.classList.add('show');
            });

            closeThanks.addEventListener('click', function() {
                thanksModal.classList.remove('show');
            });

            thanksModal.addEventListener('click', function(e) {
                if (e.target === thanksModal) {
                    thanksModal.classList.remove('show');
                }
            });

            submitSignatureBtn.addEventListener('click', function() {
                showSubmitSignature();
                searchInput.value = '';
            });

            adminBtn.addEventListener('click', function() {
                currentAdminLevel = 'guest';
                showAdminPage();
                searchInput.value = '';
            });

            window.addEventListener('load', async function() {
                setCloudStatus('syncing', '连接数据库...');
                await loadFromSupabase();
                setupRealtime();
                showSupernaturalInitial();
            });
        })();
