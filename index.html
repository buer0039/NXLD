<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NXLD数值库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 样式保持不变，与之前相同 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0f1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .modern-container {
            position: relative;
            z-index: 10;
            max-width: 1600px;
            width: 100%;
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            padding: 2.5rem;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .logo-text .sub {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            width: 300px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 1rem;
            pointer-events: none;
        }

        .search-box-modern {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f0f2ff;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .search-box-modern:focus {
            outline: none;
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .search-box-modern::placeholder {
            color: #6b7280;
            font-weight: 300;
        }

        .agreement-btn, .submit-signature-btn, .admin-btn, .thanks-btn, .year-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .submit-signature-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .admin-btn i {
            color: #f59e0b;
        }

        .thanks-btn i {
            color: #fbbf24;
        }

        .agreement-btn:hover, .admin-btn:hover, .thanks-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .submit-signature-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        .year-badge {
            cursor: default;
        }

        .year-badge i {
            color: #818cf8;
        }

        .cloud-status {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            color: #9ca3af;
        }

        .cloud-status.connected {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .cloud-status.disconnected {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .faction-switch {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            width: fit-content;
        }

        .faction-btn {
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #9ca3af;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .faction-btn.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        .content-area {
            background: rgba(10, 12, 26, 0.4);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            min-height: 500px;
            max-height: 800px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4b5563 #1f2937;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }

        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }

        .status-badge {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn-modern {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d5db;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn-modern:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-3px);
        }

        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateY(-4px);
        }

        .menu-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
        }

        .menu-card.skin .menu-icon {
            background: linear-gradient(135deg, #b453b6, #d946ef);
        }

        .menu-card.signature .menu-icon {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .signature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .signature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 1.2rem;
            padding: 1rem 0.8rem 0.4rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .signature-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 182, 193, 0.6);
        }

        .signature-text {
            font-size: 0.8rem;
            line-height: 1.4;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .signature-platform {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.6rem;
            padding: 0.15rem 0.3rem;
            border-radius: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            width: fit-content;
            margin: 0.1rem auto 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .copy-hint {
            margin-top: 0.2rem;
            font-size: 0.5rem;
            color: #9ca3af;
            opacity: 0.4;
        }

        .signature-card:hover .copy-hint {
            opacity: 0.7;
        }

        .submit-form {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(129, 140, 248, 0.2);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: #d1d5db;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-select, .form-input {
            width: 100%;
            padding: 1rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f2ff;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-select option {
            background: #1f2937;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-button, .query-button {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 2rem;
            padding: 1rem 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .submit-button:hover, .query-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        .submit-button:disabled, .query-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .submit-info {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.5rem;
            background: rgba(129, 140, 248, 0.05);
            border-radius: 1rem;
        }

        .query-section {
            margin-top: 2rem;
        }

        .query-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .query-result {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 1.5rem;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .query-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .query-item:last-child {
            border-bottom: none;
        }

        .query-item-info {
            flex: 1;
        }

        .query-item-qq {
            color: #818cf8;
            font-size: 0.8rem;
        }

        .query-item-status {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .query-item-status.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .query-item-status.bug {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .log-container {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 2rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-item {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }

        .log-time {
            color: #818cf8;
            font-size: 0.7rem;
            margin-right: 0.5rem;
        }

        .log-content.approved { color: #10b981; }
        .log-content.rejected { color: #ef4444; }
        .log-content.deleted { color: #ef4444; }
        .log-content.bug { color: #ef4444; }

        .top-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            padding: 0.5rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            background: rgba(129, 140, 248, 0.05);
            border-radius: 2rem;
        }

        .search-highlight {
            background: rgba(129, 140, 248, 0.25) !important;
            border-color: #818cf8 !important;
            transform: scale(1.02);
        }

        .agreement-modal, .thanks-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .agreement-modal.show, .thanks-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .agreement-content, .thanks-content {
            background: rgba(18, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(129, 140, 248, 0.3);
            border-radius: 2.5rem;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px #000;
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .agreement-modal.show .agreement-content,
        .thanks-modal.show .thanks-content {
            transform: translateY(0);
        }

        .agreement-header, .thanks-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .agreement-header i { color: #818cf8; }
        .thanks-header i { color: #fbbf24; }

        .agreement-body, .thanks-body {
            color: #d1d5db;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            padding: 1rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .agreement-close, .thanks-close {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .thanks-close {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .copyright-modern {
            position: fixed;
            bottom: 15px;
            right: 20px;
            color: rgba(156, 163, 175, 0.4);
            font-size: 0.8rem;
            z-index: 100;
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .copy-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            z-index: 1000;
            animation: fadeInOut 1.5s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }

        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body { padding: 0.8rem; }
            .modern-container { padding: 1.2rem; border-radius: 2rem; }
            .header { flex-direction: column; align-items: flex-start; }
            .search-wrapper { width: 100%; }
            .header-actions { width: 100%; flex-wrap: wrap; }
            .signature-grid { grid-template-columns: repeat(2, 1fr); }
            .query-input-group { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .signature-grid { grid-template-columns: 1fr; }
            .faction-btn { padding: 0.6rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="modern-container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-cube"></i>
                </div>
                <div class="logo-text">
                    <h1>NXLD数值库</h1>
                    <div class="sub">NXLD制作</div>
                </div>
            </div>
            <div class="header-actions">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-box-modern" id="searchInput" placeholder="搜索所有按钮...">
                </div>
                <div class="submit-signature-btn" id="submitSignatureBtn">
                    <i class="fas fa-pen"></i> 提交反馈
                </div>
                <div class="agreement-btn" id="agreementBtn">
                    <i class="fas fa-scale-balanced"></i> 知情协议
                </div>
                <div class="admin-btn" id="adminBtn">
                    <i class="fas fa-crown"></i> 管理
                </div>
                <div class="thanks-btn" id="thanksBtn">
                    <i class="fas fa-heart"></i> 致谢名单
                </div>
                <div class="year-badge">
                    <i class="far fa-copyright"></i> 2026 NXLD
                </div>
            </div>
        </div>

        <div class="faction-switch">
            <button class="faction-btn active" id="supernaturalBtn">
                <i class="fas fa-hand-sparkles"></i> 超自然行动组
            </button>
        </div>

        <div class="content-area" id="dynamicContent">
            <div class="status-header">
                <div class="status-badge">
                    <i class="fas fa-circle" style="font-size: 0.5rem;"></i>
                    <span id="statusTag">NXLD数值库</span>
                </div>
                <div id="backButtonContainer"></div>
            </div>
            <div id="innerDynamic" style="min-height: 300px;"></div>
        </div>
    </div>

    <div class="cloud-status" id="cloudStatus">
        <i class="fas fa-circle"></i> <span>云端连接中...</span>
    </div>

    <div class="copyright-modern">NXLD</div>
    <div id="toastContainer"></div>

    <div class="agreement-modal" id="agreementModal">
        <div class="agreement-content">
            <div class="agreement-header">
                <i class="fas fa-scale-balanced"></i>
                <h3>知情协议</h3>
            </div>
            <div class="agreement-body">
                <p>本网站全部资源均已经过原作者授权。</p>
                <p>本网站及其内容未经原作者许可严禁倒卖或二次魔改。</p>
                <p style="margin-top: 1rem; color: #818cf8;">署名：NXLD</p>
            </div>
            <div class="agreement-footer">
                <button class="agreement-close" id="closeAgreement">已知晓</button>
            </div>
        </div>
    </div>

    <div class="thanks-modal" id="thanksModal">
        <div class="thanks-content">
            <div class="thanks-header">
                <i class="fas fa-heart"></i>
                <h3>致谢名单</h3>
            </div>
            <div class="thanks-body">
                <p>感谢小猫原创、TwT、蜜雪小橙、</p>
                <p>小夕、祁厌、Jocelyn提供的个签代码</p>
            </div>
            <div class="thanks-footer">
                <button class="thanks-close" id="closeThanks">关闭</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://ssevtpugvqvhtusjqpcg.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_kCaFQB5lhmOSkLtdSSuE_w_DRQo9Vdj';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: { persistSession: false }
            });

            // DOM 元素
            const supernaturalBtn = document.getElementById('supernaturalBtn');
            const innerDynamic = document.getElementById('innerDynamic');
            const backContainer = document.getElementById('backButtonContainer');
            const statusTag = document.getElementById('statusTag');
            const searchInput = document.getElementById('searchInput');
            const toastContainer = document.getElementById('toastContainer');
            const agreementBtn = document.getElementById('agreementBtn');
            const agreementModal = document.getElementById('agreementModal');
            const closeAgreement = document.getElementById('closeAgreement');
            const thanksBtn = document.getElementById('thanksBtn');
            const thanksModal = document.getElementById('thanksModal');
            const closeThanks = document.getElementById('closeThanks');
            const submitSignatureBtn = document.getElementById('submitSignatureBtn');
            const adminBtn = document.getElementById('adminBtn');
            const cloudStatus = document.getElementById('cloudStatus');

            // 状态变量
            let historyStack = [];
            let currentAdminLevel = 'guest';
            let isCloudConnected = false;
            let cloudCheckInterval = null;

            // 数据存储
            let pendingSignatures = [];
            let bugReports = [];
            let approvedSignatures = [];
            let operationLogs = [];

            const VIEWS = {
                SUPERNATURAL_INITIAL: 'supernaturalInitial',
                SIGNATURE_PAGE: 'signaturePage',
                SUBMIT_FEEDBACK: 'submitFeedback',
                ADMIN_PAGE: 'adminPage'
            };

            // 工具函数
            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
                toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            }

            function updateCloudStatus(connected, message) {
                isCloudConnected = connected;
                cloudStatus.className = 'cloud-status ' + (connected ? 'connected' : 'disconnected');
                cloudStatus.innerHTML = connected 
                    ? '<i class="fas fa-cloud"></i> 云端已连接'
                    : '<i class="fas fa-cloud-rain"></i> 云端连接失败';
                if (message) showToast(message);
            }

            async function checkCloudConnection() {
                try {
                    const { error } = await supabase.from('_test').select('*').limit(1);
                    updateCloudStatus(!error);
                } catch {
                    updateCloudStatus(false);
                }
            }

            function startCloudCheck() {
                checkCloudConnection();
                cloudCheckInterval = setInterval(checkCloudConnection, 30000);
            }

            // 数据加载函数
            async function loadFromCloud() {
                try {
                    const [pendingRes, bugRes, approvedRes, logsRes] = await Promise.all([
                        supabase.from('pending_signatures').select('*').order('created_at', { ascending: false }),
                        supabase.from('bug_reports').select('*').order('created_at', { ascending: false }),
                        supabase.from('approved_signatures').select('*').order('created_at', { ascending: false }),
                        supabase.from('operation_logs').select('*').order('created_at', { ascending: false }).limit(100)
                    ]);

                    if (!pendingRes.error) pendingSignatures = pendingRes.data || [];
                    if (!bugRes.error) bugReports = bugRes.data || [];
                    if (!approvedRes.error) approvedSignatures = approvedRes.data || [];
                    if (!logsRes.error) operationLogs = logsRes.data || [];

                    return true;
                } catch (err) {
                    console.error('加载失败:', err);
                    return false;
                }
            }

            // 数据保存函数 - 简化版
            async function saveToTable(tableName, data) {
                try {
                    // 先清空表
                    await supabase.from(tableName).delete().neq('id', '');
                    
                    // 再插入新数据
                    if (data.length > 0) {
                        const { error } = await supabase.from(tableName).insert(data);
                        if (error) throw error;
                    }
                    return true;
                } catch (err) {
                    console.error(`保存到${tableName}失败:`, err);
                    return false;
                }
            }

            async function savePendingSignatures() {
                return saveToTable('pending_signatures', pendingSignatures);
            }

            async function saveBugReports() {
                return saveToTable('bug_reports', bugReports);
            }

            async function saveApprovedSignatures() {
                return saveToTable('approved_signatures', approvedSignatures);
            }

            async function addLog(action, details, status = 'info') {
                const log = {
                    time: new Date().toLocaleString('zh-CN'),
                    action,
                    details,
                    status
                };
                operationLogs.unshift(log);
                if (operationLogs.length > 100) operationLogs = operationLogs.slice(0, 100);
                return saveToTable('operation_logs', operationLogs);
            }

            function convertToHtml(content) {
                if (!content) return '';
                return content
                    .replace(/<color=#([A-Fa-f0-9]{6})>/g, '<span style="color: #$1;">')
                    .replace(/<\/color>/g, '</span>')
                    .replace(/<size=(\d+)>/g, '<span style="font-size: $1px;">')
                    .replace(/<\/size>/g, '</span>')
                    .replace(/<b>/g, '<b>').replace(/<\/b>/g, '</b>')
                    .replace(/<i>/g, '<i>').replace(/<\/i>/g, '</i>')
                    .replace(/<u>/g, '<u>').replace(/<\/u>/g, '</u>');
            }

            function resetAll() {
                innerDynamic.innerHTML = '';
                backContainer.innerHTML = '';
            }

            function refreshBackButton() {
                backContainer.innerHTML = '';
                if (historyStack.length >= 2) {
                    const backBtn = document.createElement('div');
                    backBtn.className = 'back-btn-modern';
                    backBtn.innerHTML = '<i class="fas fa-arrow-left"></i> 返回上一级';
                    backBtn.addEventListener('click', () => {
                        historyStack.pop();
                        const prevView = historyStack[historyStack.length - 1];
                        if (prevView === VIEWS.SUPERNATURAL_INITIAL) showSupernaturalInitial(false);
                        else if (prevView === VIEWS.SIGNATURE_PAGE) showSignaturePage(false);
                        else if (prevView === VIEWS.SUBMIT_FEEDBACK) showSubmitFeedback(false);
                        else if (prevView === VIEWS.ADMIN_PAGE) showAdminPage(false);
                        else showSupernaturalInitial(false);
                        searchInput.value = '';
                    });
                    backContainer.appendChild(backBtn);
                }
            }

            // 页面显示函数
            function showSupernaturalInitial(pushToHistory = true) {
                resetAll();
                if (pushToHistory) historyStack.push(VIEWS.SUPERNATURAL_INITIAL);
                statusTag.textContent = 'NXLD数值库';

                const menuGrid = document.createElement('div');
                menuGrid.className = 'main-menu-grid';
                
                const pages = [
                    { name: '模式数值', icon: 'fa-layer-group', class: '', action: () => showToast('开发中') },
                    { name: '局内物品', icon: 'fa-box', class: '', action: () => showToast('开发中') },
                    { name: '皮肤数值', icon: 'fa-palette', class: 'skin', action: () => showToast('开发中') },
                    { name: '主页签名', icon: 'fa-signature', class: 'signature', action: () => showSignaturePage() }
                ];

                pages.forEach(page => {
                    const card = document.createElement('div');
                    card.className = `menu-card ${page.class}`;
                    card.innerHTML = `
                        <div class="menu-icon"><i class="fas ${page.icon}"></i></div>
                        <span>${page.name}</span>
                        <small>${page.name === '主页签名' ? '签名展示' : '功能开发中'}</small>
                    `;
                    card.addEventListener('click', page.action);
                    menuGrid.appendChild(card);
                });

                innerDynamic.appendChild(menuGrid);
                refreshBackButton();
            }

            function showSignaturePage(pushToHistory = true) {
                resetAll();
                if (pushToHistory) historyStack.push(VIEWS.SIGNATURE_PAGE);
                statusTag.textContent = `签名合集 · 共${approvedSignatures.length}个`;

                const container = document.createElement('div');
                const topHint = document.createElement('div');
                topHint.className = 'top-hint';
                topHint.innerHTML = '<i class="fas fa-info-circle"></i> 点击卡片可复制原内容';
                container.appendChild(topHint);

                const grid = document.createElement('div');
                grid.className = 'signature-grid';

                approvedSignatures.forEach(sig => {
                    const card = document.createElement('div');
                    card.className = 'signature-card';
                    
                    const textDiv = document.createElement('div');
                    textDiv.className = 'signature-text';
                    textDiv.innerHTML = sig.html || convertToHtml(sig.content);
                    
                    const platformDiv = document.createElement('div');
                    platformDiv.className = 'signature-platform';
                    platformDiv.textContent = sig.platform === 'douyin' ? `dy:${sig.account}` : `QQ:${sig.account}`;
                    
                    const hintDiv = document.createElement('div');
                    hintDiv.className = 'copy-hint';
                    hintDiv.innerHTML = '<i class="fas fa-copy"></i> 点击复制';
                    
                    card.appendChild(textDiv);
                    card.appendChild(platformDiv);
                    card.appendChild(hintDiv);
                    
                    card.addEventListener('click', () => {
                        navigator.clipboard.writeText(sig.content)
                            .then(() => showToast('复制成功'))
                            .catch(() => alert('复制失败'));
                    });
                    
                    grid.appendChild(card);
                });

                container.appendChild(grid);
                innerDynamic.appendChild(container);
                refreshBackButton();
            }

            function showSubmitFeedback(pushToHistory = true) {
                resetAll();
                if (pushToHistory) historyStack.push(VIEWS.SUBMIT_FEEDBACK);
                statusTag.textContent = '提交反馈';

                const container = document.createElement('div');
                container.className = 'submit-form';
                container.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">反馈类型</label>
                        <select class="form-select" id="feedbackType">
                            <option value="signature">签名投稿</option>
                            <option value="bug">Bug反馈</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">你的账号</label>
                        <input type="text" class="form-input" id="submitAccount" placeholder="请输入QQ号或抖音号">
                    </div>
                    <div class="form-group" id="platformGroup">
                        <label class="form-label">平台选择</label>
                        <select class="form-select" id="platformType">
                            <option value="qq">QQ</option>
                            <option value="douyin">抖音</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" id="contentLabel">签名内容</label>
                        <textarea class="form-input form-textarea" id="submitContent" placeholder="请输入内容..."></textarea>
                    </div>
                    <button class="submit-button" id="doSubmitBtn">提交</button>
                    <div class="submit-info" id="submitInfo"></div>
                `;

                innerDynamic.appendChild(container);

                const feedbackType = document.getElementById('feedbackType');
                const platformGroup = document.getElementById('platformGroup');
                const contentLabel = document.getElementById('contentLabel');
                const submitContent = document.getElementById('submitContent');

                feedbackType.addEventListener('change', function() {
                    if (this.value === 'bug') {
                        platformGroup.style.display = 'none';
                        contentLabel.textContent = 'Bug描述';
                        submitContent.placeholder = '请详细描述你遇到的Bug...';
                    } else {
                        platformGroup.style.display = 'block';
                        contentLabel.textContent = '签名内容';
                        submitContent.placeholder = '请输入签名内容，支持HTML标签...';
                    }
                });

                document.getElementById('doSubmitBtn').addEventListener('click', async function() {
                    const btn = this;
                    const type = feedbackType.value;
                    const account = document.getElementById('submitAccount').value.trim();
                    const content = submitContent.value.trim();
                    const infoDiv = document.getElementById('submitInfo');

                    if (!account || !content) {
                        infoDiv.textContent = '请填写完整信息';
                        infoDiv.style.color = '#ef4444';
                        return;
                    }

                    btn.disabled = true;
                    btn.innerHTML = '<span class="loading-spinner"></span> 提交中...';

                    try {
                        if (type === 'signature') {
                            const platform = document.getElementById('platformType').value;
                            const newSig = {
                                account,
                                platform,
                                content,
                                html: convertToHtml(content),
                                timestamp: new Date().toLocaleString('zh-CN')
                            };
                            pendingSignatures.push(newSig);
                            const saved = await savePendingSignatures();
                            
                            if (saved) {
                                await addLog('提交签名', `${platform}:${account}`, 'info');
                                infoDiv.textContent = '提交成功！请等待审核';
                                infoDiv.style.color = '#10b981';
                                document.getElementById('submitAccount').value = '';
                                submitContent.value = '';
                            } else {
                                infoDiv.textContent = '提交失败，请重试';
                                infoDiv.style.color = '#ef4444';
                            }
                        } else {
                            const newBug = {
                                account,
                                content,
                                timestamp: new Date().toLocaleString('zh-CN'),
                                status: 'pending'
                            };
                            bugReports.push(newBug);
                            const saved = await saveBugReports();
                            
                            if (saved) {
                                await addLog('Bug反馈', account, 'bug');
                                infoDiv.textContent = 'Bug反馈已提交，感谢支持';
                                infoDiv.style.color = '#10b981';
                                document.getElementById('submitAccount').value = '';
                                submitContent.value = '';
                            } else {
                                infoDiv.textContent = '提交失败，请重试';
                                infoDiv.style.color = '#ef4444';
                            }
                        }
                    } catch (err) {
                        infoDiv.textContent = '提交失败，请重试';
                        infoDiv.style.color = '#ef4444';
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = '提交';
                    }
                });

                refreshBackButton();
            }

            function showAdminPage(pushToHistory = true) {
                resetAll();
                if (pushToHistory) historyStack.push(VIEWS.ADMIN_PAGE);
                statusTag.textContent = '管理员面板';

                const container = document.createElement('div');

                if (currentAdminLevel !== 'guest') {
                    renderAdminPanel();
                } else {
                    container.innerHTML = `
                        <div class="submit-form">
                            <div class="form-group">
                                <label class="form-label">管理员密码</label>
                                <input type="password" class="form-input" id="adminPassword" placeholder="请输入密码">
                            </div>
                            <button class="submit-button" id="adminLoginBtn">登录</button>
                            <div class="submit-info" id="adminLoginInfo"></div>
                        </div>
                    `;
                    innerDynamic.appendChild(container);

                    document.getElementById('adminLoginBtn').addEventListener('click', function() {
                        const pwd = document.getElementById('adminPassword').value;
                        if (pwd === 'NXLD_RX' || pwd === 'NXLD_MZRW') {
                            currentAdminLevel = pwd === 'NXLD_MZRW' ? 'super' : 'admin';
                            renderAdminPanel();
                        } else {
                            document.getElementById('adminLoginInfo').textContent = '密码错误';
                            document.getElementById('adminLoginInfo').style.color = '#ef4444';
                        }
                    });
                }

                function renderAdminPanel() {
                    container.innerHTML = '';

                    // Bug反馈区域
                    if (bugReports.length > 0) {
                        const bugSection = document.createElement('div');
                        bugSection.className = 'submit-form';
                        bugSection.style.marginBottom = '2rem';
                        bugSection.innerHTML = '<h3 style="color:#ef4444; margin-bottom:1rem;">Bug反馈</h3>';
                        
                        bugReports.forEach((bug, i) => {
                            const div = document.createElement('div');
                            div.style.cssText = 'background:rgba(255,255,255,0.03); border-radius:1rem; padding:1rem; margin-bottom:1rem;';
                            div.innerHTML = `
                                <div><span style="color:#818cf8;">账号:</span> ${bug.account}</div>
                                <div style="margin:0.5rem 0; color:#f0f2ff;">${bug.content}</div>
                                <div style="color:#9ca3af; font-size:0.8rem;">${bug.timestamp}</div>
                                <button class="query-button" style="background:#10b981; margin-top:0.5rem;" data-index="${i}">标记已处理</button>
                            `;
                            div.querySelector('button').addEventListener('click', async () => {
                                bugReports.splice(i, 1);
                                if (await saveBugReports()) {
                                    await addLog('处理Bug', '已处理', 'bug');
                                    renderAdminPanel();
                                    showToast('已处理');
                                }
                            });
                            bugSection.appendChild(div);
                        });
                        container.appendChild(bugSection);
                    }

                    // 待审核签名区域
                    if (pendingSignatures.length > 0) {
                        const pendingSection = document.createElement('div');
                        pendingSection.className = 'submit-form';
                        pendingSection.style.marginBottom = '2rem';
                        pendingSection.innerHTML = '<h3 style="color:#f59e0b; margin-bottom:1rem;">待审核签名</h3>';
                        
                        pendingSignatures.forEach((sig, i) => {
                            const div = document.createElement('div');
                            div.style.cssText = 'background:rgba(255,255,255,0.03); border-radius:1rem; padding:1rem; margin-bottom:1rem;';
                            div.innerHTML = `
                                <div><span style="color:#818cf8;">账号:</span> ${sig.account} (${sig.platform === 'qq' ? 'QQ' : '抖音'})</div>
                                <div style="margin:0.5rem 0; color:#f0f2ff;" class="signature-preview">${sig.html || convertToHtml(sig.content)}</div>
                                <div style="color:#9ca3af; font-size:0.8rem;">${sig.timestamp}</div>
                                <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                                    <button class="query-button" style="background:#10b981; flex:1;" data-approve="${i}">通过</button>
                                    <button class="query-button" style="background:#ef4444; flex:1;" data-reject="${i}">拒绝</button>
                                </div>
                            `;
                            
                            div.querySelector('[data-approve]').addEventListener('click', async () => {
                                const sig = pendingSignatures[i];
                                approvedSignatures.push({
                                    account: sig.account,
                                    platform: sig.platform,
                                    content: sig.content,
                                    html: sig.html,
                                    timestamp: new Date().toLocaleString('zh-CN')
                                });
                                pendingSignatures.splice(i, 1);
                                
                                if (await savePendingSignatures() && await saveApprovedSignatures()) {
                                    await addLog('通过签名', `${sig.account}`, 'approved');
                                    renderAdminPanel();
                                    showToast('已通过');
                                }
                            });
                            
                            div.querySelector('[data-reject]').addEventListener('click', async () => {
                                pendingSignatures.splice(i, 1);
                                if (await savePendingSignatures()) {
                                    await addLog('拒绝签名', '', 'rejected');
                                    renderAdminPanel();
                                    showToast('已拒绝');
                                }
                            });
                            
                            pendingSection.appendChild(div);
                        });
                        container.appendChild(pendingSection);
                    }

                    // 已通过签名区域
                    if (approvedSignatures.length > 0) {
                        const approvedSection = document.createElement('div');
                        approvedSection.className = 'submit-form';
                        approvedSection.innerHTML = '<h3 style="color:#10b981; margin-bottom:1rem;">已通过签名管理</h3>';
                        
                        approvedSignatures.forEach((sig, i) => {
                            const div = document.createElement('div');
                            div.style.cssText = 'background:rgba(255,255,255,0.03); border-radius:1rem; padding:1rem; margin-bottom:1rem;';
                            div.innerHTML = `
                                <div><span style="color:#818cf8;">账号:</span> ${sig.account} (${sig.platform === 'qq' ? 'QQ' : '抖音'})</div>
                                <div style="margin:0.5rem 0; color:#f0f2ff;" class="signature-preview">${sig.html || convertToHtml(sig.content)}</div>
                                <button class="query-button" style="background:#ef4444;" data-index="${i}">删除</button>
                            `;
                            div.querySelector('button').addEventListener('click', async () => {
                                approvedSignatures.splice(i, 1);
                                if (await saveApprovedSignatures()) {
                                    await addLog('删除签名', '', 'deleted');
                                    renderAdminPanel();
                                    showToast('已删除');
                                }
                            });
                            approvedSection.appendChild(div);
                        });
                        container.appendChild(approvedSection);
                    }

                    // 日志区域
                    if (operationLogs.length > 0) {
                        const logSection = document.createElement('div');
                        logSection.className = 'submit-form';
                        logSection.style.marginTop = '2rem';
                        logSection.innerHTML = '<h3 style="color:#818cf8; margin-bottom:1rem;">操作日志</h3><div class="log-container"></div>';
                        
                        const logContainer = logSection.querySelector('.log-container');
                        operationLogs.slice(0, 50).forEach(log => {
                            const item = document.createElement('div');
                            item.className = 'log-item';
                            item.innerHTML = `<span class="log-time">[${log.time}]</span> <span class="log-content ${log.status}">${log.action}: ${log.details || ''}</span>`;
                            logContainer.appendChild(item);
                        });
                        container.appendChild(logSection);
                    }

                    innerDynamic.appendChild(container);
                    refreshBackButton();
                }
            }

            // 事件绑定
            supernaturalBtn.addEventListener('click', () => {
                if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== VIEWS.SUPERNATURAL_INITIAL) {
                    historyStack = [];
                    showSupernaturalInitial();
                    searchInput.value = '';
                }
            });

            agreementBtn.addEventListener('click', () => agreementModal.classList.add('show'));
            closeAgreement.addEventListener('click', () => agreementModal.classList.remove('show'));
            agreementModal.addEventListener('click', (e) => {
                if (e.target === agreementModal) agreementModal.classList.remove('show');
            });

            thanksBtn.addEventListener('click', () => thanksModal.classList.add('show'));
            closeThanks.addEventListener('click', () => thanksModal.classList.remove('show'));
            thanksModal.addEventListener('click', (e) => {
                if (e.target === thanksModal) thanksModal.classList.remove('show');
            });

            submitSignatureBtn.addEventListener('click', () => {
                showSubmitFeedback();
                searchInput.value = '';
            });

            adminBtn.addEventListener('click', () => {
                currentAdminLevel = 'guest';
                showAdminPage();
                searchInput.value = '';
            });

            // 初始化
            window.addEventListener('load', async () => {
                startCloudCheck();
                await loadFromCloud();
                showSupernaturalInitial();
            });

            window.addEventListener('beforeunload', () => {
                if (cloudCheckInterval) clearInterval(cloudCheckInterval);
            });
        })();
    </script>
</body>
</html>
