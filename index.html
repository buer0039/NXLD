<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NXLD数值库 - 云同步版</title>
    <!-- 现代字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase JavaScript 库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 所有样式保持不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0f1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .modern-container {
            position: relative;
            z-index: 10;
            max-width: 1600px;
            width: 100%;
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            padding: 2.5rem;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .logo-text .sub {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            width: 300px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 1rem;
            pointer-events: none;
        }

        .search-box-modern {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f0f2ff;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .search-box-modern:focus {
            outline: none;
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .search-box-modern::placeholder {
            color: #6b7280;
            font-weight: 300;
        }

        .agreement-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .agreement-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .agreement-btn i {
            color: #818cf8;
            font-size: 0.9rem;
        }

        .submit-signature-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .submit-signature-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        .admin-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .admin-btn i {
            color: #f59e0b;
            font-size: 0.9rem;
        }

        .thanks-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .thanks-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .thanks-btn i {
            color: #fbbf24;
            font-size: 0.9rem;
        }

        .year-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .year-badge i {
            color: #818cf8;
            font-size: 0.8rem;
        }

        .faction-switch {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            width: fit-content;
        }

        .faction-btn {
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #9ca3af;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .faction-btn i {
            font-size: 1.1rem;
        }

        .faction-btn.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        .content-area {
            background: rgba(10, 12, 26, 0.4);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            min-height: 500px;
            max-height: 800px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4b5563 #1f2937;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }

        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }

        .status-badge {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge i {
            font-size: 0.8rem;
            color: #818cf8;
        }

        .back-btn-modern {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d5db;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .back-btn-modern:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(5px);
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -15px #000;
        }

        .menu-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
        }

        .menu-card.skin .menu-icon {
            background: linear-gradient(135deg, #b453b6, #d946ef);
        }

        .menu-card.signature .menu-icon {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .menu-card span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e5e7eb;
        }

        .menu-card small {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .category-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: scale(1.02);
        }

        .category-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 1rem;
            background: rgba(129, 140, 248, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #818cf8;
            font-size: 1.2rem;
        }

        .category-card span {
            font-size: 0.95rem;
            font-weight: 500;
            color: #d1d5db;
        }

        .item-grid-modern {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.2rem;
            padding: 0.9rem 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 400;
            color: #d1d5db;
            cursor: pointer;
            transition: all 0.18s;
            min-height: 60px;
            word-break: break-word;
        }

        .item-card:hover {
            background: rgba(129, 140, 248, 0.1);
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        .value-card-modern {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.15), rgba(124, 58, 237, 0.15));
            border: 2px solid rgba(129, 140, 248, 0.4);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px -20px #4f46e5;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .value-card-modern:hover {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.25), rgba(124, 58, 237, 0.25));
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(129, 140, 248, 0.4);
        }

        .value-card-modern:active {
            transform: scale(0.98);
        }

        .value-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f0f2ff;
            text-shadow: 0 0 20px rgba(129, 140, 248, 0.5);
            word-break: break-all;
            margin-bottom: 1rem;
        }

        .copy-hint-value {
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .value-card-modern:hover .copy-hint-value {
            opacity: 1;
        }

        .signature-card-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .signature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 1.2rem;
            padding: 1rem 0.8rem 0.4rem 0.8rem;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 192, 203, 0.1);
            line-height: 1.4;
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 130px;
            justify-content: space-between;
        }

        .signature-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 182, 193, 0.6);
            transform: scale(1.01);
            box-shadow: 0 0 15px rgba(255, 192, 203, 0.2);
        }

        .signature-card:active {
            transform: scale(0.99);
        }

        .signature-text {
            font-size: 0.8rem;
            font-weight: 400;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.2);
            line-height: 1.4;
            margin-bottom: 0.3rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            color: inherit;
        }

        .signature-text * {
            all: revert;
        }

        .signature-qq {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.3px;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.3rem;
            border-radius: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            width: fit-content;
            margin: 0.1rem auto 0 auto;
            transition: color 0.2s;
            line-height: 1.2;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signature-card:hover .signature-qq {
            color: rgba(255, 255, 255, 0.7);
        }

        .copy-hint {
            margin-top: 0.2rem;
            font-size: 0.5rem;
            color: #9ca3af;
            opacity: 0.4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
        }

        .signature-card:hover .copy-hint {
            opacity: 0.7;
        }

        .signature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
            position: relative;
        }

        .submit-form {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(129, 140, 248, 0.2);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: #d1d5db;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f2ff;
            font-size: 0.95rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            resize: vertical;
        }

        .form-input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .form-textarea {
            min-height: 120px;
        }

        .submit-button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 1rem 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        .submit-info {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.5rem;
            background: rgba(129, 140, 248, 0.05);
            border-radius: 1rem;
        }

        .query-section {
            margin-top: 2rem;
        }

        .query-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .query-button {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .query-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        .query-result {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 1.5rem;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .query-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .query-item:last-child {
            border-bottom: none;
        }

        .query-item-info {
            flex: 1;
        }

        .query-item-qq {
            color: #818cf8;
            font-size: 0.8rem;
        }

        .query-item-status {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .query-item-status.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .query-item-status.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .download-html-btn {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .download-html-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #8b5cf6;
        }

        .download-html-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .download-html-btn.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .upload-html-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
            width: 100%;

    <script>
        (function() {
            // Supabase 配置（使用您提供的密钥）
            const SUPABASE_URL = 'https://ssevtpugvqvhtusjqpcg.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_kCaFQB5lhmOSkLtdSSuE_w_DRQo9Vdj';
            
            // 初始化 Supabase 客户端
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // 基础变量
            const supernaturalBtn = document.getElementById('supernaturalBtn');
            const innerDynamic = document.getElementById('innerDynamic');
            const backContainer = document.getElementById('backButtonContainer');
            const statusTag = document.getElementById('statusTag');
            const searchInput = document.getElementById('searchInput');
            const toastContainer = document.getElementById('toastContainer');
            const agreementBtn = document.getElementById('agreementBtn');
            const agreementModal = document.getElementById('agreementModal');
            const closeAgreement = document.getElementById('closeAgreement');
            const cloudStatus = document.getElementById('cloudStatus');
            const cloudIcon = document.getElementById('cloudIcon');
            const cloudText = document.getElementById('cloudText');
            
            const thanksBtn = document.getElementById('thanksBtn');
            const thanksModal = document.getElementById('thanksModal');
            const closeThanks = document.getElementById('closeThanks');
            const submitSignatureBtn = document.getElementById('submitSignatureBtn');
            const adminBtn = document.getElementById('adminBtn');

            // 历史栈
            let historyStack = [];
            let currentAdminLevel = 'guest';
            const AUTHOR_QQ = '2165384053';
            
            // 数据缓存
            let pendingSignatures = [];
            let approvedSignatures = [];
            let fixedSignatures = [];
            let operationLogs = [];

            // 设置云同步状态
            function setCloudStatus(status, message) {
                cloudText.textContent = message;
                cloudIcon.className = 'fas';
                
                switch(status) {
                    case 'syncing':
                        cloudIcon.classList.add('fa-sync-alt');
                        cloudStatus.classList.add('syncing');
                        break;
                    case 'synced':
                        cloudIcon.classList.add('fa-cloud');
                        cloudStatus.classList.remove('syncing');
                        break;
                    case 'error':
                        cloudIcon.classList.add('fa-exclamation-triangle');
                        cloudStatus.classList.remove('syncing');
                        break;
                    default:
                        cloudIcon.classList.add('fa-cloud');
                        cloudStatus.classList.remove('syncing');
                }
            }

            // 从 Supabase 加载数据
            async function loadFromSupabase() {
                try {
                    setCloudStatus('syncing', '加载数据...');
                    
                    // 加载所有签名数据
                    const { data: signatures, error } = await supabase
                        .from('nxld_data')
                        .select('*')
                        .order('submit_time', { ascending: false });
                    
                    if (error) throw error;
                    
                    // 分类数据
                    pendingSignatures = signatures.filter(s => s.status === 'pending' && s.type === 'user');
                    approvedSignatures = signatures.filter(s => s.status === 'approved' && s.type === 'user');
                    fixedSignatures = signatures.filter(s => s.type === 'fixed');
                    
                    // 加载操作日志
                    const { data: logs, error: logError } = await supabase
                        .from('nxld_data')
                        .select('*')
                        .eq('type', 'log')
                        .order('action_time', { ascending: false })
                        .limit(100);
                    
                    if (!logError && logs) {
                        operationLogs = logs.map(log => ({
                            time: new Date(log.action_time).toLocaleString(),
                            action: log.action,
                            details: log.action_details,
                            status: log.status
                        }));
                    }
                    
                    setCloudStatus('synced', '云同步已开启');
                    return signatures;
                    
                } catch (error) {
                    console.error('加载数据失败:', error);
                    setCloudStatus('error', '同步失败');
                    showToast('加载云端数据失败');
                    return [];
                }
            }

            // 保存到 Supabase
            async function saveToSupabase(data) {
                try {
                    setCloudStatus('syncing', '保存中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .insert([data]);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '云同步已开启');
                    return true;
                } catch (error) {
                    console.error('保存失败:', error);
                    setCloudStatus('error', '保存失败');
                    return false;
                }
            }

            // 更新数据到 Supabase
            async function updateInSupabase(id, updates) {
                try {
                    setCloudStatus('syncing', '更新中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .update(updates)
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '云同步已开启');
                    return true;
                } catch (error) {
                    console.error('更新失败:', error);
                    setCloudStatus('error', '更新失败');
                    return false;
                }
            }

            // 删除数据
            async function deleteFromSupabase(id) {
                try {
                    setCloudStatus('syncing', '删除中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '云同步已开启');
                    return true;
                } catch (error) {
                    console.error('删除失败:', error);
                    setCloudStatus('error', '删除失败');
                    return false;
                }
            }

            // 添加操作日志
            async function addLog(action, details, status = 'info') {
                const logData = {
                    qq: 'system',
                    content: '系统日志',
                    action: action,
                    action_details: details,
                    status: status,
                    type: 'log',
                    action_time: new Date().toISOString()
                };
                
                await saveToSupabase(logData);
            }

            // 设置实时监听
            function setupRealtime() {
                supabase
                    .channel('nxld_changes')
                    .on('postgres_changes', 
                        { event: '*', schema: 'public', table: 'nxld_data' },
                        async (payload) => {
                            // 数据有变化，重新加载
                            await loadFromSupabase();
                            
                            // 刷新当前显示的页面
                            const currentView = historyStack[historyStack.length - 1];
                            if (currentView === VIEWS.SIGNATURE_PAGE) {
                                showSignaturePage(false);
                            } else if (currentView === VIEWS.ADMIN_PAGE && currentAdminLevel !== 'guest') {
                                showAdminPanel();
                            }
                            
                            // 显示通知
                            if (payload.eventType === 'INSERT' && payload.new.type === 'approved') {
                                showToast('有新签名通过审核');
                            }
                        }
                    )
                    .subscribe();
            }

            // 管理员面板
            async function showAdminPanel() {
                await loadFromSupabase();
                
                const container = document.createElement('div');
                
                // 显示当前管理员级别
                const levelBadge = document.createElement('div');
                levelBadge.style.textAlign = 'center';
                levelBadge.style.marginBottom = '1rem';
                levelBadge.style.padding = '0.5rem';
                levelBadge.style.borderRadius = '2rem';
                levelBadge.style.background = currentAdminLevel === 'super' ? 'rgba(139, 92, 246, 0.2)' : 'rgba(16, 185, 129, 0.2)';
                levelBadge.style.color = currentAdminLevel === 'super' ? '#a78bfa' : '#10b981';
                levelBadge.innerHTML = currentAdminLevel === 'super' ? 
                    '<i class="fas fa-crown"></i> 超级管理员模式' : 
                    '<i class="fas fa-user"></i> 普通管理员模式';
                container.appendChild(levelBadge);
                
                // 超级管理员专属功能
                if (currentAdminLevel === 'super') {
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-html-btn';
                    downloadBtn.innerHTML = '<i class="fas fa-download"></i> 下载备份文件';
                    downloadBtn.addEventListener('click', function() {
                        downloadCurrentHtml();
                    });
                    container.appendChild(downloadBtn);
                    
                    const syncBtn = document.createElement('button');
                    syncBtn.className = 'download-html-btn';
                    syncBtn.style.background = 'linear-gradient(135deg, #f59e0b, #d97706)';
                    syncBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 强制刷新云端';
                    syncBtn.addEventListener('click', async function() {
                        await loadFromSupabase();
                        showAdminPanel();
                        showToast('数据已刷新');
                    });
                    container.appendChild(syncBtn);
                } else {
                    const disabledBtn = document.createElement('button');
                    disabledBtn.className = 'download-html-btn disabled';
                    disabledBtn.innerHTML = '<i class="fas fa-lock"></i> 需要超级管理员权限';
                    disabledBtn.disabled = true;
                    container.appendChild(disabledBtn);
                }
                
                // 待审核签名
                const pendingSection = document.createElement('div');
                pendingSection.className = 'submit-form';
                pendingSection.style.marginBottom = '2rem';

            // 辅助函数：转换内容为HTML显示
            function convertToHtml(content) {
                if (!content) return '';
                
                let html = content
                    .replace(/<color=#([A-Fa-f0-9]{6})>/g, '<span style="color: #$1;">')
                    .replace(/<color=#([A-Fa-f0-9]{3})>/g, '<span style="color: #$1;">')
                    .replace(/<size=(\d+)>/g, function(match, size) {
                        const remSize = parseInt(size) / 16;
                        return `<span style="font-size: ${remSize}rem;">`;
                    })
                    .replace(/<\/color>/g, '</span>')
                    .replace(/<\/size>/g, '</span>')
                    .replace(/<b>/g, '<b>').replace(/<\/b>/g, '</b>')
                    .replace(/<i>/g, '<i>').replace(/<\/i>/g, '</i>')
                    .replace(/<u>/g, '<u>').replace(/<\/u>/g, '</u>');
                
                return html;
            }

            // 搜索功能
            function performGlobalSearch() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const allCurrentCards = document.querySelectorAll('#innerDynamic .menu-card, #innerDynamic .category-card, #innerDynamic .item-card, #innerDynamic .signature-card, #innerDynamic .value-card-modern');
                
                if (searchTerm === '') {
                    allCurrentCards.forEach(card => {
                        if (card) {
                            card.style.display = '';
                            card.classList.remove('search-highlight');
                        }
                    });
                    const existingTip = document.getElementById('searchNoResultTip');
                    if (existingTip) existingTip.remove();
                    return;
                }
                
                let hasMatch = false;
                
                allCurrentCards.forEach(card => {
                    if (!card) return;
                    const cardText = card.textContent ? card.textContent.toLowerCase() : '';
                    if (cardText.includes(searchTerm)) {
                        card.style.display = '';
                        card.classList.add('search-highlight');
                        hasMatch = true;
                    } else {
                        card.style.display = 'none';
                        card.classList.remove('search-highlight');
                    }
                });
                
                const existingTip = document.getElementById('searchNoResultTip');
                if (existingTip) existingTip.remove();
                
                if (!hasMatch && allCurrentCards.length > 0) {
                    const tip = document.createElement('div');
                    tip.id = 'searchNoResultTip';
                    tip.style.cssText = `

                        color: #9ca3af;

                a.href = url;

                if (e.target === agreementModal) {
                    agreementModal.classList.remove('show');
                }
            });

            thanksBtn.addEventListener('click', function() {
                thanksModal.classList.add('show');
            });

            closeThanks.addEventListener('click', function() {
                thanksModal.classList.remove('show');
            });

            thanksModal.addEventListener('click', function(e) {
                if (e.target === thanksModal) {
                    thanksModal.classList.remove('show');
                }
            });

            submitSignatureBtn.addEventListener('click', function() {
                showSubmitSignature();
                searchInput.value = '';
            });

            adminBtn.addEventListener('click', function() {
                currentAdminLevel = 'guest';
                showAdminPage();
                searchInput.value = '';
            });

            // 初始化
            window.addEventListener('load', async function() {
                setCloudStatus('syncing', '连接云数据库...');
                
                // 加载数据
                await loadFromSupabase();
                
                // 设置实时监听
                setupRealtime();
                
                // 显示主界面
                showSupernaturalInitial();
            });
        })();
    </script>
</body>
</html>
