    <!-- 防调试检测脚本 - 修复误判问题 -->
    <script>
        (function() {
            // 警告页面URL
            const WARNING_URL = 'https://buer0039.github.io/NXLD-FZB/';
            
            // 标记是否已跳转
            let hasRedirected = false;
            
            // 标记是否已经通过检测（正常用户）
            let isNormalUser = true;
            
            // 检测标志
            let devToolsDetected = false;
            
            // 跳转到警告页面
            function redirectToWarning() {
                if (hasRedirected) return;
                hasRedirected = true;
                
                // 清空所有存储
                try {
                    localStorage.clear();
                    sessionStorage.clear();
                } catch(e) {}
                
                // 跳转
                window.location.href = WARNING_URL;
            }
            
            // 精确检测开发者工具（通过时间差，需要多次确认）
            let debuggerTriggerCount = 0;
            let lastDebuggerTime = 0;
            
            function preciseDevToolsDetection() {
                const startTime = performance.now();
                debugger;
                const endTime = performance.now();
                const timeDiff = endTime - startTime;
                
                // 只有当时间差大于100ms时才记录（正常情况应该是0-1ms）
                if (timeDiff > 100) {
                    const now = Date.now();
                    if (now - lastDebuggerTime < 1000) {
                        debuggerTriggerCount++;
                        if (debuggerTriggerCount >= 3) {
                            devToolsDetected = true;
                            redirectToWarning();
                        }
                    } else {
                        debuggerTriggerCount = 1;
                    }
                    lastDebuggerTime = now;
                } else {
                    debuggerTriggerCount = 0;
                }
            }
            
            // 检测窗口尺寸变化（只有在开发者工具打开时才会触发）
            let originalOuterWidth = window.outerWidth;
            let originalOuterHeight = window.outerHeight;
            let sizeCheckCount = 0;
            
            function detectDevToolsBySize() {
                // 只在用户可能打开开发者工具时才检测
                const widthDiff = Math.abs(window.outerWidth - window.innerWidth);
                const heightDiff = Math.abs(window.outerHeight - window.innerHeight);
                
                // 检测控制台是否打开（通常打开后宽高差会大于100）
                if (widthDiff > 150 || heightDiff > 150) {
                    sizeCheckCount++;
                    if (sizeCheckCount >= 2) {
                        devToolsDetected = true;
                        redirectToWarning();
                    }
                } else {
                    sizeCheckCount = 0;
                }
            }
            
            // 检测快捷键（只阻止不跳转，避免误判）
            function detectDevToolsShortcut(e) {
                const isDevToolKey = e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                    (e.ctrlKey && (e.key === 'U' || e.key === 'S'));
                
                if (isDevToolKey) {
                    e.preventDefault();
                    e.stopPropagation();
                    // 延迟检测，确保不是误触
                    setTimeout(() => {
                        preciseDevToolsDetection();
                    }, 100);
                    return false;
                }
            }
            
            // 检测右键菜单（不跳转，只阻止）
            function disableRightClick(e) {
                e.preventDefault();
                return false;
            }
            
            // 检测控制台打开（通过console.log执行时间，需要多次确认）
            let consoleCheckCount = 0;
            let lastConsoleTime = 0;
            
            function detectConsoleOpen() {
                const before = Date.now();
                console.log('%c', 'color: transparent');
                const after = Date.now();
                const timeDiff = after - before;
                
                if (timeDiff > 50) {
                    const now = Date.now();
                    if (now - lastConsoleTime < 2000) {
                        consoleCheckCount++;
                        if (consoleCheckCount >= 3) {
                            devToolsDetected = true;
                            redirectToWarning();
                        }
                    } else {
                        consoleCheckCount = 1;
                    }
                    lastConsoleTime = now;
                } else {
                    consoleCheckCount = 0;
                }
            }
            
            // 监听快捷键
            document.addEventListener('keydown', detectDevToolsShortcut);
            document.addEventListener('contextmenu', disableRightClick);
            
            // 定期检测（每3秒一次，降低频率）
            setInterval(function() {
                // 只检测开发者工具相关
                preciseDevToolsDetection();
                detectDevToolsBySize();
            }, 3000);
            
            // 单独的console检测（频率稍低）
            setInterval(function() {
                detectConsoleOpen();
            }, 5000);
            
            // 禁止选中和复制（不影响正常使用）
            document.addEventListener('selectstart', function(e) {
                // 允许输入框内选中
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    return true;
                }
                e.preventDefault();
                return false;
            });
            
            // 禁止复制快捷键（不影响正常复制）
            document.addEventListener('copy', function(e) {
                // 允许输入框内复制
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    return true;
                }
                e.preventDefault();
                return false;
            });
            
            // 正常用户标志，避免误判
            setTimeout(function() {
                isNormalUser = true;
            }, 1000);
            
            // 记录页面加载时间，避免刚加载就检测
            let pageLoadTime = Date.now();
            
            // 延迟启动检测，避免页面刚加载时的误判
            setTimeout(function() {
                // 正常用户不会在页面加载时就打开开发者工具
                if (Date.now() - pageLoadTime > 2000) {
                    // 只有页面加载2秒后才开始检测
                }
            }, 2000);
        })();
    </script>

            const thanksModal = document.getElementById('thanksModal');
            const closeThanks = document.getElementById('closeThanks');
            const submitSignatureBtn = document.getElementById('submitSignatureBtn');
            const adminBtn = document.getElementById('adminBtn');

            // 历史栈
            let historyStack = [];
            let currentAdminLevel = 'guest';
            
            // 数据缓存
            let pendingSignatures = [];
            let approvedSignatures = [];
            let fixedSignatures = [];
            let operationLogs = [];

            // 当前选中的标签页
            let currentTab = 'pending';

            // 设置云同步状态
            function setCloudStatus(status, message) {
                cloudText.textContent = message;
                cloudIcon.className = 'fas';
                
                switch(status) {
                    case 'syncing':
                        cloudIcon.classList.add('fa-sync-alt');
                        cloudStatus.classList.add('syncing');
                        break;
                    case 'synced':
                        cloudIcon.classList.add('fa-cloud');
                        cloudStatus.classList.remove('syncing');
                        break;
                    case 'error':
                        cloudIcon.classList.add('fa-exclamation-triangle');
                        cloudStatus.classList.remove('syncing');
                        break;
                    default:
                        cloudIcon.classList.add('fa-cloud');
                        cloudStatus.classList.remove('syncing');
                }
            }

            // 从 Supabase 加载数据
            async function loadFromSupabase() {
                try {
                    setCloudStatus('syncing', '加载数据...');
                    
                    const { data: signatures, error } = await supabase
                        .from('nxld_data')
                        .select('*')
                        .order('submit_time', { ascending: false });
                    
                    if (error) throw error;
                    
                    // 分类数据 - 强制为所有固定签名添加 platform = 'qq'
                    fixedSignatures = signatures.filter(s => s.type === 'fixed').map(s => ({
                        ...s,
                        platform: 'qq'
                    }));
                    
                    pendingSignatures = signatures.filter(s => s.status === 'pending' && s.type === 'user').map(s => ({
                        ...s,
                        platform: s.platform || 'qq'
                    }));
                    
                    approvedSignatures = signatures.filter(s => s.status === 'approved' && s.type === 'user').map(s => ({
                        ...s,
                        platform: s.platform || 'qq'
                    }));
                    
                    const { data: logs, error: logError } = await supabase
                        .from('nxld_data')
                        .select('*')
                        .eq('type', 'log')
                        .order('action_time', { ascending: false })
                        .limit(100);
                    
                    if (!logError && logs) {
                        operationLogs = logs.map(log => ({
                            time: new Date(log.action_time).toLocaleString(),
                            action: log.action,
                            details: log.action_details,
                            status: log.status
                        }));
                    }
                    
                    setCloudStatus('synced', '已同步');
                    return signatures;
                    
                } catch (error) {
                    console.error('加载数据失败:', error);
                    setCloudStatus('error', '同步失败');
                    showToast('加载云端数据失败');
                    
                    // 显示错误信息
                    if (loadingSpinner) {
                        loadingSpinner.innerHTML = `
                            <div class="error-message">
                                <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                                <div>加载失败，请检查网络连接</div>
                                <button class="retry-btn" onclick="location.reload()">
                                    <i class="fas fa-redo"></i> 重新加载
                                </button>
                            </div>
                        `;
                    }
                    
                    return [];
                }
            }

            // 保存到 Supabase
            async function saveToSupabase(data) {
                try {
                    setCloudStatus('syncing', '保存中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .insert([data]);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '已同步');
                    return true;
                } catch (error) {
                    console.error('保存失败:', error);
                    setCloudStatus('error', '保存失败');
                    return false;
                }
            }

            // 更新数据到 Supabase
            async function updateInSupabase(id, updates) {
                try {
                    setCloudStatus('syncing', '更新中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .update(updates)
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '已同步');
                    return true;
                } catch (error) {
                    console.error('更新失败:', error);
                    setCloudStatus('error', '更新失败');
                    return false;
                }
            }

            // 删除数据（仅超级管理员可用）
            async function deleteFromSupabase(id) {
                if (currentAdminLevel !== 'super') {
                    showToast('只有超级管理员可以删除');
                    return false;
                }
                
                try {
                    setCloudStatus('syncing', '删除中...');
                    
                    const { error } = await supabase
                        .from('nxld_data')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    setCloudStatus('synced', '已同步');
                    return true;
                } catch (error) {
                    console.error('删除失败:', error);
                    setCloudStatus('error', '删除失败');
                    return false;
                }
            }

            // 添加操作日志
            async function addLog(action, details, status = 'info') {
                const logData = {
                    qq: 'system',
                    content: '系统日志',
                    action: action,
                    action_details: details,
                    status: status,
                    type: 'log',
                    action_time: new Date().toISOString()
                };
                
                await saveToSupabase(logData);
            }

            // 检查重复签名
            function checkDuplicate(content) {
                const fixedDuplicate = fixedSignatures.find(s => s.content === content);
                if (fixedDuplicate) return { duplicate: true, type: 'fixed', qq: fixedDuplicate.qq, platform: 'qq' };
                
                const approvedDuplicate = approvedSignatures.find(s => s.content === content);
                if (approvedDuplicate) return { duplicate: true, type: 'approved', qq: approvedDuplicate.qq, platform: approvedDuplicate.platform || 'qq' };
                
                const pendingDuplicate = pendingSignatures.find(s => s.content === content);
                if (pendingDuplicate) return { duplicate: true, type: 'pending', qq: pendingDuplicate.qq, platform: pendingDuplicate.platform || 'qq' };
                
                return { duplicate: false };
            }

            // 设置实时监听
            function setupRealtime() {
                supabase
                    .channel('nxld_changes')
                    .on('postgres_changes', 
                        { event: '*', schema: 'public', table: 'nxld_data' },
                        async (payload) => {
                            await loadFromSupabase();
                            
                            const currentView = historyStack[historyStack.length - 1];
                            if (currentView === VIEWS.SIGNATURE_PAGE) {
                                showSignaturePage(false);
                            } else if (currentView === VIEWS.ADMIN_PAGE && currentAdminLevel !== 'guest') {
                                showAdminPanel();
                            }
                        }
                    )
                    .subscribe();
            }

            // 复制功能
            function copyToClipboard(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.cssText = 'position:fixed;opacity:0;left:-9999px;top:0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy') ? showToast('复制成功') : showToast('复制失败');
                } catch(e) {
                    showToast('复制失败');
                }
                document.body.removeChild(textarea);
            }

            // 显示提示
            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
                toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            }

            // 转换HTML
            function convertToHtml(content) {
                if (!content) return '';
                return content
                    .replace(/<color=#([A-Fa-f0-9]{6})>/g, '<span style="color:#$1;">')
                    .replace(/<color=#([A-Fa-f0-9]{3})>/g, '<span style="color:#$1;">')
                    .replace(/<size=(\d+)>/g, (m,s) => `<span style="font-size:${parseInt(s)/16}rem;">`)
                    .replace(/<\/color>/g, '</span>')
                    .replace(/<\/size>/g, '</span>')
                    .replace(/<b>/g, '<b>').replace(/<\/b>/g, '</b>')
                    .replace(/<i>/g, '<i>').replace(/<\/i>/g, '</i>')
                    .replace(/<u>/g, '<u>').replace(/<\/u>/g, '</u>');
            }

            // 管理员面板

                await loadFromSupabase();
                
                const container = document.createElement('div');
                
                // 管理员级别标识
                const levelBadge = document.createElement('div');

                levelBadge.style.marginBottom = '1.5rem';
                levelBadge.style.padding = '0.5rem';
                levelBadge.style.borderRadius = '2rem';

                                displayInfo = `<div style="color: #f59e0b; margin-top: 0.3rem;">Bug反馈: ${sig.content}</div>`;

                            let authorDisplay = '';
                            if (sig.platform === 'qq') {
                                platformDisplay = 'QQ';

                            } else if (sig.platform === 'douyin') {
                                platformDisplay = 'dy';
                                authorDisplay = `dy：${sig.qq}`;
                            } else if (sig.platform === 'kuaishou') {
                                platformDisplay = 'ks';
                                authorDisplay = `ks：${sig.qq}`;
                            } else {
                                platformDisplay = 'QQ';
                                authorDisplay = `QQ：${sig.qq}`;
                            }
                            
                            pendingHtml += `
                                <div style="background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem;">
                                    <div style="margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between;">
                                        <span><span style="color: #818cf8;">${platformDisplay}:</span> ${authorDisplay}</span>
                                        ${currentAdminLevel === 'super' ? `<button class="delete-btn" onclick="window.deleteAnyItem(${sig.id})"><i class="fas fa-trash"></i> 删除</button>` : ''}
                                    </div>
                                    <div style="margin-bottom: 0.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 0.5rem;">
                                        <span style="color: #818cf8;">内容:</span>
                                        ${displayInfo}
                                    </div>
                                    <div style="margin-bottom: 0.5rem; color: #9ca3af; font-size: 0.8rem;">提交时间: ${new Date(sig.submit_time).toLocaleString()}</div>
                                    <div style="display: flex; gap: 0.5rem;">
                                        <button class="query-button" style="background: #10b981;" onclick="window.approveSignature(${sig.id})">通过</button>

                        pendingHtml += '</div>';
                    }
                    contentDiv.innerHTML = pendingHtml;
                    
                } else if (currentTab === 'approved') {
                    let approvedHtml = '<h3 style="color: #10b981; margin-bottom: 1rem;">已通过列表</h3>';
                    
                    const approvedItems = approvedSignatures.filter(s => s.submit_type === 'signature');
                    if (approvedItems.length === 0) {
                        approvedHtml += '<div style="color: #9ca3af; text-align: center; padding: 2rem;">暂无已通过签名</div>';
                    } else {
                        approvedHtml += '<div style="max-height: 500px; overflow-y: auto;">';
                        approvedItems.forEach((sig) => {
                            const previewContent = convertToHtml(sig.content);
                            let platformDisplay = '';
                            let authorDisplay = '';
                            if (sig.platform === 'qq') {
                                platformDisplay = 'QQ';
                                authorDisplay = `QQ：${sig.qq}`;
                            } else if (sig.platform === 'douyin') {
                                platformDisplay = 'dy';
                                authorDisplay = `dy：${sig.qq}`;
                            } else if (sig.platform === 'kuaishou') {
                                platformDisplay = 'ks';
                                authorDisplay = `ks：${sig.qq}`;
                            } else {
                                platformDisplay = 'QQ';
                                authorDisplay = `QQ：${sig.qq}`;
                            }
                            
                            approvedHtml += `
                                <div style="background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem;">
                                    <div style="margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between;">
                                        <span><span style="color: #818cf8;">${platformDisplay}:</span> ${authorDisplay}</span>
                                        ${currentAdminLevel === 'super' ? `<button class="delete-btn" onclick="window.deleteAnyItem(${sig.id})"><i class="fas fa-trash"></i> 删除</button>` : ''}

                                    <div style="margin-bottom: 0.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 0.5rem;">
                                        <span style="color: #818cf8;">预览:</span>
                                        <div style="margin-top: 0.3rem;">${previewContent}</div>
                                    </div>
                                </div>
                            `;
                        });
                        approvedHtml += '</div>';
                    }
                    contentDiv.innerHTML = approvedHtml;
                    
                } else if (currentTab === 'logs') {
                    let logHtml = '<h3 style="color: #818cf8; margin-bottom: 1rem;">操作日志</h3>';
                    logHtml += '<div class="log-container" style="max-height: 500px;">';
                    
                    if (operationLogs.length === 0) {
                        logHtml += '<div style="color: #9ca3af; text-align: center; padding: 1rem;">暂无操作日志</div>';
                    } else {
                        operationLogs.forEach(log => {
                            let logClass = 'log-content';
                            if (log.action.includes('通过')) logClass += ' approved';
                            else if (log.action.includes('拒绝')) logClass += ' rejected';
                            else if (log.action.includes('删除')) logClass += ' deleted';
                            
                            logHtml += `
                                <div class="log-item">
                                    <span class="log-time">[${log.time}]</span>
                                    <span class="${logClass}">${log.action}: ${log.details}</span>

                    syncBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 强制刷新云端';
                    syncBtn.addEventListener('click', async function() {
                        await loadFromSupabase();
                        showAdminPanel();
                        showToast('数据已刷新');

                    container.appendChild(syncBtn);

                innerDynamic.appendChild(container);

                bindAdminEvents();

            // 绑定管理员事件
            function bindAdminEvents() {
                window.approveSignature = async (id) => {
                    const updates = {
                        status: 'approved',
                        review_time: new Date().toISOString(),
                        reviewed_by: currentAdminLevel
                    };
                    
                    const success = await updateInSupabase(id, updates);
                    
                    if (success) {
                        const sig = pendingSignatures.find(s => s.id === id);
                        const platformName = sig.platform === 'qq' ? 'QQ' : sig.platform === 'douyin' ? 'dy' : 'ks';
                        await addLog('通过', `${platformName}:${sig.qq} 的${sig.submit_type === 'signature' ? '签名' : sig.submit_type === 'report' ? '举报' : '反馈'}已通过`, 'approved');
                        showToast('已通过');
                        await loadFromSupabase();
                        showAdminPanel();
                    }
                };
                
                window.rejectSignature = async (id) => {
                    const updates = {
                        status: 'rejected',
                        review_time: new Date().toISOString(),
                        reviewed_by: currentAdminLevel
                    };
                    
                    const success = await updateInSupabase(id, updates);
                    
                    if (success) {
                        const sig = pendingSignatures.find(s => s.id === id);
                        const platformName = sig.platform === 'qq' ? 'QQ' : sig.platform === 'douyin' ? 'dy' : 'ks';
                        await addLog('拒绝', `${platformName}:${sig.qq} 的${sig.submit_type === 'signature' ? '签名' : sig.submit_type === 'report' ? '举报' : '反馈'}被拒绝`, 'rejected');
                        showToast('已拒绝');
                        await loadFromSupabase();
                        showAdminPanel();
                    }
                };
                
                window.deleteAnyItem = async (id) => {
                    if (!confirm('确定要删除这项内容吗？此操作不可恢复！')) return;
                    
                    const success = await deleteFromSupabase(id);
                    
                    if (success) {
                        await addLog('删除', `超级管理员删除了ID为${id}的内容`, 'deleted');
                        showToast('已删除');
                        await loadFromSupabase();
                        showAdminPanel();
                    }
                };
            }

            // 签名页面
            async function showSignaturePage(pushToHistory = true) {
                resetAll();
                
                if (pushToHistory) {
                    historyStack.push(VIEWS.SIGNATURE_PAGE);
                }
                
                await loadFromSupabase();
                
                const allSignatures = [
                    ...fixedSignatures.map(s => ({ ...s, platform: 'qq' })),
                    ...approvedSignatures.filter(s => s.submit_type === 'signature')
                ].map(s => {
                    let displayName = '';
                    if (s.platform === 'qq') {
                        displayName = `QQ：${s.qq}`;
                    } else if (s.platform === 'douyin') {
                        displayName = `dy：${s.qq}`;
                    } else if (s.platform === 'kuaishou') {
                        displayName = `ks：${s.qq}`;
                    } else {
                        displayName = `QQ：${s.qq}`;
                    }
                    return {
                        raw: s.content,
                        displayName: displayName,
                        html: convertToHtml(s.content)
                    };
                });

                function createSignatureCard(rawContent, displayHtml, displayName, index) {
                    const cardContainer = document.createElement('div');
                    cardContainer.className = 'signature-card-container';
                    
                    const signatureCard = document.createElement('div');
                    signatureCard.className = 'signature-card';
                    signatureCard.setAttribute('data-name', `签名${index}`);
                    
                    const signatureDiv = document.createElement('div');
                    signatureDiv.className = 'signature-text';
                    signatureDiv.innerHTML = displayHtml;
                    
                    const qqTag = document.createElement('div');
                    qqTag.className = 'signature-qq';
                    qqTag.textContent = displayName;
                    
                    const hintDiv = document.createElement('div');
                    hintDiv.className = 'copy-hint';
                    hintDiv.innerHTML = '<i class="fas fa-copy"></i> 点击复制';
                    
                    signatureCard.appendChild(signatureDiv);
                    signatureCard.appendChild(qqTag);
                    signatureCard.appendChild(hintDiv);
                    
                    signatureCard.addEventListener('click', function(e) {
                        e.stopPropagation();
                        copyToClipboard(rawContent);
                    });
                    
                    cardContainer.appendChild(signatureCard);
                    return cardContainer;
                }

                const container = document.createElement('div');
                
                const topHint = document.createElement('div');
                topHint.className = 'top-hint';
                topHint.innerHTML = '<i class="fas fa-info-circle"></i> 点击卡片可复制原内容';
                container.appendChild(topHint);
                
                const signatureGrid = document.createElement('div');
                signatureGrid.className = 'signature-grid';
                
                allSignatures.forEach((sig, index) => {
                    signatureGrid.appendChild(createSignatureCard(sig.raw, sig.html, sig.displayName, index + 1));
                });
                
                container.appendChild(signatureGrid);
                
                statusTag.textContent = `签名合集 · 共${allSignatures.length}个`;
                
                innerDynamic.innerHTML = '';
                innerDynamic.appendChild(container);
                refreshBackButton();
                setTimeout(performGlobalSearch, 10);
            }

            // 提交页面
            function showSubmitSignature(pushToHistory = true) {
                resetAll();
                
                if (pushToHistory) {
                    historyStack.push(VIEWS.SUBMIT_SIGNATURE);
                }
                
                statusTag.textContent = '提交投稿';
                
                const container = document.createElement('div');
                container.className = 'submit-form';
                
                const typeSelector = document.createElement('div');
                typeSelector.className = 'type-selector';
                typeSelector.innerHTML = `
                    <div class="type-option selected" data-type="signature">
                        <div class="type-icon"><i class="fas fa-signature"></i></div>
                        <div class="type-name">签名投稿</div>
                        <div class="type-desc">分享个性签名</div>
                    </div>
                    <div class="type-option" data-type="report">
                        <div class="type-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="type-name">倒卖举报</div>
                        <div class="type-desc">举报倒卖行为（可传图）</div>
                    </div>
                    <div class="type-option" data-type="bug">
                        <div class="type-icon"><i class="fas fa-bug"></i></div>
                        <div class="type-name">Bug反馈</div>
                        <div class="type-desc">反馈问题</div>
                    </div>
                `;
                
                // 平台选择 - 新增快手
                const platformSelector = document.createElement('div');
                platformSelector.className = 'platform-selector';
                platformSelector.innerHTML = `
                    <div class="platform-option selected" data-platform="qq">
                        <div class="platform-icon"><i class="fab fa-qq"></i></div>
                        <div class="platform-name">QQ</div>
                    </div>
                    <div class="platform-option" data-platform="douyin">
                        <div class="platform-icon"><i class="fab fa-tiktok"></i></div>
                        <div class="platform-name">抖音</div>
                    </div>
                    <div class="platform-option" data-platform="kuaishou">
                        <div class="platform-icon"><i class="fas fa-video"></i></div>
                        <div class="platform-name">快手</div>
                    </div>
                `;
                
                const form = document.createElement('div');
                form.innerHTML = `
                    <div class="form-group">
                        <label class="form-label" id="accountLabel">你的QQ号</label>
                        <input type="text" class="form-input" id="submitAccount" placeholder="请输入账号" maxlength="50">
                    </div>
                    <div class="form-group" id="contentGroup">
                        <label class="form-label" id="contentLabel">签名内容</label>
                        <textarea class="form-input form-textarea" id="submitContent" placeholder="请输入内容"></textarea>
                    </div>
                    <div class="form-group" id="imageUploadGroup" style="display: none;">
                        <div class="image-upload-area" id="imageUploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <div class="upload-text">点击上传图片证据</div>
                            <div class="upload-hint">支持多张图片，最多9张</div>
                        </div>
                        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
                        <div class="image-preview" id="imagePreview"></div>
                    </div>
                    <button class="submit-button" id="doSubmitBtn">提交</button>
                    <div class="submit-info" id="submitInfo"></div>
                `;
                
                container.appendChild(typeSelector);
                container.appendChild(platformSelector);
                container.appendChild(form);
                
                const querySection = document.createElement('div');
                querySection.className = 'query-section';
                querySection.innerHTML = `
                    <div class="query-input-group">
                        <input type="text" class="form-input" id="queryAccount" placeholder="输入账号查询提交状态" style="flex: 1;">
                        <button class="query-button" id="queryBtn">查询</button>
                    </div>
                    <div class="query-result" id="queryResult"></div>
                `;
                
                container.appendChild(querySection);
                
                innerDynamic.appendChild(container);
                
                const typeOptions = document.querySelectorAll('.type-option');
                let currentType = 'signature';
                let uploadedImages = [];
                
                typeOptions.forEach(opt => {
                    opt.addEventListener('click', function() {
                        typeOptions.forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        currentType = this.dataset.type;
                        
                        const contentGroup = document.getElementById('contentGroup');
                        const imageUploadGroup = document.getElementById('imageUploadGroup');
                        const contentLabel = document.getElementById('contentLabel');
                        const accountLabel = document.getElementById('accountLabel');
                        
                        if (currentType === 'signature') {
                            contentGroup.style.display = 'block';
                            imageUploadGroup.style.display = 'none';
                            contentLabel.textContent = '签名内容';
                            accountLabel.textContent = '你的账号';
                        } else if (currentType === 'report') {
                            contentGroup.style.display = 'block';
                            imageUploadGroup.style.display = 'block';
                            contentLabel.textContent = '举报说明';
                            accountLabel.textContent = '你的账号';
                        } else if (currentType === 'bug') {
                            contentGroup.style.display = 'block';
                            imageUploadGroup.style.display = 'none';
                            contentLabel.textContent = 'Bug描述';
                            accountLabel.textContent = '你的账号';
                        }
                    });
                });
                
                const platformOptions = document.querySelectorAll('.platform-option');
                let currentPlatform = 'qq';
                
                platformOptions.forEach(opt => {
                    opt.addEventListener('click', function() {
                        platformOptions.forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        currentPlatform = this.dataset.platform;
                        
                        const accountLabel = document.getElementById('accountLabel');
                        if (currentPlatform === 'qq') {
                            accountLabel.textContent = '你的QQ号';
                        } else if (currentPlatform === 'douyin') {
                            accountLabel.textContent = '你的抖音号';
                        } else if (currentPlatform === 'kuaishou') {
                            accountLabel.textContent = '你的快手号';
                        }
                    });
                });
                
                const imageUploadArea = document.getElementById('imageUploadArea');
                const fileInput = document.getElementById('fileInput');
                const imagePreview = document.getElementById('imagePreview');
                
                imageUploadArea.addEventListener('click', () => {
                    fileInput.click();
                });
                
                fileInput.addEventListener('change', (e) => {
                    const files = Array.from(e.target.files);
                    uploadedImages = [];
                    imagePreview.innerHTML = '';
                    
                    files.slice(0, 9).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            uploadedImages.push(e.target.result);
                            
                            const previewItem = document.createElement('div');
                            previewItem.className = 'preview-item';
                            previewItem.innerHTML = `
                                <img src="${e.target.result}" alt="preview">
                                <div class="remove-image" onclick="this.parentElement.remove()">×</div>
                            `;
                            imagePreview.appendChild(previewItem);
                        };
                        reader.readAsDataURL(file);
                    });
                });
                
                document.getElementById('doSubmitBtn').addEventListener('click', async function() {
                    const account = document.getElementById('submitAccount').value.trim();
                    const content = document.getElementById('submitContent').value.trim();
                    const infoDiv = document.getElementById('submitInfo');
                    
                    if (!account) {
                        let platformName = '';
                        if (currentPlatform === 'qq') platformName = 'QQ号';
                        else if (currentPlatform === 'douyin') platformName = '抖音号';
                        else platformName = '快手号';
                        infoDiv.textContent = `请输入${platformName}`;
                        infoDiv.style.color = '#ef4444';
                        return;
                    }
                    
                    if (currentType === 'signature') {
                        if (!content) {
                            infoDiv.textContent = '请输入签名内容';
                            infoDiv.style.color = '#ef4444';
                            return;
                        }
                        
                        const duplicate = checkDuplicate(content);
                        if (duplicate.duplicate) {
                            let platformName = '';
                            if (duplicate.platform === 'qq') platformName = 'QQ';
                            else if (duplicate.platform === 'douyin') platformName = 'dy';
                            else platformName = 'ks';
                            let msg = '';
                            if (duplicate.type === 'fixed') msg = `该签名已存在于固定签名中 (原作者: ${platformName}：${duplicate.qq})`;
                            else if (duplicate.type === 'approved') msg = `该签名已通过审核 (原作者: ${platformName}：${duplicate.qq})`;
                            else if (duplicate.type === 'pending') msg = `该签名正在审核中 (提交者: ${platformName}：${duplicate.qq})`;
                            
                            infoDiv.textContent = msg;
                            infoDiv.style.color = '#f59e0b';
                            return;
                        }
                    }
                    
                    if (currentType === 'report' && !content) {
                        infoDiv.textContent = '请输入举报说明';
                        infoDiv.style.color = '#ef4444';
                        return;
                    }
                    
                    if (currentType === 'bug' && !content) {
                        infoDiv.textContent = '请输入Bug描述';
                        infoDiv.style.color = '#ef4444';
                        return;
                    }
                    
                    const newSubmission = {
                        qq: account,
                        content: content || '无内容',
                        platform: currentPlatform,
                        status: 'pending',
                        type: 'user',
                        submit_type: currentType,
                        images: uploadedImages,
                        submit_time: new Date().toISOString(),
                        last_update: new Date().toISOString()
                    };
                    
                    const success = await saveToSupabase(newSubmission);
                    
                    if (success) {
                        let platformName = '';
                        if (currentPlatform === 'qq') platformName = 'QQ';
                        else if (currentPlatform === 'douyin') platformName = 'dy';
                        else platformName = 'ks';
                        await addLog('提交', `${platformName}:${account} 提交了${currentType === 'signature' ? '签名' : currentType === 'report' ? '举报' : 'Bug反馈'}`, 'info');
                        
                        let successMsg = '';
                        if (currentType === 'signature') successMsg = '签名提交成功！管理员审核后将显示';
                        else if (currentType === 'report') successMsg = '举报提交成功！管理员将尽快处理';
                        else if (currentType === 'bug') successMsg = 'Bug反馈提交成功！感谢您的反馈';
                        
                        infoDiv.textContent = successMsg;
                        infoDiv.style.color = '#10b981';
                        
                        document.getElementById('submitAccount').value = '';
                        document.getElementById('submitContent').value = '';
                        uploadedImages = [];
                        imagePreview.innerHTML = '';
                        
                        await loadFromSupabase();
                    } else {
                        infoDiv.textContent = '提交失败，请稍后重试';
                        infoDiv.style.color = '#ef4444';
                    }
                });
                
                document.getElementById('queryBtn').addEventListener('click', function() {
                    const account = document.getElementById('queryAccount').value.trim();
                    const resultDiv = document.getElementById('queryResult');
                    
                    if (!account) {
                        resultDiv.innerHTML = '<div style="color: #ef4444; padding: 1rem; text-align: center;">请输入账号</div>';
                        return;
                    }
                    
                    const userSubmissions = [...pendingSignatures, ...approvedSignatures].filter(s => s.qq === account);
                    
                    let html = '';
                    
                    if (userSubmissions.length > 0) {
                        userSubmissions.forEach(s => {
                            const typeText = s.submit_type === 'signature' ? '签名投稿' : s.submit_type === 'report' ? '倒卖举报' : 'Bug反馈';
                            let platformText = '';
                            if (s.platform === 'qq') platformText = 'QQ';
                            else if (s.platform === 'douyin') platformText = 'dy';
                            else platformText = 'ks';
                            
                            html += `
                                <div class="query-item">
                                    <div class="query-item-info">
                                        <div>${typeText} - ${platformText}：${s.qq}</div>
                                        <div class="query-item-qq">提交时间: ${new Date(s.submit_time).toLocaleString()}</div>
                                        ${s.submit_type === 'signature' ? `<div style="font-size:0.7rem; color:#9ca3af; margin-top:0.2rem;">${s.content.substring(0,50)}${s.content.length>50?'...':''}</div>` : ''}
                                    </div>
                                    <span class="query-item-status ${s.status === 'pending' ? 'pending' : ''}">${s.status === 'pending' ? '待审核' : '已通过'}</span>
                                </div>
                            `;
                        });
                    } else {
                        html = '<div style="color: #9ca3af; padding: 1rem; text-align: center;">没有找到提交记录</div>';
                    }
                    
                    resultDiv.innerHTML = html;
                });
                
                refreshBackButton();
            }

            // 管理员页面
            function showAdminPage(pushToHistory = true) {
                resetAll();
                
                if (pushToHistory) {
                    historyStack.push(VIEWS.ADMIN_PAGE);
                }
                
                statusTag.textContent = '管理员系统';
                
                const container = document.createElement('div');
                
                if (currentAdminLevel !== 'guest') {
                    showAdminPanel();
                } else {
                    const passwordDiv = document.createElement('div');
                    passwordDiv.className = 'submit-form';
                    passwordDiv.innerHTML = `
                        <div class="form-group">
                            <label class="form-label">管理员密码</label>
                            <input type="password" class="form-input" id="adminPassword" placeholder="请输入管理员密码">
                        </div>
                        <button class="submit-button" id="adminLoginBtn">登录</button>
                        <div class="submit-info" id="adminLoginInfo"></div>
                    `;
                    
                    container.appendChild(passwordDiv);
                    innerDynamic.appendChild(container);
                    
                    document.getElementById('adminLoginBtn').addEventListener('click', function() {
                        const password = document.getElementById('adminPassword').value;
                        
                        if (password === 'NXLD_RX') {
                            currentAdminLevel = 'admin';
                            showAdminPanel();
                            document.getElementById('adminLoginInfo').textContent = '登录成功（普通管理员）';
                            document.getElementById('adminLoginInfo').style.color = '#10b981';
                        } else if (password === 'NXLD_MZRW') {
                            currentAdminLevel = 'super';
                            showAdminPanel();
                            document.getElementById('adminLoginInfo').textContent = '登录成功（超级管理员）';
                            document.getElementById('adminLoginInfo').style.color = '#10b981';
                        } else {
                            document.getElementById('adminLoginInfo').textContent = '密码错误';
                            document.getElementById('adminLoginInfo').style.color = '#ef4444';
                        }
                    });
                }
                
                refreshBackButton();
            }

            function resetAll() {
                innerDynamic.innerHTML = '';
                backContainer.innerHTML = '';
            }
            
            function createBackButton() {
                const backBtn = document.createElement('div');
                backBtn.className = 'back-btn-modern';
                backBtn.innerHTML = '<i class="fas fa-arrow-left"></i> 返回';
                backBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    historyStack.pop();
                    
                    if (historyStack.length === 0) {
                        showSupernaturalInitial(false);
                        return;
                    }
                    
                    const prevView = historyStack[historyStack.length - 1];
                    
                    switch(prevView) {
                        case VIEWS.SUPERNATURAL_INITIAL:
                            showSupernaturalInitial(false);
                            break;
                        case VIEWS.SIGNATURE_PAGE:
                            showSignaturePage(false);
                            break;
                        case VIEWS.SUBMIT_SIGNATURE:
                            showSubmitSignature(false);
                            break;
                        case VIEWS.ADMIN_PAGE:
                            showAdminPage(false);
                            break;
                        default:
                            showSupernaturalInitial(false);
                    }
                    
                    searchInput.value = '';
                    setTimeout(() => {
                        const contentArea = document.querySelector('.content-area');
                        if (contentArea) contentArea.scrollTop = 0;
                    }, 10);
                });
                return backBtn;
            }
            
            function refreshBackButton() {
                backContainer.innerHTML = '';
                if (historyStack.length >= 2) {
                    const backBtn = createBackButton();
                    backContainer.appendChild(backBtn);
                }
            }

            function performGlobalSearch() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const allCurrentCards = document.querySelectorAll('#innerDynamic .menu-card, #innerDynamic .category-card, #innerDynamic .item-card, #innerDynamic .signature-card, #innerDynamic .value-card-modern');
                
                if (searchTerm === '') {
                    allCurrentCards.forEach(card => {
                        if (card) {
                            card.style.display = '';
                            card.classList.remove('search-highlight');
                        }
                    });
                    const existingTip = document.getElementById('searchNoResultTip');
                    if (existingTip) existingTip.remove();
                    return;
                }
                
                let hasMatch = false;
                
                allCurrentCards.forEach(card => {
                    if (!card) return;
                    const cardText = card.textContent ? card.textContent.toLowerCase() : '';
                    if (cardText.includes(searchTerm)) {
                        card.style.display = '';
                        card.classList.add('search-highlight');
                        hasMatch = true;
                    } else {
                        card.style.display = 'none';
                        card.classList.remove('search-highlight');
                    }
                });
                
                const existingTip = document.getElementById('searchNoResultTip');
                if (existingTip) existingTip.remove();
                
                if (!hasMatch && allCurrentCards.length > 0) {
                    const tip = document.createElement('div');
                    tip.id = 'searchNoResultTip';
                    tip.style.cssText = `
                        text-align: center;
                        color: #9ca3af;
                        padding: 2rem;
                        font-size: 1rem;
                        background: rgba(30,20,50,0.3);
                        border-radius: 2rem;
                        margin-top: 1rem;
                        line-height: 1.6;
                    `;
                    tip.innerHTML = `🔍 未找到"${searchInput.value}"`;
                    innerDynamic.appendChild(tip);
                }
                
                const contentArea = document.querySelector('.content-area');
                if (contentArea) contentArea.scrollTop = 0;
            }

            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(performGlobalSearch, 50);
            });

            function showSupernaturalInitial(pushToHistory = true) {
                resetAll();
                
                if (pushToHistory) {
                    historyStack.push(VIEWS.SUPERNATURAL_INITIAL);
                }
                
                statusTag.textContent = 'NXLD数值库';
                
                const menuGrid = document.createElement('div');
                menuGrid.className = 'main-menu-grid';
                
                const modeCard = document.createElement('div');
                modeCard.className = 'menu-card';
                modeCard.setAttribute('data-name', '模式数值');
                modeCard.innerHTML = `
                    <div class="menu-icon"><i class="fas fa-layer-group"></i></div>
                    <span>模式数值</span>
                    <small>开发中</small>
                `;
                modeCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast('功能开发中');
                });
                
                const itemCard = document.createElement('div');
                itemCard.className = 'menu-card';
                itemCard.setAttribute('data-name', '局内物品');
                itemCard.innerHTML = `
                    <div class="menu-icon"><i class="fas fa-box"></i></div>
                    <span>局内物品</span>
                    <small>开发中</small>
                `;
                itemCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast('功能开发中');
                });
                
                const skinCard = document.createElement('div');
                skinCard.className = 'menu-card skin';
                skinCard.setAttribute('data-name', '皮肤数值');
                skinCard.innerHTML = `
                    <div class="menu-icon"><i class="fas fa-palette"></i></div>
                    <span>皮肤数值</span>
                    <small>开发中</small>
                `;
                skinCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast('功能开发中');
                });
                
                const signatureCard = document.createElement('div');
                signatureCard.className = 'menu-card signature';
                signatureCard.setAttribute('data-name', '主页签名');
                signatureCard.innerHTML = `
                    <div class="menu-icon"><i class="fas fa-signature"></i></div>
                    <span>主页签名</span>
                    <small>点击查看</small>
                `;
                signatureCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showSignaturePage();
                    searchInput.value = '';
                });
                
                menuGrid.appendChild(modeCard);
                menuGrid.appendChild(itemCard);
                menuGrid.appendChild(skinCard);
                menuGrid.appendChild(signatureCard);
                
                innerDynamic.innerHTML = '';
                innerDynamic.appendChild(menuGrid);
                
                refreshBackButton();
                setTimeout(performGlobalSearch, 10);
            }

            const VIEWS = {
                SUPERNATURAL_INITIAL: 'supernaturalInitial',
                SIGNATURE_PAGE: 'signaturePage',
                SUBMIT_SIGNATURE: 'submitSignature',
                ADMIN_PAGE: 'adminPage'
            };

            supernaturalBtn.addEventListener('click', function() {
                if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== VIEWS.SUPERNATURAL_INITIAL) {
                    historyStack = [];
                    showSupernaturalInitial();
                    searchInput.value = '';
                }
            });

            agreementBtn.addEventListener('click', function() {
                agreementModal.classList.add('show');
            });

            closeAgreement.addEventListener('click', function() {
                agreementModal.classList.remove('show');
            });

            agreementModal.addEventListener('click', function(e) {
                if (e.target === agreementModal) {
                    agreementModal.classList.remove('show');
                }
            });

            thanksBtn.addEventListener('click', function() {
                thanksModal.classList.add('show');
            });

            closeThanks.addEventListener('click', function() {
                thanksModal.classList.remove('show');
            });

            thanksModal.addEventListener('click', function(e) {
                if (e.target === thanksModal) {
                    thanksModal.classList.remove('show');
                }
            });

            submitSignatureBtn.addEventListener('click', function() {
                showSubmitSignature();
                searchInput.value = '';
            });

            adminBtn.addEventListener('click', function() {
                currentAdminLevel = 'guest';
                showAdminPage();
                searchInput.value = '';
            });

            window.addEventListener('load', async function() {
                setCloudStatus('syncing', '连接数据库...');
                await loadFromSupabase();
                setupRealtime();
                showSupernaturalInitial();
                
                // 隐藏加载动画
                if (loadingSpinner) {
                    loadingSpinner.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
