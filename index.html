<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NXLD数值库</title>
    <!-- 现代字体 - 使用更优雅的字体组合 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0f1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态渐变背景 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 - 更现代的无边框设计 */
        .modern-container {
            position: relative;
            z-index: 10;
            max-width: 1600px;
            width: 100%;
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            padding: 2.5rem;
            transition: all 0.3s ease;
        }

        /* 头部区域 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .logo-text .sub {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 搜索框 - 全新设计 */
        .search-wrapper {
            position: relative;
            width: 300px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 1rem;
            pointer-events: none;
        }

        .search-box-modern {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f0f2ff;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .search-box-modern:focus {
            outline: none;
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .search-box-modern::placeholder {
            color: #6b7280;
            font-weight: 300;
        }

        /* 知情协议按钮 */
        .agreement-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .agreement-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .agreement-btn i {
            color: #818cf8;
            font-size: 0.9rem;
        }

        /* 提交签名按钮 */
        .submit-signature-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .submit-signature-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        /* 管理员入口按钮 */
        .admin-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .admin-btn i {
            color: #f59e0b;
            font-size: 0.9rem;
        }

        /* 致谢名单按钮 */
        .thanks-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .thanks-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .thanks-btn i {
            color: #fbbf24;
            font-size: 0.9rem;
        }

        /* 版权年份标签 */
        .year-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .year-badge i {
            color: #818cf8;
            font-size: 0.8rem;
        }

        /* 阵营切换卡片 */
        .faction-switch {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            width: fit-content;
        }

        .faction-btn {
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #9ca3af;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .faction-btn i {
            font-size: 1.1rem;
        }

        .faction-btn.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        /* 主要内容区域 */
        .content-area {
            background: rgba(10, 12, 26, 0.4);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            min-height: 500px;
            max-height: 800px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4b5563 #1f2937;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }

        /* 状态标签 */
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }

        .status-badge {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge i {
            font-size: 0.8rem;
            color: #818cf8;
        }

        /* 返回按钮 */
        .back-btn-modern {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d5db;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .back-btn-modern:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        /* 主菜单按钮网格 */
        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(5px);
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -15px #000;
        }

        .menu-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
        }

        .menu-card.skin .menu-icon {
            background: linear-gradient(135deg, #b453b6, #d946ef);
        }

        .menu-card.signature .menu-icon {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .menu-card span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e5e7eb;
        }

        .menu-card small {
            font-size: 0.8rem;
            color: #6b7280;
        }

        /* 分类网格 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .category-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: scale(1.02);
        }

        .category-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 1rem;
            background: rgba(129, 140, 248, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #818cf8;
            font-size: 1.2rem;
        }

        .category-card span {
            font-size: 0.95rem;
            font-weight: 500;
            color: #d1d5db;
        }

        /* 物品网格 */
        .item-grid-modern {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.2rem;
            padding: 0.9rem 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 400;
            color: #d1d5db;
            cursor: pointer;
            transition: all 0.18s;
            min-height: 60px;
            word-break: break-word;
        }

        .item-card:hover {
            background: rgba(129, 140, 248, 0.1);
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        /* 数值卡片 */
        .value-card-modern {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.15), rgba(124, 58, 237, 0.15));
            border: 2px solid rgba(129, 140, 248, 0.4);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px -20px #4f46e5;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .value-card-modern:hover {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.25), rgba(124, 58, 237, 0.25));
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(129, 140, 248, 0.4);
        }

        .value-card-modern:active {
            transform: scale(0.98);
        }

        .value-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f0f2ff;
            text-shadow: 0 0 20px rgba(129, 140, 248, 0.5);
            word-break: break-all;
            margin-bottom: 1rem;
        }

        .copy-hint-value {
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .value-card-modern:hover .copy-hint-value {
            opacity: 1;
        }

        /* 签名卡片容器 */
        .signature-card-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 签名卡片样式 */
        .signature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 1.2rem;
            padding: 1rem 0.8rem 0.4rem 0.8rem;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 192, 203, 0.1);
            line-height: 1.4;
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 130px;
            justify-content: space-between;
        }

        .signature-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 182, 193, 0.6);
            transform: scale(1.01);
            box-shadow: 0 0 15px rgba(255, 192, 203, 0.2);
        }

        .signature-card:active {
            transform: scale(0.99);
        }

        .signature-text {
            font-size: 0.8rem;
            font-weight: 400;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.2);
            line-height: 1.4;
            margin-bottom: 0.3rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* QQ标签 */
        .signature-qq {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.3px;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.3rem;
            border-radius: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            width: fit-content;
            margin: 0.1rem auto 0 auto;
            transition: color 0.2s;
            line-height: 1.2;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signature-card:hover .signature-qq {
            color: rgba(255, 255, 255, 0.7);
        }

        /* 复制提示 */
        .copy-hint {
            margin-top: 0.2rem;
            font-size: 0.5rem;
            color: #9ca3af;
            opacity: 0.4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
        }

        .signature-card:hover .copy-hint {
            opacity: 0.7;
        }

        /* 签名网格 */
        .signature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
            position: relative;
        }

        /* 提交表单样式 */
        .submit-form {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(129, 140, 248, 0.2);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: #d1d5db;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f2ff;
            font-size: 0.95rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            resize: vertical;
        }

        .form-input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .form-textarea {
            min-height: 120px;
        }

        .submit-button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 1rem 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        .submit-info {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.5rem;
            background: rgba(129, 140, 248, 0.05);
            border-radius: 1rem;
        }

        /* QQ查询结果 */
        .query-section {
            margin-top: 2rem;
        }

        .query-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .query-button {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .query-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        .query-result {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 1.5rem;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .query-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .query-item:last-child {
            border-bottom: none;
        }

        .query-item-info {
            flex: 1;
        }

        .query-item-qq {
            color: #818cf8;
            font-size: 0.8rem;
        }

        .query-item-status {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .query-item-status.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .query-item-status.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        /* 管理员下载按钮 */
        .download-html-btn {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
            width: 100%;

            // 创建返回按钮
            function createBackButton() {
                const backBtn = document.createElement('div');
                backBtn.className = 'back-btn-modern';
                backBtn.innerHTML = '<i class="fas fa-arrow-left"></i> 返回上一级';
                backBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    historyStack.pop();
                    
                    if (historyStack.length === 0) {
                        showSupernaturalInitial(false);
                        return;
                    }
                    
                    const prevView = historyStack[historyStack.length - 1];
                    
                    switch(prevView) {
                        case VIEWS.SUPERNATURAL_INITIAL:
                            showSupernaturalInitial(false);
                            break;
                        case VIEWS.SECRET_GRID:
                            showSecretGridOnly(false);
                            break;
                        case VIEWS.ITEM_LIST:
                            showItemListOnly(false);
                            break;
                        case VIEWS.SKIN_CATEGORY:
                            showSkinCategoryOnly(false);
                            break;
                        case VIEWS.PROP_CATEGORY:
                            showPropCategory(false);
                            break;
                        case VIEWS.DECOR_CATEGORY:
                            showDecorCategory(false);
                            break;
                        case VIEWS.DECOR_DETAIL:
                            showDecorDetail(currentDecorCategory, false);
                            break;
                        case VIEWS.ROLE_CATEGORY:
                            showRoleCategory(false);
                            break;
                        case VIEWS.ROLE_DETAIL:
                            showRoleDetail(currentRoleCategory, false);
                            break;
                        case VIEWS.DANCE_SKIN_LIST:
                            showDanceSkinList(false);
                            break;
                        case VIEWS.TEAM_ROW:
                            showTeamRowOnly(false);
                            break;
                        case VIEWS.JINGJUE_DIFFICULTY:
                            showJingjueDifficultyOnly(false);
                            break;
                        case VIEWS.KUNLUN_DIFFICULTY:
                            showKunlunDifficultyOnly(false);
                            break;
                        case VIEWS.QINLING_DIFFICULTY:
                            showQinlingDifficultyOnly(false);
                            break;
                        case VIEWS.SUBTEAM:
                            showSubteamRow(false);
                            break;
                        case VIEWS.PROP_SKIN_DETAIL:
                            showPropSkinDetail(currentPropCategory, false);
                            break;
                        case VIEWS.DIFFICULTY:
                            showDifficultyOnly(false);
                            break;
                        case VIEWS.SIGNATURE_PAGE:
                            showSignaturePage(false);
                            break;
                        case VIEWS.SUBMIT_SIGNATURE:
                            showSubmitSignature(false);
                            break;
                        case VIEWS.ADMIN_PAGE:
                            showAdminPage(false);
                            break;
                        case VIEWS.SKIN_VALUE:
                            if (historyStack.length > 1) {
                                const secondLast = historyStack[historyStack.length - 2];
                                if (secondLast === VIEWS.PROP_SKIN_DETAIL) {
                                    showPropSkinDetail(currentPropCategory, false);
                                } else if (secondLast === VIEWS.DECOR_DETAIL) {
                                    showDecorDetail(currentDecorCategory, false);
                                } else if (secondLast === VIEWS.ROLE_DETAIL) {
                                    showRoleDetail(currentRoleCategory, false);
                                } else if (secondLast === VIEWS.DANCE_SKIN_LIST) {
                                    showDanceSkinList(false);
                                } else if (secondLast === VIEWS.ITEM_LIST) {
                                    showItemListOnly(false);
                                } else {
                                    showSupernaturalInitial(false);
                                }
                            } else {
                                showSupernaturalInitial(false);
                            }
                            break;
                        default:
                            showSupernaturalInitial(false);
                    }
                    
                    searchInput.value = '';
                    setTimeout(() => {
                        const contentArea = document.querySelector('.content-area');
                        if (contentArea) contentArea.scrollTop = 0;
                    }, 10);
                });
                return backBtn;

            // 搜索功能
            function performGlobalSearch() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const allCurrentCards = document.querySelectorAll('#innerDynamic .menu-card, #innerDynamic .category-card, #innerDynamic .item-card, #innerDynamic .signature-card, #innerDynamic .value-card-modern');
                
                if (searchTerm === '') {
                    allCurrentCards.forEach(card => {
                        if (card) {
                            card.style.display = '';
                            card.classList.remove('search-highlight');
                        }
                    });
                    const existingTip = document.getElementById('searchNoResultTip');
                    if (existingTip) existingTip.remove();
                    const contentArea = document.querySelector('.content-area');
                    if (contentArea) contentArea.scrollTop = 0;
                    return;
                }

                let hasMatch = false;
                
                allCurrentCards.forEach(card => {
                    if (!card) return;
                    const cardText = card.textContent ? card.textContent.toLowerCase() : '';
                    if (cardText.includes(searchTerm)) {
                        card.style.display = '';
                        card.classList.add('search-highlight');
                        hasMatch = true;
                    } else {
                        card.style.display = 'none';
                        card.classList.remove('search-highlight');
                    }
                });

                const existingTip = document.getElementById('searchNoResultTip');
                if (existingTip) existingTip.remove();
                
                if (!hasMatch && allCurrentCards.length > 0) {
                    const matchedItems = globalButtonDB.filter(item => 
                        typeof item === 'string' && item.toLowerCase().includes(searchTerm)
                    );
                    
                    let tipMessage = `🔍 未找到"${searchInput.value}"`;
                    if (matchedItems.length > 0) {
                        tipMessage += `<br><br>可在以下层级查找：<br>`;
                        matchedItems.slice(0, 5).forEach(item => {
                            tipMessage += `· ${item}<br>`;
                        });
                        if (matchedItems.length > 5) {
                            tipMessage += `... 还有${matchedItems.length - 5}个`;
                        }
                    }
                    
                    const tip = document.createElement('div');
                    tip.id = 'searchNoResultTip';
                    tip.style.cssText = `
                        text-align: center;
                        color: #9ca3af;
                        padding: 2rem;
                        font-size: 1rem;
                        background: rgba(30,20,50,0.3);
                        border-radius: 2rem;
                        margin-top: 1rem;
                        line-height: 1.6;
                    `;
                    tip.innerHTML = tipMessage;
                    innerDynamic.appendChild(tip);
                }
                
                const contentArea = document.querySelector('.content-area');
                if (contentArea) contentArea.scrollTop = 0;
            }

            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);

            // 上传HTML文件
            function uploadHtmlFile() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.html,.htm';
                
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    
                    reader.onload = (event) => {
                        try {
                            const content = event.target.result;
                            
                            // 尝试从HTML文件中提取已通过的签名数据
                            // 这里使用正则表达式查找 localStorage 中的数据
                            const approvedMatch = content.match(/approvedSignatures\s*=\s*JSON\.parse\(localStorage\.getItem\(['"]approvedSignatures['"]\)\s*\|\|\s*'(\[.*?\])'/);
                            
                            if (approvedMatch && approvedMatch[1]) {
                                const importedApproved = JSON.parse(approvedMatch[1]);
                                if (Array.isArray(importedApproved)) {
                                    // 合并签名，避免重复
                                    const existingMap = new Map();
                                    approvedSignatures.forEach(s => existingMap.set(s.qq + s.content, s));
                                    importedApproved.forEach(s => {
                                        const key = s.qq + s.content;
                                        if (!existingMap.has(key)) {
                                            approvedSignatures.push(s);
                                            existingMap.set(key, s);
                                        }
                                    });
                                    
                                    localStorage.setItem('approvedSignatures', JSON.stringify(approvedSignatures));
                                    
                                    addLog('上传文件', `成功导入 ${importedApproved.length} 个签名`, 'uploaded');
                                    showToast(`成功导入 ${importedApproved.length} 个签名`);
                                    
                                    // 刷新管理员面板
                                    showAdminPanel();
                                }
                            } else {
                                showToast('未在文件中找到有效的签名数据');
                            }
                        } catch (err) {
                            console.error('解析文件失败:', err);
                            showToast('文件解析失败，请确保上传的是正确的备份文件');
                        }
                    };
                    
                    reader.readAsText(file);
                };
                
                input.click();
            }

            // 下载当前HTML文件
