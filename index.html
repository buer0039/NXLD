<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NXLD数值库</title>
    
    <!-- 防调试检测脚本 - 修复手机端误判 -->
    <script>
        (function() {
            // 警告页面URL
            const WARNING_URL = 'https://wjjz.wjzyw.top/projects/FZB/index.html';
            
            // 检测是否为移动设备
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // 生成唯一设备码
            function generateDeviceId() {
                try {
                    // 获取多个设备特征
                    const screenRes = `${screen.width}x${screen.height}`;
                    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    const language = navigator.language;
                    const userAgent = navigator.userAgent;
                    const platform = navigator.platform;
                    const cores = navigator.hardwareConcurrency || 0;
                    const memory = navigator.deviceMemory || 0;
                    const touchPoints = navigator.maxTouchPoints || 0;
                    
                    // 组合特征
                    const features = `${screenRes}|${timezone}|${language}|${platform}|${cores}|${memory}|${touchPoints}|${userAgent.substring(0, 100)}`;
                    
                    // 简单哈希
                    let hash = 0;
                    for (let i = 0; i < features.length; i++) {
                        const char = features.charCodeAt(i);
                        hash = ((hash << 5) - hash) + char;
                        hash = hash & hash;
                    }
                    
                    return Math.abs(hash).toString(16).toUpperCase();
                } catch(e) {
                    return Math.random().toString(36).substring(2, 15);
                }
            }
            
            // 设备码
            const DEVICE_ID = generateDeviceId();
            
            // 云端锁定状态存储key
            const LOCKED_DEVICES_KEY = 'nxld_locked_devices';
            const DETECT_COUNT_KEY_PREFIX = 'nxld_detect_count_';
            
            // 标记是否已跳转
            let hasRedirected = false;
            
            // 页面加载时间
            const pageLoadTime = Date.now();
            
            // 检查当前设备是否被锁定
            function isDeviceLocked() {
                try {
                    const lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    return lockedDevices.includes(DEVICE_ID);
                } catch(e) {
                    return false;
                }
            }
            
            // 锁定当前设备
            function lockDevice(reason) {
                try {
                    const lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    if (!lockedDevices.includes(DEVICE_ID)) {
                        lockedDevices.push(DEVICE_ID);
                        localStorage.setItem(LOCKED_DEVICES_KEY, JSON.stringify(lockedDevices));
                        localStorage.setItem(`nxld_lock_reason_${DEVICE_ID}`, reason);
                        localStorage.setItem(`nxld_lock_time_${DEVICE_ID}`, new Date().toISOString());
                    }
                    return true;
                } catch(e) {
                    return false;
                }
            }
            
            // 解锁指定设备
            function unlockDevice(deviceId) {
                try {
                    let lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    lockedDevices = lockedDevices.filter(id => id !== deviceId);
                    localStorage.setItem(LOCKED_DEVICES_KEY, JSON.stringify(lockedDevices));
                    localStorage.removeItem(`nxld_lock_reason_${deviceId}`);
                    localStorage.removeItem(`nxld_lock_time_${deviceId}`);
                    return true;
                } catch(e) {
                    return false;
                }
            }
            
            // 获取所有被锁定的设备
            function getLockedDevices() {
                try {
                    return JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                } catch(e) {
                    return [];
                }
            }
            
            // 获取设备检测次数
            function getDeviceDetectCount() {
                try {
                    return parseInt(localStorage.getItem(DETECT_COUNT_KEY_PREFIX + DEVICE_ID) || '0');
                } catch(e) {
                    return 0;
                }
            }
            
            // 增加检测计数
            function incrementDetectCount() {
                try {
                    let count = getDeviceDetectCount();
                    count++;
                    localStorage.setItem(DETECT_COUNT_KEY_PREFIX + DEVICE_ID, count.toString());
                    
                    // 检测到3次就锁定设备
                    if (count >= 3) {
                        lockDevice('检测到' + count + '次调试行为，设备已被锁定');
                        return true;
                    }
                    return false;
                } catch(e) {
                    return false;
                }
            }
            
            // 立即跳转函数
            function redirectToWarning() {
                if (hasRedirected) return;
                hasRedirected = true;
                
                // 增加检测计数并检查是否需要锁定
                const shouldLock = incrementDetectCount();
                
                // 跳转
                window.location.href = WARNING_URL;
            }
            
            // 如果当前设备已被锁定，立即跳转
            if (isDeviceLocked()) {
                window.location.href = WARNING_URL;
            }
            
            // ========== 手机端优化的检测功能 ==========
            
            // 手机端检测阈值调整
            const MOBILE_TIME_THRESHOLD = 150; // 手机端时间阈值提高
            const PC_TIME_THRESHOLD = 50;       // PC端时间阈值
            
            const timeThreshold = isMobile ? MOBILE_TIME_THRESHOLD : PC_TIME_THRESHOLD;
            const sizeThreshold = isMobile ? 300 : 150; // 手机端尺寸阈值提高
            
            // 检测控制台打开（优化手机端）
            let consoleCheckCount = 0;
            let lastConsoleTime = 0;
            
            function detectConsoleOpen() {
                // 手机端降低检测频率，避免误判
                if (isMobile && (Date.now() - pageLoadTime < 5000)) {
                    return;
                }
                
                const before = Date.now();
                console.log('%c', 'color: transparent');
                const after = Date.now();
                const timeDiff = after - before;
                
                // 手机端使用更高的阈值
                if (timeDiff > timeThreshold) {
                    const now = Date.now();
                    if (now - lastConsoleTime < (isMobile ? 3000 : 2000)) {
                        consoleCheckCount++;
                        // 手机端需要更多次确认
                        const requiredCount = isMobile ? 5 : 3;
                        if (consoleCheckCount >= requiredCount) {
                            redirectToWarning();
                        }
                    } else {
                        consoleCheckCount = 1;
                    }
                    lastConsoleTime = now;
                } else {
                    consoleCheckCount = 0;
                }
            }
            
            // 检测窗口尺寸变化（手机端基本不适用，降低灵敏度）
            let sizeCheckCount = 0;
            let lastSizeCheck = 0;
            
            function detectDevToolsBySize() {
                // 手机端跳过尺寸检测（手机键盘弹出会误判）
                if (isMobile) return;
                
                const widthDiff = Math.abs(window.outerWidth - window.innerWidth);
                const heightDiff = Math.abs(window.outerHeight - window.innerHeight);
                
                if (widthDiff > sizeThreshold || heightDiff > sizeThreshold) {
                    const now = Date.now();
                    if (now - lastSizeCheck < 500) {
                        sizeCheckCount++;
                        if (sizeCheckCount >= 2) {
                            redirectToWarning();
                        }
                    } else {
                        sizeCheckCount = 1;
                    }
                    lastSizeCheck = now;
                } else {
                    sizeCheckCount = 0;
                }
            }
            
            // 检测快捷键（手机端没有物理键盘，跳过）
            let shortcutCount = 0;
            let lastShortcutTime = 0;
            
            function detectDevToolsShortcut(e) {
                // 手机端跳过快捷键检测
                if (isMobile) return;
                
                const isDevToolKey = e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                    (e.ctrlKey && (e.key === 'U' || e.key === 'R')) ||
                    (e.ctrlKey && e.key === 'r');
                
                if (isDevToolKey) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const now = Date.now();
                    if (now - lastShortcutTime < 1000) {
                        shortcutCount++;
                        if (shortcutCount >= 2) {
                            redirectToWarning();
                        }
                    } else {
                        shortcutCount = 1;
                    }
                    lastShortcutTime = now;
                    return false;
                }
            }
            
            // 检测右键菜单（手机端没有右键）
            function disableRightClick(e) {
                if (isMobile) return;
                e.preventDefault();
                return false;
            }
            
            // 检测元素检查（手机端很少使用，降低灵敏度）
            let mutationCount = 0;
            let lastMutationTime = 0;
            
            function detectElementInspection() {
                const observer = new MutationObserver(function(mutations) {
                    // 手机端降低检测灵敏度
                    if (isMobile && (Date.now() - pageLoadTime < 3000)) return;
                    
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'attributes') {
                            const now = Date.now();
                            if (now - lastMutationTime < (isMobile ? 1000 : 500)) {
                                mutationCount++;
                                const requiredCount = isMobile ? 10 : 5;
                                if (mutationCount >= requiredCount) {
                                    redirectToWarning();
                                }
                            } else {
                                mutationCount = 1;
                            }
                            lastMutationTime = now;
                        }
                    });
                });
                
                observer.observe(document.documentElement, {
                    attributes: true,
                    attributeFilter: ['style', 'class', 'id']
                });
            }
            
            // 重写console方法（手机端降低灵敏度）
            let consoleCommandCount = 0;
            let lastCommandTime = 0;
            
            const originalLog = console.log;
            const originalWarn = console.warn;
            const originalError = console.error;
            
            console.log = function() {
                // 手机端降低检测频率
                if (isMobile && (Date.now() - pageLoadTime < 3000)) {
                    originalLog.apply(console, arguments);
                    return;
                }
                
                const now = Date.now();
                if (now - lastCommandTime < (isMobile ? 200 : 100)) {
                    consoleCommandCount++;
                    const requiredCount = isMobile ? 8 : 5;
                    if (consoleCommandCount >= requiredCount) {
                        redirectToWarning();
                    }
                } else {
                    consoleCommandCount = 1;
                }
                lastCommandTime = now;
                originalLog.apply(console, arguments);
            };
            
            console.warn = function() {
                if (isMobile && (Date.now() - pageLoadTime < 3000)) {
                    originalWarn.apply(console, arguments);
                    return;
                }
                
                const now = Date.now();
                if (now - lastCommandTime < (isMobile ? 200 : 100)) {
                    consoleCommandCount++;
                    const requiredCount = isMobile ? 8 : 5;
                    if (consoleCommandCount >= requiredCount) {
                        redirectToWarning();
                    }
                } else {
                    consoleCommandCount = 1;
                }
                lastCommandTime = now;
                originalWarn.apply(console, arguments);
            };
            
            console.error = function() {
                if (isMobile && (Date.now() - pageLoadTime < 3000)) {
                    originalError.apply(console, arguments);
                    return;
                }
                
                const now = Date.now();
                if (now - lastCommandTime < (isMobile ? 200 : 100)) {
                    consoleCommandCount++;
                    const requiredCount = isMobile ? 8 : 5;
                    if (consoleCommandCount >= requiredCount) {
                        redirectToWarning();
                    }
                } else {
                    consoleCommandCount = 1;
                }
                lastCommandTime = now;
                originalError.apply(console, arguments);
            };
            
            // ========== CE/GG 修改器检测（手机端跳过） ==========
            
            let modifierDetectCount = 0;
            let lastModifierTime = 0;
            
            function detectMemoryModifiers() {
                // 手机端跳过修改器检测（手机端很少使用修改器）
                if (isMobile) return;
                
                const userAgent = window.navigator.userAgent.toLowerCase();
                const suspiciousPatterns = ['cheat', 'guardian', 'memory editor', 'speed hack'];
                
                let hasSuspicious = false;
                for (let i = 0; i < suspiciousPatterns.length; i++) {
                    if (userAgent.includes(suspiciousPatterns[i])) {
                        hasSuspicious = true;
                        break;
                    }
                }
                
                const suspiciousGlobals = ['GG', 'CHEAT_ENGINE', 'MemoryHack', 'SpeedHack', 'GameGuardian', 'CheatEngine'];
                for (let i = 0; i < suspiciousGlobals.length; i++) {
                    if (window[suspiciousGlobals[i]] !== undefined) {
                        hasSuspicious = true;
                        break;
                    }
                }
                
                if (hasSuspicious) {
                    const now = Date.now();
                    if (now - lastModifierTime < 3000) {
                        modifierDetectCount++;
                        if (modifierDetectCount >= 2) {
                            redirectToWarning();
                        }
                    } else {
                        modifierDetectCount = 1;
                    }
                    lastModifierTime = now;
                } else {
                    modifierDetectCount = 0;
                }
            }
            
            // 帧率检测（手机端降低灵敏度）
            let lastFrameTime = performance.now();
            let abnormalFrameCount = 0;
            
            function checkFrameRate() {
                // 手机端降低检测频率
                if (isMobile && (Date.now() - pageLoadTime < 5000)) {
                    lastFrameTime = performance.now();
                    requestAnimationFrame(checkFrameRate);
                    return;
                }
                
                const now = performance.now();
                const delta = now - lastFrameTime;
                
                // 手机端使用更宽松的阈值
                const minDelta = isMobile ? 3 : 5;
                const maxDelta = isMobile ? 200 : 100;
                const requiredCount = isMobile ? 15 : 10;
                
                if (delta < minDelta || delta > maxDelta) {
                    abnormalFrameCount++;
                    if (abnormalFrameCount > requiredCount) {
                        redirectToWarning();
                    }
                } else {
                    abnormalFrameCount = Math.max(0, abnormalFrameCount - 1);
                }
                
                lastFrameTime = now;
                requestAnimationFrame(checkFrameRate);
            }
            
            // 检测悬浮窗（手机端跳过）
            function detectOverlay() {
                if (isMobile) return;
                
                setInterval(function() {
                    const allElements = document.getElementsByTagName('*');
                    for (let i = 0; i < Math.min(allElements.length, 100); i++) {
                        const zIndex = window.getComputedStyle(allElements[i]).zIndex;
                        if (zIndex && parseInt(zIndex) > 999999) {
                            redirectToWarning();
                            break;
                        }
                    }
                }, 2000);
            }
            
            // ========== 初始化检测 ==========
            
            document.addEventListener('keydown', detectDevToolsShortcut);
            document.addEventListener('contextmenu', disableRightClick);
            detectElementInspection();
            
            // 手机端降低检测频率
            const detectInterval = isMobile ? 2000 : 500;
            
            setInterval(function() {
                detectDevToolsBySize();
                detectConsoleOpen();
                detectMemoryModifiers();
            }, detectInterval);
            
            // 延迟启动帧率检测
            setTimeout(() => {
                requestAnimationFrame(checkFrameRate);
            }, isMobile ? 8000 : 3000);
            
            // 延迟启动悬浮窗检测
            setTimeout(() => {
                detectOverlay();
            }, 5000);
            
            if (window.self !== window.top) {
                redirectToWarning();
            }
            
            if (/HeadlessChrome/.test(window.navigator.userAgent)) {
                redirectToWarning();
            }
            
            if (window.navigator.webdriver || window.navigator.webdriver === true) {
                redirectToWarning();
            }
            
            // 手机端延迟显示提示，避免干扰
            setTimeout(function() {
                console.log('✅ 安全防护已启动 - 设备码: ' + DEVICE_ID + (isMobile ? ' (移动端模式)' : ' (PC端模式)'));
            }, 2000);
            
            setTimeout(function() {
                const style = document.createElement('style');
                style.textContent = `
                    .security-tip {
                        position: fixed;
                        bottom: 60px;
                        left: 20px;
                        background: rgba(16, 185, 129, 0.9);
                        color: white;
                        padding: 6px 12px;
                        border-radius: 20px;
                        font-size: 11px;
                        z-index: 9999;
                        backdrop-filter: blur(4px);
                        pointer-events: none;
                        font-family: monospace;
                    }
                `;
                document.head.appendChild(style);
                const tip = document.createElement('div');
                tip.className = 'security-tip';
                tip.innerHTML = '🔒 安全防护已启动';
                document.body.appendChild(tip);
                setTimeout(() => tip.remove(), 3000);
            }, 2000);
            
            document.addEventListener('selectstart', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    return true;
                }
                e.preventDefault();
                return false;
            });
            
            document.addEventListener('copy', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    return true;
                }
                e.preventDefault();
                return false;
            });
            
            // 导出全局函数供管理员使用
            window.__getDeviceId = function() { return DEVICE_ID; };
            window.__getLockedDevices = getLockedDevices;
            window.__unlockDevice = unlockDevice;
            window.__isDeviceLocked = isDeviceLocked;
            window.__isMobile = isMobile;
        })();
    </script>
