<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NXLD数值库</title>
    <!-- 现代字体 - 使用更优雅的字体组合 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0f1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态渐变背景 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 - 更现代的无边框设计 */
        .modern-container {
            position: relative;
            z-index: 10;
            max-width: 1600px;
            width: 100%;
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            padding: 2.5rem;
            transition: all 0.3s ease;
        }

        /* 头部区域 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .logo-text .sub {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 搜索框 - 全新设计 */
        .search-wrapper {
            position: relative;
            width: 300px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 1rem;
            pointer-events: none;
        }

        .search-box-modern {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f0f2ff;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .search-box-modern:focus {
            outline: none;
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .search-box-modern::placeholder {
            color: #6b7280;
            font-weight: 300;
        }

        /* 知情协议按钮 */
        .agreement-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .agreement-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .agreement-btn i {
            color: #818cf8;
            font-size: 0.9rem;
        }

        /* 致谢名单按钮 - 新增 */
        .thanks-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .thanks-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .thanks-btn i {
            color: #fbbf24;
            font-size: 0.9rem;
        }

        /* 版权年份标签 */
        .year-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .year-badge i {
            color: #818cf8;
            font-size: 0.8rem;
        }

        /* 阵营切换卡片 - 现在只保留一个阵营，但保留样式以备后用 */
        .faction-switch {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            width: fit-content;
        }

        .faction-btn {
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #9ca3af;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .faction-btn i {
            font-size: 1.1rem;
        }

        .faction-btn.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        /* 主要内容区域 - 卡片式布局 */
        .content-area {
            background: rgba(10, 12, 26, 0.4);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            min-height: 500px;
            max-height: 800px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4b5563 #1f2937;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }

        /* 状态标签 */
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }

        .status-badge {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge i {
            font-size: 0.8rem;
            color: #818cf8;
        }

        /* 返回按钮 */
        .back-btn-modern {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d5db;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .back-btn-modern:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        /* 主菜单按钮网格 - 全新卡片式设计 */
        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(5px);
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -15px #000;
        }

        .menu-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
        }

        .menu-card.skin .menu-icon {
            background: linear-gradient(135deg, #b453b6, #d946ef);
        }

        .menu-card.signature .menu-icon {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .menu-card span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e5e7eb;
        }

        .menu-card small {
            font-size: 0.8rem;
            color: #6b7280;
        }

        /* 分类网格 - 用于皮肤分类/道具分类 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .category-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: scale(1.02);
        }

        .category-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 1rem;
            background: rgba(129, 140, 248, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #818cf8;
            font-size: 1.2rem;
        }

        .category-card span {
            font-size: 0.95rem;
            font-weight: 500;
            color: #d1d5db;
        }

        /* 物品网格 - 用于显示具体物品/皮肤 */
        .item-grid-modern {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.2rem;
            padding: 0.9rem 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 400;
            color: #d1d5db;
            cursor: pointer;
            transition: all 0.18s;
            min-height: 60px;
            word-break: break-word;
        }

        .item-card:hover {
            background: rgba(129, 140, 248, 0.1);
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        /* 数值卡片 - 可点击复制 */
        .value-card-modern {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.15), rgba(124, 58, 237, 0.15));
            border: 2px solid rgba(129, 140, 248, 0.4);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px -20px #4f46e5;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .value-card-modern:hover {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.25), rgba(124, 58, 237, 0.25));
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(129, 140, 248, 0.4);
        }

        .value-card-modern:active {
            transform: scale(0.98);
        }

        .value-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f0f2ff;
            text-shadow: 0 0 20px rgba(129, 140, 248, 0.5);
            word-break: break-all;
            margin-bottom: 1rem;
        }

        .copy-hint-value {
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .value-card-modern:hover .copy-hint-value {
            opacity: 1;
        }

        /* 签名卡片容器 */
        .signature-card-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 签名卡片样式 - 从签名合集代码中整合 */
        .signature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 1.2rem;
            padding: 1rem 0.8rem 0.4rem 0.8rem;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 192, 203, 0.1);
            line-height: 1.4;
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 130px;
            justify-content: space-between;
        }

        .signature-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 182, 193, 0.6);
            transform: scale(1.01);
            box-shadow: 0 0 15px rgba(255, 192, 203, 0.2);
        }

        .signature-card:active {
            transform: scale(0.99);
        }

        .signature-text {
            font-size: 0.8rem;
            font-weight: 400;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.2);
            line-height: 1.4;
            margin-bottom: 0.3rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* QQ标签 - 显示原作者账号或名称 */
        .signature-qq {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.3px;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.3rem;
            border-radius: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            width: fit-content;
            margin: 0.1rem auto 0 auto;
            transition: color 0.2s;
            line-height: 1.2;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signature-card:hover .signature-qq {
            color: rgba(255, 255, 255, 0.7);
        }

        /* 复制提示 */
        .copy-hint {
            margin-top: 0.2rem;
            font-size: 0.5rem;
            color: #9ca3af;
            opacity: 0.4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
        }

        .signature-card:hover .copy-hint {
            opacity: 0.7;
        }

        /* 签名网格 */
        .signature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
            position: relative;
        }

        /* 顶部提示 */
        .top-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            padding: 0.5rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            background: rgba(129, 140, 248, 0.05);
            border-radius: 2rem;
        }

        .top-hint i {
            color: #818cf8;
            margin: 0 0.3rem;
        }

        /* 提示信息 */
        .hint-modern {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin: 1rem 0 0.5rem;
            padding: 0.5rem;
            background: rgba(129, 140, 248, 0.05);
            border-radius: 2rem;
            border: 1px dashed rgba(129, 140, 248, 0.2);
        }

        /* 分隔线 */
        .divider-modern {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), rgba(129, 140, 248, 0.3), rgba(255, 255, 255, 0.05), transparent);
            margin: 2rem 0;
        }

        /* 搜索结果高亮 - 加强版 */
        .search-highlight {
            background: rgba(129, 140, 248, 0.25) !important;
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.4) !important;
            border-color: #818cf8 !important;
            transform: scale(1.02);
            transition: all 0.2s;
        }

        /* 协议弹窗 */
        .agreement-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .agreement-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .agreement-content {
            background: rgba(18, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(129, 140, 248, 0.3);
            border-radius: 2.5rem;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px #000;
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .agreement-modal.show .agreement-content {
            transform: translateY(0);
        }

        .agreement-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .agreement-header i {
            font-size: 2rem;
            color: #818cf8;
        }

        .agreement-header h3 {
            font-size: 1.5rem;
            color: #f0f2ff;
        }

        .agreement-body {
            color: #d1d5db;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            padding: 1rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .agreement-footer {
            display: flex;
            justify-content: flex-end;
        }

        .agreement-close {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .agreement-close:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        /* 致谢名单弹窗 - 新增 */
        .thanks-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .thanks-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .thanks-content {
            background: rgba(18, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 2.5rem;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px #000;
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .thanks-modal.show .thanks-content {
            transform: translateY(0);
        }

        .thanks-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .thanks-header i {
            font-size: 2rem;
            color: #fbbf24;
        }

        .thanks-header h3 {
            font-size: 1.5rem;
            color: #f0f2ff;
        }

        .thanks-body {
            color: #d1d5db;

                navigator.clipboard.writeText(text).then(() => {
                    // 显示复制成功提示
                    const toast = document.createElement('div');
                    toast.className = 'copy-toast';
                    toast.innerHTML = '<i class="fas fa-check-circle"></i> 复制成功';
                    toastContainer.appendChild(toast);
                    
                    setTimeout(() => {
                        toast.remove();
                    }, 1500);
                }).catch(err => {
                    alert('复制失败，请手动复制');
                });

            // 创建返回按钮 - 现代风格
            function createBackButton() {
                const backBtn = document.createElement('div');
                backBtn.className = 'back-btn-modern';
                backBtn.innerHTML = '<i class="fas fa-arrow-left"></i> 返回上一级';
                backBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    
                    // 弹出当前栈顶
                    historyStack.pop();
                    
                    if (historyStack.length === 0) {
                        showSupernaturalInitial(false);
                        return;
                    }
                    
                    const prevView = historyStack[historyStack.length - 1];
                    
                    switch(prevView) {
                        case VIEWS.SUPERNATURAL_INITIAL:
                            showSupernaturalInitial(false);
                            break;
                        case VIEWS.SECRET_GRID:
                            showSecretGridOnly(false);
                            break;
                        case VIEWS.ITEM_LIST:
                            showItemListOnly(false);
                            break;
                        case VIEWS.SKIN_CATEGORY:
                            showSkinCategoryOnly(false);
                            break;
                        case VIEWS.PROP_CATEGORY:
                            showPropCategory(false);
                            break;
                        case VIEWS.DECOR_CATEGORY:
                            showDecorCategory(false);
                            break;
                        case VIEWS.DECOR_DETAIL:
                            showDecorDetail(currentDecorCategory, false);
                            break;
                        case VIEWS.ROLE_CATEGORY:
                            showRoleCategory(false);
                            break;
                        case VIEWS.ROLE_DETAIL:
                            showRoleDetail(currentRoleCategory, false);
                            break;
                        case VIEWS.DANCE_SKIN_LIST:
                            showDanceSkinList(false);
                            break;
                        case VIEWS.TEAM_ROW:
                            showTeamRowOnly(false);
                            break;
                        case VIEWS.JINGJUE_DIFFICULTY:
                            showJingjueDifficultyOnly(false);
                            break;
                        case VIEWS.KUNLUN_DIFFICULTY:
                            showKunlunDifficultyOnly(false);
                            break;
                        case VIEWS.QINLING_DIFFICULTY:
                            showQinlingDifficultyOnly(false);
                            break;
                        case VIEWS.SUBTEAM:
                            showSubteamRow(false);
                            break;
                        case VIEWS.PROP_SKIN_DETAIL:
                            showPropSkinDetail(currentPropCategory, false);
                            break;
                        case VIEWS.DIFFICULTY:
                            showDifficultyOnly(false);
                            break;
                        case VIEWS.SIGNATURE_PAGE:
                            showSignaturePage(false);
                            break;
                        case VIEWS.SKIN_VALUE:
                            if (historyStack.length > 1) {
                                const secondLast = historyStack[historyStack.length - 2];
                                if (secondLast === VIEWS.PROP_SKIN_DETAIL) {
                                    showPropSkinDetail(currentPropCategory, false);
                                } else if (secondLast === VIEWS.DECOR_DETAIL) {
                                    showDecorDetail(currentDecorCategory, false);
                                } else if (secondLast === VIEWS.ROLE_DETAIL) {
                                    showRoleDetail(currentRoleCategory, false);
                                } else if (secondLast === VIEWS.DANCE_SKIN_LIST) {
                                    showDanceSkinList(false);
                                } else if (secondLast === VIEWS.ITEM_LIST) {
                                    showItemListOnly(false);
                                } else {
                                    showSupernaturalInitial(false);
                                }
                            } else {
                                showSupernaturalInitial(false);
                            }
                            break;
                        default:
                            showSupernaturalInitial(false);
                    }
                    
                    searchInput.value = '';
                    
                    // 搜索后滚动到顶部
                    setTimeout(() => {
                        const contentArea = document.querySelector('.content-area');
                        if (contentArea) {
                            contentArea.scrollTop = 0;
                        }
                    }, 10);
                });
                return backBtn;
            }

            function refreshBackButton() {
                backContainer.innerHTML = '';
                if (historyStack.length >= 2) {
                    const backBtn = createBackButton();
                    backContainer.appendChild(backBtn);
                }
            }

            // 搜索功能
            function performGlobalSearch() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                
                // 获取当前显示的所有可点击元素
                const allCurrentCards = document.querySelectorAll('#innerDynamic .menu-card, #innerDynamic .category-card, #innerDynamic .item-card, #innerDynamic .signature-card, #innerDynamic .value-card-modern');
                
                if (searchTerm === '') {
                    // 如果搜索框为空，显示所有卡片
                    allCurrentCards.forEach(card => {
                        if (card) {
                            card.style.display = '';
                            card.classList.remove('search-highlight');
                        }
                    });
                    
                    // 移除提示
                    const existingTip = document.getElementById('searchNoResultTip');
                    if (existingTip) existingTip.remove();
                    
                    // 滚动到顶部
                    const contentArea = document.querySelector('.content-area');
                    if (contentArea) {
                        contentArea.scrollTop = 0;
                    }
                    return;
                }

                let hasMatch = false;
                
                // 遍历所有卡片，检查文本内容是否包含搜索词
                allCurrentCards.forEach(card => {
                    if (!card) return;
                    
                    const cardText = card.textContent ? card.textContent.toLowerCase() : '';
                    if (cardText.includes(searchTerm)) {
                        card.style.display = '';
                        card.classList.add('search-highlight');
                        hasMatch = true;
                    } else {
                        card.style.display = 'none';
                        card.classList.remove('search-highlight');
                    }
                });

                // 移除旧的提示
                const existingTip = document.getElementById('searchNoResultTip');
                if (existingTip) existingTip.remove();
                
                // 如果没有匹配结果，显示提示
                if (!hasMatch && allCurrentCards.length > 0) {
                    // 在全局数据库中查找匹配的项
                    const matchedItems = globalButtonDB.filter(item => 
                        typeof item === 'string' && item.toLowerCase().includes(searchTerm)
                    );
                    
                    let tipMessage = `🔍 未找到"${searchInput.value}"`;
                    if (matchedItems.length > 0) {
                        tipMessage += `<br><br>可在以下层级查找：<br>`;
                        // 显示前5个匹配项
                        matchedItems.slice(0, 5).forEach(item => {
                            tipMessage += `· ${item}<br>`;
                        });
                        if (matchedItems.length > 5) {
                            tipMessage += `... 还有${matchedItems.length - 5}个`;
                        }
                    }
                    
                    const tip = document.createElement('div');
                    tip.id = 'searchNoResultTip';
                    tip.style.cssText = `
                        text-align: center;
                        color: #9ca3af;
                        padding: 2rem;
                        font-size: 1rem;
                        background: rgba(30,20,50,0.3);
                        border-radius: 2rem;
                        margin-top: 1rem;
                        line-height: 1.6;
                    `;
                    tip.innerHTML = tipMessage;
                    innerDynamic.appendChild(tip);
                }
                
                // 搜索后滚动到顶部
                const contentArea = document.querySelector('.content-area');
                if (contentArea) {
                    contentArea.scrollTop = 0;
                }
            }

            // 监听搜索输入
            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(performGlobalSearch, 50);
            });
