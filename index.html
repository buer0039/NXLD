<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>安全警告 - NXLD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0f1e 0%, #0a0c18 100%);
            font-family: 'Segoe UI', 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 动态背景效果 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 40%, rgba(239, 68, 68, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 60%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* 闪烁警告光效 */
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
                border-color: rgba(239, 68, 68, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(239, 68, 68, 0.8);
                border-color: rgba(239, 68, 68, 0.8);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .warning-container {
            position: relative;
            z-index: 10;
            max-width: 550px;
            width: 90%;
            margin: 2rem;
            animation: shake 0.5s ease-in-out;
        }

        .warning-card {
            background: rgba(18, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem;
            text-align: center;
            border: 2px solid #ef4444;
            animation: pulse 2s infinite;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 盾牌图标容器 */
        .shield-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: blink 1.5s ease-in-out infinite;
        }

        .shield-icon i {
            font-size: 48px;
            color: white;
        }

        /* 警告标题 */
        .warning-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 警告子标题 */
        .warning-subtitle {
            font-size: 1.1rem;
            color: #fbbf24;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* 警告消息 */
        .warning-message {
            color: #9ca3af;
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        /* 检测到的项目列表 */
        .detected-list {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            padding: 1rem;
            margin: 1.5rem 0;
            text-align: left;
        }

        .detected-title {
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detected-title i {
            font-size: 0.8rem;
        }

        .detected-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .detected-badge {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            color: #ef4444;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .detected-badge i {
            font-size: 0.7rem;
        }

        /* 修改器专用标识 */
        .modifier-badge {
            background: rgba(245, 158, 11, 0.2);
            border-color: #f59e0b;
            color: #f59e0b;
        }

        /* 代码标识 */
        .code-hint {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 0.8rem;
            padding: 0.8rem;
            margin: 1.5rem 0;
            font-family: monospace;
            font-size: 0.75rem;
            color: #6b7280;
            letter-spacing: 1px;
        }

        /* 提示信息 */
        .info-message {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 1rem;
            font-size: 0.8rem;
            color: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .info-message i {
            font-size: 0.9rem;
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ef4444;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 4s infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 禁止选中 */
        * {
            user-select: none;
            -webkit-user-select: none;
        }

        /* 警告提示条 */
        .warning-tip {
            margin-top: 1rem;
            padding: 0.5rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 1rem;
            font-size: 0.7rem;
            color: #ef4444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .warning-tip i {
            font-size: 0.6rem;
        }
    </style>
</head>
<body>
    <div class="warning-container">
        <div class="warning-card">
            <!-- 盾牌图标 -->
            <div class="shield-icon">
                <i class="fas fa-shield-alt"></i>
            </div>

            <!-- 警告标题 -->
            <h1 class="warning-title">安全警告</h1>
            <div class="warning-subtitle" id="warningSubtitle">
                <i class="fas fa-exclamation-triangle"></i> 检测到异常行为
            </div>

            <!-- 警告消息 -->
            <div class="warning-message">
                为了保障数据安全和用户隐私，页面已被锁定。<br>
                请关闭以下工具后刷新页面重新访问。
            </div>

            <!-- 检测到的项目 - 动态显示 -->
            <div class="detected-list">
                <div class="detected-title">
                    <i class="fas fa-search"></i> 检测到的异常行为：
                </div>
                <div class="detected-items" id="detectedItems">
                    <!-- 默认显示，会被JS动态更新 -->
                </div>
            </div>

            <!-- 修改器详细信息（如果是修改器检测） -->
            <div id="modifierDetail" style="display: none;">
                <div class="detected-list" style="border-color: #f59e0b;">
                    <div class="detected-title" style="color: #f59e0b;">
                        <i class="fas fa-skull"></i> 修改器检测详情：
                    </div>
                    <div class="detected-items" id="modifierDetailItems">
                    </div>
                </div>
            </div>

            <!-- 代码标识 -->
            <div class="code-hint">
                <i class="fas fa-fingerprint"></i> 事件ID: NXLD-SEC-<span id="eventId">****</span><br>
                <i class="fas fa-clock"></i> 检测时间: <span id="detectTime"></span>
            </div>

            <!-- 提示信息 -->
            <div class="info-message">
                <i class="fas fa-info-circle"></i> 请关闭开发者工具或修改器后刷新页面
            </div>

            <!-- 警告提示 -->
            <div class="warning-tip">
                <i class="fas fa-shield-virus"></i> 使用非法工具将永久锁定访问权限
            </div>
        </div>
    </div>

    <!-- 粒子效果容器 -->
    <div id="particleContainer"></div>

    <!-- 添加 Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        (function() {
            // 从URL参数获取检测到的修改器类型
            function getDetectedType() {
                const urlParams = new URLSearchParams(window.location.search);
                const type = urlParams.get('type');
                const modifier = urlParams.get('modifier');
                
                if (modifier) {
                    return { type: 'modifier', name: modifier };
                }
                if (type === 'devtools') {
                    return { type: 'devtools', name: '开发者工具' };
                }
                if (type === 'ce') {
                    return { type: 'modifier', name: 'Cheat Engine (CE)' };
                }
                if (type === 'gg') {
                    return { type: 'modifier', name: 'GameGuardian (GG)' };
                }
                // 尝试从 localStorage 读取
                try {
                    const detected = localStorage.getItem('_detected_modifier');
                    if (detected) {
                        return { type: 'modifier', name: detected };
                    }
                } catch(e) {}
                
                return { type: 'unknown', name: '未知工具' };
            }
            
            // 生成随机事件ID
            function generateEventId() {
                return Math.floor(Math.random() * 9999).toString().padStart(4, '0');
            }

            // 格式化当前时间
            function getCurrentTime() {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            }

            // 设置页面信息
            function setPageInfo() {
                document.getElementById('eventId').textContent = generateEventId();
                document.getElementById('detectTime').textContent = getCurrentTime();
            }

            // 根据检测类型更新显示内容
            function updateDetectedDisplay() {
                const detected = getDetectedType();
                const detectedItems = document.getElementById('detectedItems');
                const warningSubtitle = document.getElementById('warningSubtitle');
                const modifierDetail = document.getElementById('modifierDetail');
                const modifierDetailItems = document.getElementById('modifierDetailItems');
                
                if (!detectedItems) return;
                
                // 清空现有内容
                detectedItems.innerHTML = '';
                
                if (detected.type === 'devtools') {
                    // 开发者工具检测
                    warningSubtitle.innerHTML = '<i class="fas fa-code"></i> 检测到开发者工具';
                    detectedItems.innerHTML = `
                        <span class="detected-badge"><i class="fas fa-code"></i> 开发者工具打开</span>
                        <span class="detected-badge"><i class="fas fa-keyboard"></i> 调试快捷键触发</span>
                        <span class="detected-badge"><i class="fas fa-mouse-pointer"></i> 元素检查</span>
                        <span class="detected-badge"><i class="fas fa-terminal"></i> 控制台操作</span>
                    `;
                    modifierDetail.style.display = 'none';
                    
                } else if (detected.type === 'modifier') {
                    // 修改器检测
                    warningSubtitle.innerHTML = '<i class="fas fa-skull"></i> 检测到内存修改器';
                    
                    // 显示修改器名称
                    let modifierName = detected.name;
                    let modifierIcon = 'fa-bug';
                    let modifierColor = '#f59e0b';
                    
                    if (modifierName.toLowerCase().includes('cheat') || modifierName.toLowerCase().includes('ce')) {
                        modifierName = 'Cheat Engine (CE)';
                        modifierIcon = 'fa-microchip';
                    } else if (modifierName.toLowerCase().includes('guardian') || modifierName.toLowerCase().includes('gg')) {
                        modifierName = 'GameGuardian (GG)';
                        modifierIcon = 'fa-shield-haltered';
                    } else if (modifierName.toLowerCase().includes('memory')) {
                        modifierName = '内存修改器';
                        modifierIcon = 'fa-database';
                    } else if (modifierName.toLowerCase().includes('speed')) {
                        modifierName = '变速工具';
                        modifierIcon = 'fa-gauge-high';
                    }
                    
                    // 显示检测到的修改器
                    detectedItems.innerHTML = `
                        <span class="detected-badge modifier-badge"><i class="fas ${modifierIcon}"></i> ${modifierName}</span>
                        <span class="detected-badge"><i class="fas fa-chart-line"></i> 帧率异常检测</span>
                        <span class="detected-badge"><i class="fas fa-window-maximize"></i> 悬浮窗检测</span>
                    `;
                    
                    // 显示修改器详细信息
                    modifierDetail.style.display = 'block';
                    modifierDetailItems.innerHTML = `
                        <div style="width:100%; padding: 0.3rem 0;">
                            <span style="color: #f59e0b;">⚠️ 检测到内存修改器特征</span>
                        </div>
                        <div style="width:100%; padding: 0.3rem 0; font-size: 0.7rem; color: #9ca3af;">
                            检测类型: ${modifierName}<br>
                            检测方式: 行为特征分析 / 内存访问异常
                        </div>
                        <div style="width:100%; padding: 0.3rem 0; font-size: 0.7rem; color: #ef4444;">
                            <i class="fas fa-ban"></i> 使用修改器将导致账户被永久封禁
                        </div>
                    `;
                    
                } else {
                    // 未知检测
                    warningSubtitle.innerHTML = '<i class="fas fa-question-circle"></i> 检测到异常行为';
                    detectedItems.innerHTML = `
                        <span class="detected-badge"><i class="fas fa-shield"></i> 系统安全检测</span>
                        <span class="detected-badge"><i class="fas fa-chart-line"></i> 行为异常分析</span>
                    `;
                    modifierDetail.style.display = 'none';
                }
            }

            // 添加粒子效果
            function createParticles() {
                const container = document.getElementById('particleContainer');
                if (!container) return;
                
                for (let i = 0; i < 50; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 4 + 's';
                    particle.style.animationDuration = 3 + Math.random() * 2 + 's';
                    particle.style.width = 2 + Math.random() * 4 + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.background = `rgba(239, 68, 68, ${0.3 + Math.random() * 0.5})`;
                    container.appendChild(particle);
                }
            }

            // 禁止任何调试行为
            function blockDebug() {
                // 禁止F12
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'F12' || 
                        (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                        (e.ctrlKey && e.shiftKey && e.key === 'J') ||
                        (e.ctrlKey && e.key === 'U') ||
                        (e.ctrlKey && e.key === 'S')) {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }
                });

                // 禁止右键
                document.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    return false;
                });

                // 禁止选中
                document.addEventListener('selectstart', function(e) {
                    e.preventDefault();
                    return false;
                });
            }

            // 添加动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeOut {
                    0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
                    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
                    85% { opacity: 1; transform: translateX(-50%) translateY(0); }
                    100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
                }
            `;
            document.head.appendChild(style);

            // 初始化
            setPageInfo();
            updateDetectedDisplay();
            createParticles();
            blockDebug();

            // 防止控制台输出
            console.log = function() {};
            console.warn = function() {};
            console.error = function() {};
            console.info = function() {};

            // 持续检测是否还在调试模式
            let detectionCount = 0;
            setInterval(function() {
                const before = Date.now();
                debugger;
                const after = Date.now();
                if (after - before > 100) {
                    detectionCount++;
                    if (detectionCount > 3) {
                        // 重新生成事件ID
                        setPageInfo();
                        detectionCount = 0;
                    }
                }
            }, 5000);
        })();
    </script>
</body>
</html>
