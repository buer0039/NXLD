<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NXLD数值库</title>
    <!-- 现代字体 - 使用更优雅的字体组合 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase JS客户端 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 样式保持不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0f1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态渐变背景 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 - 更现代的无边框设计 */
        .modern-container {
            position: relative;
            z-index: 10;
            max-width: 1600px;
            width: 100%;
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            padding: 2.5rem;
            transition: all 0.3s ease;
        }

        /* 头部区域 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .logo-text .sub {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 搜索框 - 全新设计 */
        .search-wrapper {
            position: relative;
            width: 300px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 1rem;
            pointer-events: none;
        }

        .search-box-modern {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f0f2ff;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .search-box-modern:focus {
            outline: none;
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .search-box-modern::placeholder {
            color: #6b7280;
            font-weight: 300;
        }

        /* 知情协议按钮 */
        .agreement-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .agreement-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .agreement-btn i {
            color: #818cf8;
            font-size: 0.9rem;
        }

        /* 提交签名按钮 */
        .submit-signature-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .submit-signature-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        /* 管理员入口按钮 */
        .admin-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .admin-btn i {
            color: #f59e0b;
            font-size: 0.9rem;
        }

        /* 致谢名单按钮 */
        .thanks-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .thanks-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .thanks-btn i {
            color: #fbbf24;
            font-size: 0.9rem;
        }

        /* 版权年份标签 */
        .year-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .year-badge i {
            color: #818cf8;
            font-size: 0.8rem;
        }

        /* 云端连接状态 */
        .cloud-status {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            color: #9ca3af;
        }

        .cloud-status.connected {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .cloud-status.disconnected {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .cloud-status i {
            font-size: 0.7rem;
        }

        /* 阵营切换卡片 */
        .faction-switch {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            width: fit-content;
        }

        .faction-btn {
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #9ca3af;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .faction-btn i {
            font-size: 1.1rem;
        }

        .faction-btn.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        /* 主要内容区域 */
        .content-area {
            background: rgba(10, 12, 26, 0.4);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            min-height: 500px;
            max-height: 800px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4b5563 #1f2937;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }

        /* 状态标签 */
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }

        .status-badge {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge i {
            font-size: 0.8rem;
            color: #818cf8;
        }

        /* 返回按钮 */
        .back-btn-modern {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d5db;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .back-btn-modern:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        /* 主菜单按钮网格 */
        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(5px);
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -15px #000;
        }

        .menu-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
        }

        .menu-card.skin .menu-icon {
            background: linear-gradient(135deg, #b453b6, #d946ef);
        }

        .menu-card.signature .menu-icon {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .menu-card span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e5e7eb;
        }

        .menu-card small {
            font-size: 0.8rem;
            color: #6b7280;
        }

        /* 分类网格 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .category-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: scale(1.02);
        }

        .category-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 1rem;
            background: rgba(129, 140, 248, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #818cf8;
            font-size: 1.2rem;
        }

        .category-card span {
            font-size: 0.95rem;
            font-weight: 500;
            color: #d1d5db;
        }

        /* 物品网格 */
        .item-grid-modern {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.2rem;
            padding: 0.9rem 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 400;
            color: #d1d5db;
            cursor: pointer;
            transition: all 0.18s;
            min-height: 60px;
            word-break: break-word;
        }

        .item-card:hover {
            background: rgba(129, 140, 248, 0.1);
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        /* 数值卡片 */
        .value-card-modern {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.15), rgba(124, 58, 237, 0.15));
            border: 2px solid rgba(129, 140, 248, 0.4);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px -20px #4f46e5;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .value-card-modern:hover {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.25), rgba(124, 58, 237, 0.25));
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(129, 140, 248, 0.4);
        }

        .value-card-modern:active {
            transform: scale(0.98);
        }

        .value-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f0f2ff;
            text-shadow: 0 0 20px rgba(129, 140, 248, 0.5);
            word-break: break-all;
            margin-bottom: 1rem;
        }

        .copy-hint-value {
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .value-card-modern:hover .copy-hint-value {
            opacity: 1;
        }

        /* 签名卡片容器 */
        .signature-card-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 签名卡片样式 */
        .signature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 1.2rem;
            padding: 1rem 0.8rem 0.4rem 0.8rem;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 192, 203, 0.1);
            line-height: 1.4;
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 130px;
            justify-content: space-between;
        }

        .signature-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 182, 193, 0.6);
            transform: scale(1.01);
            box-shadow: 0 0 15px rgba(255, 192, 203, 0.2);
        }

        .signature-card:active {
            transform: scale(0.99);
        }

        .signature-text {
            font-size: 0.8rem;
            font-weight: 400;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.2);
            line-height: 1.4;
            margin-bottom: 0.3rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .signature-text span, .signature-text i, .signature-text b, .signature-text u {
            display: inline;
        }

        /* QQ/抖音标签 */
        .signature-platform {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.3px;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.3rem;
            border-radius: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            width: fit-content;
            margin: 0.1rem auto 0 auto;
            transition: color 0.2s;
            line-height: 1.2;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signature-card:hover .signature-platform {
            color: rgba(255, 255, 255, 0.7);
        }

        /* 复制提示 */
        .copy-hint {
            margin-top: 0.2rem;
            font-size: 0.5rem;
            color: #9ca3af;
            opacity: 0.4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
        }

        .signature-card:hover .copy-hint {
            opacity: 0.7;
        }

        /* 签名网格 */
        .signature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
            position: relative;
        }

        /* 提交表单样式 */
        .submit-form {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(129, 140, 248, 0.2);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: #d1d5db;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-select {
            width: 100%;
            padding: 1rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f2ff;
            font-size: 0.95rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
        }

        .form-select option {
            background: #1f2937;
            color: #f0f2ff;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f2ff;
            font-size: 0.95rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            resize: vertical;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .form-textarea {
            min-height: 120px;
        }

        .submit-button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 1rem 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .submit-info {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.5rem;
            background: rgba(129, 140, 248, 0.05);
            border-radius: 1rem;
        }

        /* QQ查询结果 */
        .query-section {
            margin-top: 2rem;
        }

        .query-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .query-button {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            color: white;

            // 检查云端连接
            async function checkCloudConnection() {
                if (isReconnecting) return;
                
                try {
                    // 使用更简单的查询检查连接
                    const { error } = await supabase
                        .from('_test')
                        .select('*')
                        .limit(1)
                        .maybeSingle();
                    
                    if (error && error.message && error.message.includes('relation') && error.message.includes('does not exist')) {
                        updateCloudStatus(false, '请在Supabase控制台创建表');
                    } else if (error) {
                        console.error('连接错误:', error);
                        updateCloudStatus(false);
                    } else {
                        updateCloudStatus(true);
                    }
                } catch (err) {
                    console.error('云端连接失败:', err);
                    updateCloudStatus(false);
                }
            }

            // 从云端加载数据
            async function loadFromCloud() {
                if (!isCloudConnected) {
                    // 降级到本地存储
                    pendingSignatures = JSON.parse(localStorage.getItem('pendingSignatures') || '[]');
                    bugReports = JSON.parse(localStorage.getItem('bugReports') || '[]');
                    approvedSignatures = JSON.parse(localStorage.getItem('approvedSignatures') || '[]');
                    operationLogs = JSON.parse(localStorage.getItem('operationLogs') || '[]');
                    return true;
                }

                try {
                    // 加载待审核签名
                    const { data: pendingData, error: pendingError } = await supabase
                        .from('pending_signatures')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (pendingError) throw pendingError;
                    pendingSignatures = pendingData || [];

                    // 加载Bug反馈
                    const { data: bugData, error: bugError } = await supabase
                        .from('bug_reports')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (bugError) throw bugError;
                    bugReports = bugData || [];

                    // 加载已通过签名
                    const { data: approvedData, error: approvedError } = await supabase
                        .from('approved_signatures')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (approvedError) throw approvedError;
                    approvedSignatures = approvedData || [];

                    // 加载操作日志
                    const { data: logsData, error: logsError } = await supabase
                        .from('operation_logs')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(100);

                    if (logsError) throw logsError;
                    operationLogs = logsData || [];

                    return true;
                } catch (err) {
                    console.error('加载云端数据失败:', err);
                    
                    // 降级到本地存储
                    pendingSignatures = JSON.parse(localStorage.getItem('pendingSignatures') || '[]');
                    bugReports = JSON.parse(localStorage.getItem('bugReports') || '[]');
                    approvedSignatures = JSON.parse(localStorage.getItem('approvedSignatures') || '[]');
                    operationLogs = JSON.parse(localStorage.getItem('operationLogs') || '[]');
                    
                    return false;
                }
            }

            // 保存待审核签名到云端
            async function savePendingSignatures() {
                if (!isCloudConnected) {
                    localStorage.setItem('pendingSignatures', JSON.stringify(pendingSignatures));
                    return true;
                }

                try {
                    // 先删除所有现有数据
                    await supabase.from('pending_signatures').delete().neq('id', '');
                    
                    // 插入新数据
                    if (pendingSignatures.length > 0) {
                        const { error } = await supabase
                            .from('pending_signatures')
                            .insert(pendingSignatures.map(s => ({
                                account: s.account,
                                platform: s.platform,
                                content: s.content,
                                html: s.html,
                                timestamp: s.timestamp,
                                created_at: new Date().toISOString()
                            })));

                        if (error) throw error;
                    }
                    return true;
                } catch (err) {
                    console.error('保存待审核签名失败:', err);
                    localStorage.setItem('pendingSignatures', JSON.stringify(pendingSignatures));
                    return false;
                }
            }

            // 添加日志到云端
            async function addLog(action, details, status = 'info') {
                const log = {
                    time: new Date().toLocaleString(),
                    action: action,
                    details: details,
                    status: status,
                    created_at: new Date().toISOString()
                };

                operationLogs.unshift(log);
                if (operationLogs.length > 100) {
                    operationLogs = operationLogs.slice(0, 100);
                }

                if (!isCloudConnected) {
                    localStorage.setItem('operationLogs', JSON.stringify(operationLogs));
                    return true;
                }

                try {
                    const { error } = await supabase
                        .from('operation_logs')
                        .insert(log);

                    if (error) throw error;

                    // 保持云端日志不超过100条
                    const { data } = await supabase
                        .from('operation_logs')
                        .select('id')
                        .order('created_at', { ascending: false });

                    if (data && data.length > 100) {
                        const idsToDelete = data.slice(100).map(d => d.id);
                        await supabase.from('operation_logs').delete().in('id', idsToDelete);
                    }
                    return true;
                } catch (err) {
                    console.error('保存日志失败:', err);
                    localStorage.setItem('operationLogs', JSON.stringify(operationLogs));
                    return false;
                }
            }

            // 转换内容为HTML显示
            function convertToHtml(content) {
                if (!content) return '';
                return content.replace(/<color=#([A-Fa-f0-9]{6})>/g, '<span style="color: #$1;">')
                            .replace(/<\/color>/g, '</span>')
                            .replace(/<size=(\d+)>/g, '<span style="font-size: $1px;">')
                            .replace(/<\/size>/g, '</span>')
                            .replace(/<b>/g, '<b>').replace(/<\/b>/g, '</b>')
                            .replace(/<i>/g, '<i>').replace(/<\/i>/g, '</i>')
                            .replace(/<u>/g, '<u>').replace(/<\/u>/g, '</u>');
            }

            // 搜索功能
            function performGlobalSearch() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const allCurrentCards = document.querySelectorAll('#innerDynamic .menu-card, #innerDynamic .category-card, #innerDynamic .item-card, #innerDynamic .signature-card, #innerDynamic .value-card-modern');
                
                if (searchTerm === '') {
                    allCurrentCards.forEach(card => {
                        if (card) {
                            card.style.display = '';
                            card.classList.remove('search-highlight');
                        }
                    });
                    const existingTip = document.getElementById('searchNoResultTip');
                    if (existingTip) existingTip.remove();
                    const contentArea = document.querySelector('.content-area');
                    if (contentArea) contentArea.scrollTop = 0;
                    return;
                }

                let hasMatch = false;
                
                allCurrentCards.forEach(card => {
                    if (!card) return;
                    const cardText = card.textContent ? card.textContent.toLowerCase() : '';
                    if (cardText.includes(searchTerm)) {
                        card.style.display = '';
                        card.classList.add('search-highlight');
                        hasMatch = true;
                    } else {
                        card.style.display = 'none';
                        card.classList.remove('search-highlight');
                    }
                });

                const existingTip = document.getElementById('searchNoResultTip');
                if (existingTip) existingTip.remove();
                
                if (!hasMatch && allCurrentCards.length > 0) {
                    const matchedItems = globalButtonDB.filter(item => 
                        typeof item === 'string' && item.toLowerCase().includes(searchTerm)
                    );
                    
                    let tipMessage = `🔍 未找到"${searchInput.value}"`;
                    if (matchedItems.length > 0) {
                        tipMessage += `<br><br>可在以下层级查找：<br>`;
                        matchedItems.slice(0, 5).forEach(item => {
                            tipMessage += `· ${item}<br>`;
                        });
                        if (matchedItems.length > 5) {
                            tipMessage += `... 还有${matchedItems.length - 5}个`;
                        }
                    }
                    
                    const tip = document.createElement('div');
                    tip.id = 'searchNoResultTip';
                    tip.style.cssText = `
                        text-align: center;
                        color: #9ca3af;
                        padding: 2rem;
                        font-size: 1rem;
                        background: rgba(30,20,50,0.3);
                        border-radius: 2rem;
                        margin-top: 1rem;
                        line-height: 1.6;
                    `;
                    tip.innerHTML = tipMessage;
                    innerDynamic.appendChild(tip);
                }
                
                const contentArea = document.querySelector('.content-area');
                if (contentArea) contentArea.scrollTop = 0;
            }

            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(performGlobalSearch, 50);

                });
                
                // 提交事件
                document.getElementById('doSubmitBtn').addEventListener('click', async function() {
                    const btn = this;
                    const type = document.getElementById('feedbackType').value;
                    const account = document.getElementById('submitAccount').value.trim();
                    const content = document.getElementById('submitContent').value.trim();
                    const infoDiv = document.getElementById('submitInfo');
                    
                    if (!account || !content) {
                        infoDiv.textContent = '请填写完整信息';
                        infoDiv.style.color = '#ef4444';
                        return;
                    }
                    
                    btn.disabled = true;
                    btn.innerHTML = '<span class="loading-spinner"></span> 提交中...';
                    
                    try {
                        if (type === 'signature') {
                            const platform = document.getElementById('platformType').value;
                            
                            // 检查是否已提交过相同的签名
                            const existing = pendingSignatures.find(s => s.account === account && s.content === content && s.platform === platform);
                            if (existing) {
                                infoDiv.textContent = '你已经提交过相同的签名了，请等待审核';
                                infoDiv.style.color = '#f59e0b';
                                return;
                            }
                            
                            // 添加到待审核列表
                            const newSignature = {
                                account: account,
                                platform: platform,
                                content: content,
                                html: convertToHtml(content),
                                timestamp: new Date().toLocaleString()
                            };
                            
                            pendingSignatures.push(newSignature);
                            const saved = await savePendingSignatures();
                            
                            if (saved) {
                                await addLog('提交签名', `${platform === 'qq' ? 'QQ' : '抖音'}:${account} 提交了新签名`, 'info');
                                infoDiv.textContent = '提交成功！请等待管理员审核。';
                                infoDiv.style.color = '#10b981';
                                document.getElementById('submitAccount').value = '';
                                document.getElementById('submitContent').value = '';
                            } else {
                                infoDiv.textContent = '提交成功（本地保存）！请等待管理员审核。';
                                infoDiv.style.color = '#10b981';
                                document.getElementById('submitAccount').value = '';
                                document.getElementById('submitContent').value = '';
                            }
                        } else {
                            // Bug反馈
                            const newBug = {
                                account: account,
                                content: content,
                                timestamp: new Date().toLocaleString(),
                                status: 'pending'
                            };
                            
                            bugReports.push(newBug);
                            const saved = await saveBugReports();
                            
                            if (saved) {
                                await addLog('Bug反馈', `${account} 提交了Bug反馈`, 'bug');
                                infoDiv.textContent = 'Bug反馈已提交，感谢你的支持！';
                                infoDiv.style.color = '#10b981';
                                document.getElementById('submitAccount').value = '';
                                document.getElementById('submitContent').value = '';
                            } else {
                                infoDiv.textContent = 'Bug反馈已提交（本地保存），感谢你的支持！';
                                infoDiv.style.color = '#10b981';
                                document.getElementById('submitAccount').value = '';
                                document.getElementById('submitContent').value = '';
                            }
                        }
                    } catch (err) {
                        console.error('提交失败:', err);
                        infoDiv.textContent = '提交失败，请重试';
                        infoDiv.style.color = '#ef4444';
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = '提交';
                        
                        // 重新检查云端连接
                        setTimeout(() => checkCloudConnection(), 1000);
                    }
                });
                
                // 查询事件
                document.getElementById('queryBtn').addEventListener('click', function() {
                    const account = document.getElementById('queryAccount').value.trim();
                    const resultDiv = document.getElementById('queryResult');
                    
                    if (!account) {
                        resultDiv.innerHTML = '<div style="color: #ef4444; padding: 1rem; text-align: center;">请输入账号</div>';
                        return;
                    }
                    
                    // 查询待审核签名
                    const pending = pendingSignatures.filter(s => s.account === account);
                    // 查询已通过签名
                    const approved = approvedSignatures.filter(s => s.account === account);
                    // 查询Bug反馈
                    const bugs = bugReports.filter(b => b.account === account);
                    
                    let html = '';
                    
                    if (pending.length > 0) {
                        html += '<div style="margin-bottom: 1rem;"><h4 style="color: #f59e0b; margin-bottom: 0.5rem;">待审核签名</h4>';
                        pending.forEach(s => {
                            html += `
                                <div class="query-item">
                                    <div class="query-item-info">
                                        <div class="signature-preview">${s.html || convertToHtml(s.content)}</div>
                                        <div class="query-item-qq">${s.platform === 'qq' ? 'QQ' : '抖音'}:${s.account}</div>
                                    </div>
                                    <span class="query-item-status pending">待审核</span>
                                </div>
                            `;
                        });
                        html += '</div>';
                    }
                    
                    if (approved.length > 0) {
                        html += '<div><h4 style="color: #10b981; margin-bottom: 0.5rem;">已通过签名</h4>';
                        approved.forEach(s => {
                            html += `
                                <div class="query-item">
                                    <div class="query-item-info">
                                        <div class="signature-preview">${s.html || convertToHtml(s.content)}</div>
                                        <div class="query-item-qq">${s.platform === 'qq' ? 'QQ' : '抖音'}:${s.account}</div>
                                    </div>
                                    <span class="query-item-status">已通过</span>
                                </div>
                            `;
                        });
                        html += '</div>';
                    }
                    
                    if (bugs.length > 0) {
                        html += '<div><h4 style="color: #ef4444; margin-bottom: 0.5rem;">Bug反馈</h4>';
                        bugs.forEach(b => {
                            html += `
                                <div class="query-item">
                                    <div class="query-item-info">
                                        <div>${b.content.substring(0, 50)}${b.content.length > 50 ? '...' : ''}</div>
                                        <div class="query-item-qq">提交时间: ${b.timestamp}</div>
                                    </div>
                                    <span class="query-item-status bug">${b.status === 'pending' ? '待处理' : '已处理'}</span>
                                </div>
                            `;
                        });
                        html += '</div>';
                    }
                    
                    if (!html) {
                        html = '<div style="color: #9ca3af; padding: 1rem; text-align: center;">没有找到相关提交记录</div>';
                    }
                    
                    resultDiv.innerHTML = html;
                });
                
                refreshBackButton();
            }

            // 管理员页面
            function showAdminPage(pushToHistory = true) {
                resetAll();
                
                if (pushToHistory) {
                    historyStack.push(VIEWS.ADMIN_PAGE);
                }
                
                statusTag.textContent = '管理员面板';
                
                const container = document.createElement('div');
                
                // 如果已经登录，直接显示面板
                if (currentAdminLevel !== 'guest') {
                    showAdminPanel();
                } else {
                    // 密码验证
                    const passwordDiv = document.createElement('div');
                    passwordDiv.className = 'submit-form';
                    passwordDiv.innerHTML = `
                        <div class="form-group">
                            <label class="form-label">管理员密码</label>
                            <input type="password" class="form-input" id="adminPassword" placeholder="请输入管理员密码">
                        </div>
                        <button class="submit-button" id="adminLoginBtn">登录</button>
                        <div class="submit-info" id="adminLoginInfo"></div>
                    `;
                    
                    container.appendChild(passwordDiv);
                    
                    innerDynamic.appendChild(container);
                    
                    document.getElementById('adminLoginBtn').addEventListener('click', function() {
                        const password = document.getElementById('adminPassword').value;
                        
                        if (password === 'NXLD_RX') {
                            currentAdminLevel = 'admin';
                            showAdminPanel();
                            document.getElementById('adminLoginInfo').textContent = '登录成功（普通管理员）';
                            document.getElementById('adminLoginInfo').style.color = '#10b981';
                        } else if (password === 'NXLD_MZRW') {
                            currentAdminLevel = 'super';
                            showAdminPanel();
                            document.getElementById('adminLoginInfo').textContent = '登录成功（超级管理员）';
                            document.getElementById('adminLoginInfo').style.color = '#10b981';
                        } else {
                            document.getElementById('adminLoginInfo').textContent = '密码错误';
                            document.getElementById('adminLoginInfo').style.color = '#ef4444';
                        }
                    });
                }
                
                async function showAdminPanel() {
                    container.innerHTML = '';
                    
                    const panel = document.createElement('div');
                    
                    // 显示当前管理员级别
                    const levelBadge = document.createElement('div');
                    levelBadge.style.textAlign = 'center';
                    levelBadge.style.marginBottom = '1rem';
                    levelBadge.style.padding = '0.5rem';
                    levelBadge.style.borderRadius = '2rem';
                    levelBadge.style.background = currentAdminLevel === 'super' ? 'rgba(139, 92, 246, 0.2)' : 'rgba(16, 185, 129, 0.2)';
                    levelBadge.style.color = currentAdminLevel === 'super' ? '#a78bfa' : '#10b981';
                    levelBadge.innerHTML = currentAdminLevel === 'super' ? 
                        '<i class="fas fa-crown"></i> 超级管理员模式' : 
                        '<i class="fas fa-user"></i> 普通管理员模式';
                    panel.appendChild(levelBadge);
                    
                    // 刷新按钮
                    const refreshBtn = document.createElement('button');
                    refreshBtn.className = 'query-button';
                    refreshBtn.style.marginBottom = '1rem';
                    refreshBtn.style.width = '100%';
                    refreshBtn.innerHTML = '<i class="fas fa-sync"></i> 刷新数据';
                    refreshBtn.addEventListener('click', async function() {
                        refreshBtn.disabled = true;
                        refreshBtn.innerHTML = '<span class="loading-spinner"></span> 刷新中...';
                        await loadFromCloud();
                        showAdminPanel();
                    });
                    panel.appendChild(refreshBtn);
                    
                    // Bug反馈区域
                    const bugSection = document.createElement('div');
                    bugSection.className = 'submit-form';
                    bugSection.style.marginBottom = '2rem';
                    
                    let bugHtml = '<h3 style="color: #ef4444; margin-bottom: 1rem;">Bug反馈</h3>';
                    
                    if (bugReports.length === 0) {
                        bugHtml += '<div style="color: #9ca3af; text-align: center; padding: 2rem;">暂无Bug反馈</div>';
                    } else {
                        bugReports.forEach((bug, index) => {
                            bugHtml += `
                                <div style="background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem;">
                                    <div style="margin-bottom: 0.5rem;"><span style="color: #818cf8;">账号:</span> ${bug.account}</div>
                                    <div style="margin-bottom: 0.5rem; color: #f0f2ff;">${bug.content}</div>
                                    <div style="margin-bottom: 0.5rem; color: #9ca3af; font-size: 0.8rem;">提交时间: ${bug.timestamp}</div>
                                    <div style="display: flex; gap: 0.5rem;">
                                        <button class="query-button" style="background: #10b981;" onclick="window.resolveBug(${index})">标记已处理</button>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    
                    bugSection.innerHTML = bugHtml;
                    panel.appendChild(bugSection);
                    
                    // 待审核签名
                    const pendingSection = document.createElement('div');
                    pendingSection.className = 'submit-form';
                    pendingSection.style.marginBottom = '2rem';
                    
                    let pendingHtml = '<h3 style="color: #f59e0b; margin-bottom: 1rem;">待审核签名</h3>';
                    
                    if (pendingSignatures.length === 0) {
                        pendingHtml += '<div style="color: #9ca3af; text-align: center; padding: 2rem;">暂无待审核签名</div>';
                    } else {
                        pendingSignatures.forEach((sig, index) => {
                            pendingHtml += `
                                <div style="background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem;">
                                    <div style="margin-bottom: 0.5rem;"><span style="color: #818cf8;">账号:</span> ${sig.account} (${sig.platform === 'qq' ? 'QQ' : '抖音'})</div>
                                    <div style="margin-bottom: 0.5rem; color: #f0f2ff;" class="signature-preview">${sig.html || convertToHtml(sig.content)}</div>
                                    <div style="margin-bottom: 0.5rem; color: #9ca3af; font-size: 0.8rem;">提交时间: ${sig.timestamp}</div>
                                    <div style="display: flex; gap: 0.5rem;">
                                        <button class="query-button" style="background: #10b981;" onclick="window.approveSignature(${index})">通过</button>
                                        <button class="query-button" style="background: #ef4444;" onclick="window.rejectSignature(${index})">拒绝</button>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    
                    pendingSection.innerHTML = pendingHtml;
                    panel.appendChild(pendingSection);
                    
                    // 已通过签名管理
                    const approvedSection = document.createElement('div');
                    approvedSection.className = 'submit-form';
                    
                    let approvedHtml = '<h3 style="color: #10b981; margin-bottom: 1rem;">已通过签名管理</h3>';
                    
                    if (approvedSignatures.length === 0) {
                        approvedHtml += '<div style="color: #9ca3af; text-align: center; padding: 2rem;">暂无用户通过的签名</div>';
                    } else {
                        approvedSignatures.forEach((sig, index) => {
                            approvedHtml += `
                                <div style="background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem;">
                                    <div style="margin-bottom: 0.5rem;"><span style="color: #818cf8;">账号:</span> ${sig.account} (${sig.platform === 'qq' ? 'QQ' : '抖音'})</div>
                                    <div style="margin-bottom: 0.5rem; color: #f0f2ff;" class="signature-preview">${sig.html || convertToHtml(sig.content)}</div>
                                    <div style="display: flex; gap: 0.5rem;">
                                        <button class="query-button" style="background: #ef4444;" onclick="window.deleteApprovedSignature(${index})">删除</button>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    
                    approvedSection.innerHTML = approvedHtml;
                    panel.appendChild(approvedSection);
                    
                    // 操作日志
                    const logSection = document.createElement('div');
                    logSection.className = 'submit-form';
                    logSection.style.marginTop = '2rem';
                    
                    let logHtml = '<h3 style="color: #818cf8; margin-bottom: 1rem;">操作日志</h3>';
                    logHtml += '<div class="log-container">';
                    
                    if (operationLogs.length === 0) {
                        logHtml += '<div style="color: #9ca3af; text-align: center; padding: 1rem;">暂无操作日志</div>';
                    } else {
                        operationLogs.forEach(log => {
                            let logClass = 'log-content';
                            if (log.action.includes('通过')) logClass += ' approved';
                            else if (log.action.includes('拒绝')) logClass += ' rejected';
                            else if (log.action.includes('删除')) logClass += ' deleted';
                            else if (log.action.includes('Bug')) logClass += ' bug';
                            
                            logHtml += `
                                <div class="log-item">
                                    <span class="log-time">[${log.time}]</span>
                                    <span class="${logClass}">${log.action}: ${log.details}</span>
                                </div>
                            `;
                        });
                    }
                    
                    logHtml += '</div>';
                    logSection.innerHTML = logHtml;
                    panel.appendChild(logSection);
                    
                    container.innerHTML = '';
                    container.appendChild(panel);
                    
                    // 添加全局函数供按钮调用 - 立即刷新
                    window.resolveBug = async (index) => {
                        const bug = bugReports[index];
                        bugReports.splice(index, 1);
                        
                        await saveBugReports();
                        await addLog('处理Bug', `${bug.account} 的Bug反馈已处理`, 'bug');
                        
                        // 立即刷新面板
                        showAdminPanel();
                        showToast('Bug已标记为已处理');
                    };
                    
                    window.approveSignature = async (index) => {
                        const sig = pendingSignatures[index];
                        const newApproved = {
                            account: sig.account,
                            platform: sig.platform,
                            content: sig.content,
                            html: sig.html,
                            timestamp: new Date().toLocaleString()
                        };
                        
                        approvedSignatures.push(newApproved);
                        pendingSignatures.splice(index, 1);
                        
                        await savePendingSignatures();
                        await saveApprovedSignatures();
                        await addLog('通过签名', `${sig.platform === 'qq' ? 'QQ' : '抖音'}:${sig.account} 的签名已通过`, 'approved');
                        
                        // 立即刷新面板
                        showAdminPanel();
                        showToast('签名已通过');
                    };
                    
                    window.rejectSignature = async (index) => {
                        const sig = pendingSignatures[index];
                        pendingSignatures.splice(index, 1);
                        
                        await savePendingSignatures();
                        await addLog('拒绝签名', `${sig.platform === 'qq' ? 'QQ' : '抖音'}:${sig.account} 的签名被拒绝`, 'rejected');
                        
                        // 立即刷新面板
                        showAdminPanel();
                        showToast('签名已拒绝');
                    };
                    
                    window.deleteApprovedSignature = async (index) => {
                        const sig = approvedSignatures[index];
                        approvedSignatures.splice(index, 1);
                        
                        await saveApprovedSignatures();
                        await addLog('删除签名', `${sig.platform === 'qq' ? 'QQ' : '抖音'}:${sig.account} 的签名被删除`, 'deleted');
                        
                        // 立即刷新面板
                        showAdminPanel();
                        showToast('签名已删除');
                    };
                }
                
                refreshBackButton();
            }

            // 原有功能函数占位（保持不变）
            function showSkinCategoryOnly(pushToHistory) { showToast('皮肤分类功能开发中'); }
            function showPropCategory(pushToHistory) { showToast('道具分类功能开发中'); }
            function showRoleCategory(pushToHistory) { showToast('角色分类功能开发中'); }
            function showRoleDetail(category, pushToHistory) { showToast('角色详情功能开发中'); }
            function showDecorCategory(pushToHistory) { showToast('装饰分类功能开发中'); }
            function showDecorDetail(category, pushToHistory) { showToast('装饰详情功能开发中'); }
            function showPropSkinDetail(category, pushToHistory) { showToast('道具皮肤详情功能开发中'); }
            function showDanceSkinList(pushToHistory) { showToast('动作舞蹈功能开发中'); }
            function showItemListOnly(pushToHistory) { showToast('局内物品功能开发中'); }
            function showSecretGridOnly(pushToHistory) { showToast('模式数值功能开发中'); }
            function showTeamRowOnly(pushToHistory) { showToast('古蜀遗迹功能开发中'); }
            function showDifficultyOnly(pushToHistory) { showToast('难度选择功能开发中'); }
            function showJingjueDifficultyOnly(pushToHistory) { showToast('精绝古城功能开发中'); }
            function showKunlunDifficultyOnly(pushToHistory) { showToast('昆仑秘境功能开发中'); }
            function showQinlingDifficultyOnly(pushToHistory) { showToast('秦陵龙宫功能开发中'); }
            function showSubteamRow(pushToHistory) { showToast('双队/四队功能开发中'); }

            // 按钮事件
            supernaturalBtn.addEventListener('click', function() {
                if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== VIEWS.SUPERNATURAL_INITIAL) {
                    historyStack = [];
                    showSupernaturalInitial();
                    searchInput.value = '';
                }
            });

            agreementBtn.addEventListener('click', function() {
                agreementModal.classList.add('show');
            });

            closeAgreement.addEventListener('click', function() {
                agreementModal.classList.remove('show');
            });

            agreementModal.addEventListener('click', function(e) {
                if (e.target === agreementModal) {
                    agreementModal.classList.remove('show');
                }
            });

            thanksBtn.addEventListener('click', function() {
                thanksModal.classList.add('show');
            });

            closeThanks.addEventListener('click', function() {
                thanksModal.classList.remove('show');
            });

            thanksModal.addEventListener('click', function(e) {
                if (e.target === thanksModal) {
                    thanksModal.classList.remove('show');
                }
            });

            // 提交反馈按钮事件
            submitSignatureBtn.addEventListener('click', function() {
                showSubmitFeedback();
                searchInput.value = '';
            });

            adminBtn.addEventListener('click', function() {
                // 每次进入管理员页面重置权限
                currentAdminLevel = 'guest';
                showAdminPage();
                searchInput.value = '';
            });

            // 初始化
            window.addEventListener('load', async function() {
                startCloudCheck();
                await loadFromCloud();
                showSupernaturalInitial();
            });

            // 清理定时器
            window.addEventListener('beforeunload', function() {
                if (cloudCheckInterval) {
                    clearInterval(cloudCheckInterval);
                }
            });
        })();
    </script>
</body>
</html>
