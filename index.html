    <!-- 防调试检测脚本 - 持久化锁定版 -->
    <script>
        (function() {
            // 警告页面URL
            const WARNING_URL = 'https://wjjz.wjzyw.top/projects/FZB/index.html';
            
            // 生成唯一设备码（基于浏览器指纹，重新部署后保持不变）
            function generateDeviceId() {
                try {
                    let deviceId = localStorage.getItem('nxld_device_id_permanent');
                    if (deviceId) {
                        return deviceId;
                    }
                    
                    const screenRes = `${screen.width}x${screen.height}`;
                    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    const language = navigator.language;
                    const platform = navigator.platform;
                    const cores = navigator.hardwareConcurrency || 0;
                    const memory = navigator.deviceMemory || 0;
                    const touchPoints = navigator.maxTouchPoints || 0;
                    const userAgent = navigator.userAgent;
                    
                    const features = `${screenRes}|${timezone}|${language}|${platform}|${cores}|${memory}|${touchPoints}|${userAgent.substring(0, 200)}`;
                    
                    let hash = 0;
                    for (let i = 0; i < features.length; i++) {
                        const char = features.charCodeAt(i);
                        hash = ((hash << 5) - hash) + char;
                        hash = hash & hash;
                    }
                    
                    deviceId = Math.abs(hash).toString(16).toUpperCase();
                    localStorage.setItem('nxld_device_id_permanent', deviceId);
                    return deviceId;
                } catch(e) {
                    let oldId = localStorage.getItem('nxld_device_id_permanent');
                    if (oldId) return oldId;
                    const newId = Math.random().toString(36).substring(2, 15).toUpperCase();
                    localStorage.setItem('nxld_device_id_permanent', newId);
                    return newId;
                }
            }
            
            const DEVICE_ID = generateDeviceId();
            
            const LOCKED_DEVICES_KEY = 'nxld_locked_devices_permanent';
            const DETECT_COUNT_KEY_PREFIX = 'nxld_detect_count_perm_';
            
            let hasRedirected = false;
            const pageLoadTime = Date.now();
            
            function isDeviceLocked() {
                try {
                    const lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    return lockedDevices.includes(DEVICE_ID);
                } catch(e) {
                    return false;
                }
            }
            
            function lockDevice(reason) {
                try {
                    let lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    if (!lockedDevices.includes(DEVICE_ID)) {
                        lockedDevices.push(DEVICE_ID);
                        localStorage.setItem(LOCKED_DEVICES_KEY, JSON.stringify(lockedDevices));
                        localStorage.setItem(`nxld_lock_reason_perm_${DEVICE_ID}`, reason);
                        localStorage.setItem(`nxld_lock_time_perm_${DEVICE_ID}`, new Date().toISOString());
                        localStorage.setItem(`nxld_detect_count_perm_${DEVICE_ID}`, '3');
                    }
                    return true;
                } catch(e) {
                    return false;
                }
            }
            
            function unlockDevice(deviceId) {
                try {
                    let lockedDevices = JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                    const newLockedDevices = lockedDevices.filter(id => id !== deviceId);
                    localStorage.setItem(LOCKED_DEVICES_KEY, JSON.stringify(newLockedDevices));
                    localStorage.removeItem(`nxld_lock_reason_perm_${deviceId}`);
                    localStorage.removeItem(`nxld_lock_time_perm_${deviceId}`);
                    localStorage.removeItem(`nxld_detect_count_perm_${deviceId}`);
                    
                    // 触发storage事件，通知其他标签页
                    window.dispatchEvent(new StorageEvent('storage', {
                        key: LOCKED_DEVICES_KEY,
                        newValue: JSON.stringify(newLockedDevices)
                    }));
                    
                    return true;
                } catch(e) {
                    console.error('解锁失败:', e);
                    return false;
                }
            }
            
            function getLockedDevices() {
                try {
                    return JSON.parse(localStorage.getItem(LOCKED_DEVICES_KEY) || '[]');
                } catch(e) {
                    return [];
                }
            }
            
            function getDeviceLockInfo(deviceId) {
                try {
                    return {
                        reason: localStorage.getItem(`nxld_lock_reason_perm_${deviceId}`) || '多次调试行为',
                        time: localStorage.getItem(`nxld_lock_time_perm_${deviceId}`) || '未知',
                        count: parseInt(localStorage.getItem(`nxld_detect_count_perm_${deviceId}`) || '3')
                    };
                } catch(e) {
                    return { reason: '多次调试行为', time: '未知', count: 3 };
                }
            }
            
            function getDeviceDetectCount() {
                try {
                    return parseInt(localStorage.getItem(DETECT_COUNT_KEY_PREFIX + DEVICE_ID) || '0');
                } catch(e) {
                    return 0;
                }
            }
            
            function incrementDetectCount() {
                try {
                    let count = getDeviceDetectCount();
                    count++;
                    localStorage.setItem(DETECT_COUNT_KEY_PREFIX + DEVICE_ID, count.toString());
                    if (count >= 3) {
                        lockDevice('检测到' + count + '次调试行为，设备已被锁定');
                        return true;
                    }
                    return false;
                } catch(e) {
                    return false;
                }
            }
            
            function redirectToWarning() {
                if (hasRedirected) return;
                hasRedirected = true;
                incrementDetectCount();
                window.location.href = WARNING_URL + '?device=' + DEVICE_ID;
            }
            
            if (isDeviceLocked()) {
                window.location.href = WARNING_URL + '?device=' + DEVICE_ID;
            }
            
            // ========== 检测功能 ==========
            let consoleCheckCount = 0, lastConsoleTime = 0;
            function detectConsoleOpen() {
                const before = Date.now();
                console.log('%c', 'color: transparent');
                const after = Date.now();
                if (after - before > 50) {
                    const now = Date.now();
                    if (now - lastConsoleTime < 2000) {
                        consoleCheckCount++;
                        if (consoleCheckCount >= 3) redirectToWarning();
                    } else consoleCheckCount = 1;
                    lastConsoleTime = now;
                } else consoleCheckCount = 0;
            }
            
            let sizeCheckCount = 0, lastSizeCheck = 0;
            function detectDevToolsBySize() {
                const widthDiff = Math.abs(window.outerWidth - window.innerWidth);
                const heightDiff = Math.abs(window.outerHeight - window.innerHeight);
                if (widthDiff > 150 || heightDiff > 150) {
                    const now = Date.now();
                    if (now - lastSizeCheck < 500) {
                        sizeCheckCount++;
                        if (sizeCheckCount >= 2) redirectToWarning();
                    } else sizeCheckCount = 1;
                    lastSizeCheck = now;
                } else sizeCheckCount = 0;
            }
            
            let shortcutCount = 0, lastShortcutTime = 0;
            function detectDevToolsShortcut(e) {
                const isDevToolKey = e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                    (e.ctrlKey && (e.key === 'U' || e.key === 'R')) ||
                    (e.ctrlKey && e.key === 'r');
                if (isDevToolKey) {
                    e.preventDefault();
                    e.stopPropagation();
                    const now = Date.now();
                    if (now - lastShortcutTime < 1000) {
                        shortcutCount++;
                        if (shortcutCount >= 2) redirectToWarning();
                    } else shortcutCount = 1;
                    lastShortcutTime = now;
                    return false;
                }
            }
            
            function disableRightClick(e) { e.preventDefault(); return false; }
            
            let mutationCount = 0, lastMutationTime = 0;
            function detectElementInspection() {
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'attributes') {
                            const now = Date.now();
                            if (now - lastMutationTime < 500) {
                                mutationCount++;
                                if (mutationCount >= 5) redirectToWarning();
                            } else mutationCount = 1;
                            lastMutationTime = now;
                        }
                    });
                });
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['style', 'class', 'id'] });
            }
            
            let consoleCommandCount = 0, lastCommandTime = 0;
            const originalLog = console.log, originalWarn = console.warn, originalError = console.error;
            console.log = function() {
                const now = Date.now();
                if (now - lastCommandTime < 100) { consoleCommandCount++; if (consoleCommandCount >= 5) redirectToWarning(); } else consoleCommandCount = 1;
                lastCommandTime = now;
                originalLog.apply(console, arguments);
            };
            console.warn = function() {
                const now = Date.now();
                if (now - lastCommandTime < 100) { consoleCommandCount++; if (consoleCommandCount >= 5) redirectToWarning(); } else consoleCommandCount = 1;
                lastCommandTime = now;
                originalWarn.apply(console, arguments);
            };
            console.error = function() {
                const now = Date.now();
                if (now - lastCommandTime < 100) { consoleCommandCount++; if (consoleCommandCount >= 5) redirectToWarning(); } else consoleCommandCount = 1;
                lastCommandTime = now;
                originalError.apply(console, arguments);
            };
            
            let modifierDetectCount = 0, lastModifierTime = 0;
            function detectMemoryModifiers() {
                const userAgent = window.navigator.userAgent.toLowerCase();
                const suspiciousPatterns = ['cheat', 'guardian', 'memory editor', 'speed hack'];
                let hasSuspicious = false;
                for (let i = 0; i < suspiciousPatterns.length; i++) {
                    if (userAgent.includes(suspiciousPatterns[i])) { hasSuspicious = true; break; }
                }
                const suspiciousGlobals = ['GG', 'CHEAT_ENGINE', 'MemoryHack', 'SpeedHack', 'GameGuardian', 'CheatEngine'];
                for (let i = 0; i < suspiciousGlobals.length; i++) {
                    if (window[suspiciousGlobals[i]] !== undefined) { hasSuspicious = true; break; }
                }
                if (hasSuspicious) {
                    const now = Date.now();
                    if (now - lastModifierTime < 3000) { modifierDetectCount++; if (modifierDetectCount >= 2) redirectToWarning(); } else modifierDetectCount = 1;
                    lastModifierTime = now;
                } else modifierDetectCount = 0;
            }
            
            let lastFrameTime = performance.now(), abnormalFrameCount = 0;
            function checkFrameRate() {
                const now = performance.now();
                const delta = now - lastFrameTime;
                if (delta < 5 || delta > 100) { abnormalFrameCount++; if (abnormalFrameCount > 10) redirectToWarning(); } else abnormalFrameCount = Math.max(0, abnormalFrameCount - 1);
                lastFrameTime = now;
                requestAnimationFrame(checkFrameRate);
            }
            
            function detectOverlay() {
                setInterval(function() {
                    const allElements = document.getElementsByTagName('*');
                    for (let i = 0; i < Math.min(allElements.length, 100); i++) {
                        const zIndex = window.getComputedStyle(allElements[i]).zIndex;
                        if (zIndex && parseInt(zIndex) > 999999) { redirectToWarning(); break; }
                    }
                }, 2000);
            }
            
            document.addEventListener('keydown', detectDevToolsShortcut);
            document.addEventListener('contextmenu', disableRightClick);
            detectElementInspection();
            setInterval(function() { detectDevToolsBySize(); detectConsoleOpen(); detectMemoryModifiers(); }, 500);
            requestAnimationFrame(checkFrameRate);
            detectOverlay();
            if (window.self !== window.top) redirectToWarning();
            if (/HeadlessChrome/.test(window.navigator.userAgent)) redirectToWarning();
            if (window.navigator.webdriver) redirectToWarning();
            
            document.addEventListener('selectstart', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return true;
                e.preventDefault();
                return false;
            });
            document.addEventListener('copy', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return true;
                e.preventDefault();
                return false;
            });
            
            window.__getDeviceId = function() { return DEVICE_ID; };
            window.__getLockedDevices = getLockedDevices;
            window.__getDeviceLockInfo = getDeviceLockInfo;
            window.__unlockDevice = unlockDevice;
            window.__isDeviceLocked = isDeviceLocked;
        })();
    </script>

    <div class="cloud-status" id="cloudStatus"><i class="fas fa-cloud" id="cloudIcon"></i><span id="cloudText">同步中...</span></div>
    <div id="toastContainer"></div>
    <div class="agreement-modal" id="agreementModal"><div class="agreement-content"><div class="agreement-header"><i class="fas fa-scale-balanced"></i><h3>知情协议</h3></div><div class="agreement-body"><p>本网站全部资源均已经过原作者授权。</p><p>本网站及其内容未经原作者许可严禁倒卖或二次魔改。</p><p style="margin-top: 1rem; color: #818cf8;">署名：NXLD</p></div><div class="agreement-footer"><button class="agreement-close" id="closeAgreement">已知晓</button></div></div></div>
    <div class="thanks-modal" id="thanksModal"><div class="thanks-content"><div class="thanks-header"><i class="fas fa-heart"></i><h3>致谢名单</h3></div><div class="thanks-body"><p>感谢小猫原创、TwT、蜜雪小橙、</p><p>小夕、祁厌、Jocelyn提供的个签代码</p></div><div class="thanks-footer"><button class="thanks-close" id="closeThanks">关闭</button></div></div></div>
    
    <script>
        (function() {
            const loadingSpinner = document.getElementById('loadingSpinner');
            const deviceIdDisplay = document.getElementById('deviceIdDisplay');
            const deviceCard = document.getElementById('deviceCard');
            
            setTimeout(() => {
                const deviceId = window.__getDeviceId ? window.__getDeviceId() : 'unknown';
                if (deviceIdDisplay) deviceIdDisplay.textContent = deviceId;
                if (deviceCard) {
                    deviceCard.onclick = () => {
                        const deviceId = window.__getDeviceId ? window.__getDeviceId() : 'unknown';
                        copyToClipboard(deviceId);
                        showToast('设备码已复制');
                    };
                }
            }, 500);
            
            const SUPABASE_URL = 'https://ssevtpugvqvhtusjqpcg.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_kCaFQB5lhmOSkLtdSSuE_w_DRQo9Vdj';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const supernaturalBtn = document.getElementById('supernaturalBtn');
            const innerDynamic = document.getElementById('innerDynamic');
            const backContainer = document.getElementById('backButtonContainer');
            const statusTag = document.getElementById('statusTag');
            const searchInput = document.getElementById('searchInput');
            const toastContainer = document.getElementById('toastContainer');
            const agreementBtn = document.getElementById('agreementBtn');
            const agreementModal = document.getElementById('agreementModal');
            const closeAgreement = document.getElementById('closeAgreement');
            const cloudStatus = document.getElementById('cloudStatus');
            const cloudIcon = document.getElementById('cloudIcon');
            const cloudText = document.getElementById('cloudText');
            const thanksBtn = document.getElementById('thanksBtn');
            const thanksModal = document.getElementById('thanksModal');
            const closeThanks = document.getElementById('closeThanks');
            const submitSignatureBtn = document.getElementById('submitSignatureBtn');
            const adminBtn = document.getElementById('adminBtn');
            
            let historyStack = [];
            let currentAdminLevel = 'guest';
            let pendingSignatures = [];
            let approvedSignatures = [];
            let fixedSignatures = [];
            let operationLogs = [];
            let currentTab = 'pending';
            
            function setCloudStatus(status, message) {
                cloudText.textContent = message;
                cloudIcon.className = 'fas';
                if (status === 'syncing') { cloudIcon.classList.add('fa-sync-alt'); cloudStatus.classList.add('syncing'); }
                else { cloudIcon.classList.add('fa-cloud'); cloudStatus.classList.remove('syncing'); if (status === 'error') cloudIcon.classList.add('fa-exclamation-triangle'); }
            }
            
            async function loadFromSupabase() {
                try {
                    setCloudStatus('syncing', '加载数据...');
                    const { data: signatures, error } = await supabase.from('nxld_data').select('*').order('submit_time', { ascending: false });
                    if (error) throw error;
                    fixedSignatures = signatures.filter(s => s.type === 'fixed').map(s => ({ ...s, platform: 'qq' }));
                    pendingSignatures = signatures.filter(s => s.status === 'pending' && s.type === 'user').map(s => ({ ...s, platform: s.platform || 'qq' }));
                    approvedSignatures = signatures.filter(s => s.status === 'approved' && s.type === 'user').map(s => ({ ...s, platform: s.platform || 'qq' }));
                    const { data: logs, error: logError } = await supabase.from('nxld_data').select('*').eq('type', 'log').order('action_time', { ascending: false }).limit(100);
                    if (!logError && logs) operationLogs = logs.map(log => ({ time: new Date(log.action_time).toLocaleString(), action: log.action, details: log.action_details, status: log.status }));
                    setCloudStatus('synced', '已同步');
                    return signatures;
                } catch (error) {
                    console.error('加载数据失败:', error);
                    setCloudStatus('error', '同步失败');
                    showToast('加载云端数据失败');
                    if (loadingSpinner) loadingSpinner.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:1rem;"></i><div>加载失败，请检查网络连接</div><button class="retry-btn" onclick="location.reload()"><i class="fas fa-redo"></i> 重新加载</button></div>`;
                    return [];
                }
            }
            
            async function saveToSupabase(data) { try { setCloudStatus('syncing', '保存中...'); const { error } = await supabase.from('nxld_data').insert([data]); if (error) throw error; setCloudStatus('synced', '已同步'); return true; } catch(e) { setCloudStatus('error', '保存失败'); return false; } }
            async function updateInSupabase(id, updates) { try { setCloudStatus('syncing', '更新中...'); const { error } = await supabase.from('nxld_data').update(updates).eq('id', id); if (error) throw error; setCloudStatus('synced', '已同步'); return true; } catch(e) { setCloudStatus('error', '更新失败'); return false; } }
            async function deleteFromSupabase(id) { if (currentAdminLevel !== 'super') { showToast('只有超级管理员可以删除'); return false; } try { setCloudStatus('syncing', '删除中...'); const { error } = await supabase.from('nxld_data').delete().eq('id', id); if (error) throw error; setCloudStatus('synced', '已同步'); return true; } catch(e) { setCloudStatus('error', '删除失败'); return false; } }
            async function addLog(action, details, status = 'info') { await saveToSupabase({ qq: 'system', content: '系统日志', action, action_details: details, status, type: 'log', action_time: new Date().toISOString() }); }
            function checkDuplicate(content) { if (fixedSignatures.find(s => s.content === content)) return { duplicate: true, type: 'fixed', qq: fixedSignatures.find(s => s.content === content).qq, platform: 'qq' }; if (approvedSignatures.find(s => s.content === content)) return { duplicate: true, type: 'approved', qq: approvedSignatures.find(s => s.content === content).qq, platform: approvedSignatures.find(s => s.content === content).platform || 'qq' }; if (pendingSignatures.find(s => s.content === content)) return { duplicate: true, type: 'pending', qq: pendingSignatures.find(s => s.content === content).qq, platform: pendingSignatures.find(s => s.content === content).platform || 'qq' }; return { duplicate: false }; }
            function setupRealtime() { supabase.channel('nxld_changes').on('postgres_changes', { event: '*', schema: 'public', table: 'nxld_data' }, async () => { await loadFromSupabase(); const v = historyStack[historyStack.length - 1]; if (v === 'signature') showSignaturePage(false); else if (v === 'admin' && currentAdminLevel !== 'guest') showAdminPanel(); }).subscribe(); }
            function copyToClipboard(text) { const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;left:-9999px;top:0'; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy') ? showToast('复制成功') : showToast('复制失败'); } catch(e) { showToast('复制失败'); } document.body.removeChild(ta); }
            function showToast(msg) { const toast = document.createElement('div'); toast.className = 'copy-toast'; toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`; toastContainer.appendChild(toast); setTimeout(() => toast.remove(), 1500); }
            function convertToHtml(content) { if (!content) return ''; return content.replace(/<color=#([A-Fa-f0-9]{6})>/g, '<span style="color:#$1;">').replace(/<color=#([A-Fa-f0-9]{3})>/g, '<span style="color:#$1;">').replace(/<size=(\d+)>/g, (m,s) => `<span style="font-size:${parseInt(s)/16}rem;">`).replace(/<\/color>/g, '</span>').replace(/<\/size>/g, '</span>').replace(/<b>/g, '<b>').replace(/<\/b>/g, '</b>').replace(/<i>/g, '<i>').replace(/<\/i>/g, '</i>').replace(/<u>/g, '<u>').replace(/<\/u>/g, '</u>'); }
            
            async function showAdminPanel() {
                await loadFromSupabase();
                const container = document.createElement('div');
                const currentDeviceId = window.__getDeviceId ? window.__getDeviceId() : 'unknown';
                const lockedDevices = window.__getLockedDevices ? window.__getLockedDevices() : [];
                
                const levelBadge = document.createElement('div');
                levelBadge.style.cssText = 'text-align:center;margin-bottom:1rem;padding:0.5rem;border-radius:2rem';
                levelBadge.style.background = currentAdminLevel === 'super' ? 'rgba(139,92,246,0.2)' : 'rgba(16,185,129,0.2)';
                levelBadge.style.color = currentAdminLevel === 'super' ? '#a78bfa' : '#10b981';
                levelBadge.innerHTML = currentAdminLevel === 'super' ? '<i class="fas fa-crown"></i> 超级管理员模式（可删除/解锁设备）<br><span style="font-size:0.7rem;">当前设备码: ' + currentDeviceId + '</span>' : '<i class="fas fa-user"></i> 普通管理员模式（仅可审核）';
                container.appendChild(levelBadge);
                
                const statsContainer = document.createElement('div');
                statsContainer.className = 'admin-stats';
                statsContainer.innerHTML = `<div class="stat-card"><div class="stat-number">${pendingSignatures.length + approvedSignatures.length}</div><div class="stat-label">总提交</div></div><div class="stat-card"><div class="stat-number" style="color:#f59e0b;">${pendingSignatures.length}</div><div class="stat-label">待审核</div></div><div class="stat-card"><div class="stat-number" style="color:#10b981;">${approvedSignatures.length}</div><div class="stat-label">已通过</div></div>`;
                container.appendChild(statsContainer);
                
                const tabContainer = document.createElement('div');
                tabContainer.className = 'tab-container';
                tabContainer.innerHTML = `<button class="tab-btn ${currentTab === 'pending' ? 'active' : ''}" data-tab="pending">待审核 (${pendingSignatures.length})</button><button class="tab-btn ${currentTab === 'approved' ? 'active' : ''}" data-tab="approved">已通过 (${approvedSignatures.length})</button><button class="tab-btn ${currentTab === 'logs' ? 'active' : ''}" data-tab="logs">操作日志</button>`;
                container.appendChild(tabContainer);
                
                // 超级管理员：显示被锁定的设备列表 + 手动解锁功能
                if (currentAdminLevel === 'super') {
                    // 被锁定的设备列表
                    if (lockedDevices.length > 0) {
                        const lockSection = document.createElement('div');
                        lockSection.className = 'unlock-section';
                        lockSection.innerHTML = `<div class="unlock-info"><div class="title"><i class="fas fa-lock"></i> 被锁定的设备 (${lockedDevices.length})</div><div class="device-list" id="deviceList"></div></div>`;
                        container.appendChild(lockSection);
                        
                        setTimeout(() => {
                            const deviceListDiv = document.getElementById('deviceList');
                            if (deviceListDiv) {
                                deviceListDiv.innerHTML = '';
                                lockedDevices.forEach(deviceId => {
                                    const lockInfo = window.__getDeviceLockInfo ? window.__getDeviceLockInfo(deviceId) : { reason: '多次调试行为', time: '未知', count: 3 };
                                    const isCurrentDevice = deviceId === currentDeviceId;
                                    const deviceItem = document.createElement('div');
                                    deviceItem.className = 'device-item';
                                    deviceItem.innerHTML = `
                                        <div class="device-item-info">
                                            <div class="device-item-id">设备码: ${deviceId} ${isCurrentDevice ? '<span style="color:#10b981;">(当前设备)</span>' : ''}</div>
                                            <div class="device-item-reason">锁定原因: ${lockInfo.reason}</div>
                                            <div class="device-item-time">锁定时间: ${lockInfo.time}</div>
                                            <div class="device-item-time">检测次数: ${lockInfo.count}/3</div>
                                        </div>
                                        <button class="unlock-device-btn" data-device="${deviceId}"><i class="fas fa-unlock-alt"></i> 解锁</button>
                                    `;
                                    deviceListDiv.appendChild(deviceItem);
                                });
                                document.querySelectorAll('.unlock-device-btn').forEach(btn => {
                                    btn.addEventListener('click', function() {
                                        const deviceId = this.dataset.device;
                                        if (confirm(`确定要解锁设备 ${deviceId} 吗？`)) {
                                            if (window.__unlockDevice && window.__unlockDevice(deviceId)) {
                                                showToast(`✅ 设备 ${deviceId} 已解锁`);
                                                // 刷新当前页面以更新锁定状态
                                                setTimeout(() => {
                                                    showAdminPanel();
                                                    // 如果解锁的是当前设备，刷新整个页面
                                                    if (deviceId === currentDeviceId) {
                                                        setTimeout(() => location.reload(), 1000);
                                                    }
                                                }, 500);
                                            } else {
                                                showToast('解锁失败');
                                            }
                                        }
                                    });
                                });
                            }
                        }, 100);
                    } else {
                        const noLockSection = document.createElement('div');
                        noLockSection.className = 'unlock-section';
                        noLockSection.style.background = 'rgba(16,185,129,0.1)';
                        noLockSection.style.borderColor = '#10b981';
                        noLockSection.innerHTML = `<div class="unlock-info"><div class="title" style="color:#10b981;"><i class="fas fa-check-circle"></i> 暂无被锁定的设备</div></div>`;
                        container.appendChild(noLockSection);
                    }
                    
                    // 手动解锁功能（输入设备码解锁）
                    const manualUnlockSection = document.createElement('div');
                    manualUnlockSection.className = 'manual-unlock-section';
                    manualUnlockSection.innerHTML = `
                        <div class="unlock-info">
                            <div class="title" style="color:#10b981;"><i class="fas fa-key"></i> 手动解锁设备</div>
                            <div class="manual-unlock-input-group">
                                <input type="text" class="manual-unlock-input" id="manualUnlockDeviceId" placeholder="输入要解锁的设备码">
                                <button class="manual-unlock-btn" id="manualUnlockBtn"><i class="fas fa-unlock-alt"></i> 解锁设备</button>
                            </div>
                            <div id="manualUnlockResult" style="margin-top: 0.5rem;"></div>
                        </div>
                    `;
                    container.appendChild(manualUnlockSection);
                    
                    setTimeout(() => {
                        const manualUnlockBtn = document.getElementById('manualUnlockBtn');
                        const manualUnlockInput = document.getElementById('manualUnlockDeviceId');
                        const manualUnlockResult = document.getElementById('manualUnlockResult');
                        
                        if (manualUnlockBtn) {
                            manualUnlockBtn.addEventListener('click', () => {
                                const deviceId = manualUnlockInput.value.trim();
                                if (!deviceId) {
                                    manualUnlockResult.innerHTML = '<div class="unlock-result-error"><i class="fas fa-exclamation-circle"></i> 请输入设备码</div>';
                                    return;
                                }
                                if (window.__unlockDevice && window.__unlockDevice(deviceId)) {
                                    manualUnlockResult.innerHTML = '<div class="unlock-result-success"><i class="fas fa-check-circle"></i> 设备已成功解锁！页面将刷新...</div>';
                                    manualUnlockInput.value = '';
                                    // 刷新管理员面板
                                    setTimeout(() => {
                                        showAdminPanel();
                                        // 如果解锁的是当前设备，刷新整个页面
                                        if (deviceId === currentDeviceId) {
                                            setTimeout(() => location.reload(), 1500);
                                        }
                                    }, 500);
                                } else {
                                    manualUnlockResult.innerHTML = '<div class="unlock-result-error"><i class="fas fa-times-circle"></i> 未找到该设备码或设备未被锁定</div>';
                                }
                            });
                            manualUnlockInput.addEventListener('keypress', (e) => {
                                if (e.key === 'Enter') manualUnlockBtn.click();
                            });
                        }
                    }, 100);
                }
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'submit-form';
                contentDiv.style.maxWidth = '800px';
                
                if (currentTab === 'pending') {
                    let html = '<h3 style="color:#f59e0b;">待审核列表</h3>';
                    if (!pendingSignatures.length) html += '<div style="color:#9ca3af;text-align:center;padding:2rem;">暂无待审核内容</div>';
                    else {
                        html += '<div style="max-height:500px;overflow-y:auto;">';
                        pendingSignatures.forEach(sig => {
                            let preview = '';
                            if (sig.submit_type === 'signature') preview = `<div style="margin-top:0.3rem;">${convertToHtml(sig.content)}</div>`;
                            else if (sig.submit_type === 'report') preview = `<div style="color:#ef4444;">倒卖举报 - 证据:${sig.images?.length||0}张</div>`;
                            else preview = `<div style="color:#f59e0b;">Bug反馈: ${sig.content}</div>`;
                            let platformText = sig.platform === 'qq' ? 'QQ' : (sig.platform === 'douyin' ? 'dy' : 'ks');
                            let authorText = sig.platform === 'qq' ? `QQ：${sig.qq}` : (sig.platform === 'douyin' ? `dy：${sig.qq}` : `ks：${sig.qq}`);
                            html += `<div style="background:rgba(255,255,255,0.03);border-radius:1rem;padding:1rem;margin-bottom:1rem;"><div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;"><span><span style="color:#818cf8;">${platformText}:</span> ${authorText}</span>${currentAdminLevel === 'super' ? `<button class="delete-btn" onclick="window.deleteAnyItem(${sig.id})"><i class="fas fa-trash"></i> 删除</button>` : ''}</div><div style="background:rgba(0,0,0,0.2);padding:0.5rem;border-radius:0.5rem;">${preview}</div><div style="color:#9ca3af;font-size:0.8rem;margin:0.5rem 0;">提交: ${new Date(sig.submit_time).toLocaleString()}</div><div style="display:flex;gap:0.5rem;"><button class="query-button" style="background:#10b981;" onclick="window.approveSignature(${sig.id})">通过</button><button class="query-button" style="background:#ef4444;" onclick="window.rejectSignature(${sig.id})">拒绝</button></div></div>`;
                        });
                        html += '</div>';
                    }
                    contentDiv.innerHTML = html;
                } else if (currentTab === 'approved') {
                    let html = '<h3 style="color:#10b981;">已通过列表</h3>';
                    const approvedItems = approvedSignatures.filter(s => s.submit_type === 'signature');
                    if (!approvedItems.length) html += '<div style="color:#9ca3af;text-align:center;padding:2rem;">暂无已通过签名</div>';
                    else {
                        html += '<div style="max-height:500px;overflow-y:auto;">';
                        approvedItems.forEach(sig => {
                            let platformText = sig.platform === 'qq' ? 'QQ' : (sig.platform === 'douyin' ? 'dy' : 'ks');
                            let authorText = sig.platform === 'qq' ? `QQ：${sig.qq}` : (sig.platform === 'douyin' ? `dy：${sig.qq}` : `ks：${sig.qq}`);
                            html += `<div style="background:rgba(255,255,255,0.03);border-radius:1rem;padding:1rem;margin-bottom:1rem;"><div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;"><span><span style="color:#818cf8;">${platformText}:</span> ${authorText}</span>${currentAdminLevel === 'super' ? `<button class="delete-btn" onclick="window.deleteAnyItem(${sig.id})"><i class="fas fa-trash"></i> 删除</button>` : ''}</div><div style="background:rgba(0,0,0,0.2);padding:0.5rem;border-radius:0.5rem;"><span style="color:#818cf8;">预览:</span><div style="margin-top:0.3rem;">${convertToHtml(sig.content)}</div></div></div>`;
                        });
                        html += '</div>';
                    }
                    contentDiv.innerHTML = html;
                } else {
                    let html = '<h3 style="color:#818cf8;">操作日志</h3><div class="log-container">';
                    if (!operationLogs.length) html += '<div style="color:#9ca3af;text-align:center;padding:1rem;">暂无日志</div>';
                    else operationLogs.forEach(l => html += `<div class="log-item"><span class="log-time">[${l.time}]</span><span class="log-content">${l.action}: ${l.details}</span></div>`);
                    html += '</div>';
                    contentDiv.innerHTML = html;
                }
                container.appendChild(contentDiv);
                
                if (currentAdminLevel === 'super') {
                    const syncBtn = document.createElement('button');
                    syncBtn.className = 'download-html-btn';
                    syncBtn.style.cssText = 'margin-top:1rem;background:linear-gradient(135deg,#f59e0b,#d97706)';
                    syncBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 强制刷新云端';
                    syncBtn.onclick = async () => { await loadFromSupabase(); showAdminPanel(); showToast('已刷新'); };
                    container.appendChild(syncBtn);
                }
                
                innerDynamic.innerHTML = '';
                innerDynamic.appendChild(container);
                document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => { currentTab = btn.dataset.tab; showAdminPanel(); });
                
                window.approveSignature = async (id) => {
                    const sig = pendingSignatures.find(s => s.id === id);
                    if (await updateInSupabase(id, { status: 'approved', review_time: new Date().toISOString(), reviewed_by: currentAdminLevel })) {
                        await addLog('通过', `${sig.platform === 'qq' ? 'QQ' : (sig.platform === 'douyin' ? 'dy' : 'ks')}:${sig.qq} 的签名已通过`);
                        showToast('已通过');
                        await loadFromSupabase();
                        showAdminPanel();
                    }
                };
                window.rejectSignature = async (id) => {
                    const sig = pendingSignatures.find(s => s.id === id);
                    if (await updateInSupabase(id, { status: 'rejected', review_time: new Date().toISOString(), reviewed_by: currentAdminLevel })) {
                        await addLog('拒绝', `${sig.platform === 'qq' ? 'QQ' : (sig.platform === 'douyin' ? 'dy' : 'ks')}:${sig.qq} 的签名被拒绝`);
                        showToast('已拒绝');
                        await loadFromSupabase();
                        showAdminPanel();
                    }
                };
                window.deleteAnyItem = async (id) => {
                    if (confirm('确定删除？不可恢复！') && await deleteFromSupabase(id)) {
                        showToast('已删除');
                        await loadFromSupabase();
                        showAdminPanel();
                    }
                };
            }
            
            async function showSignaturePage(pushToHistory = true) {
                resetAll();
                if (pushToHistory) historyStack.push('signature');
                await loadFromSupabase();
                const allSignatures = [...fixedSignatures.map(s => ({ ...s, platform: 'qq' })), ...approvedSignatures.filter(s => s.submit_type === 'signature')].map(s => {
                    let displayName = s.platform === 'qq' ? `QQ：${s.qq}` : (s.platform === 'douyin' ? `dy：${s.qq}` : `ks：${s.qq}`);
                    return { raw: s.content, displayName, html: convertToHtml(s.content) };
                });
                const container = document.createElement('div');
                const hint = document.createElement('div');
                hint.className = 'top-hint';
                hint.innerHTML = '<i class="fas fa-info-circle"></i> 点击卡片复制原内容';
                container.appendChild(hint);
                const grid = document.createElement('div');
                grid.className = 'signature-grid';
                allSignatures.forEach((sig, i) => {
                    const card = document.createElement('div');
                    card.className = 'signature-card-container';
                    card.innerHTML = `<div class="signature-card"><div class="signature-text">${sig.html}</div><div class="signature-qq">${sig.displayName}</div><div class="copy-hint"><i class="fas fa-copy"></i> 点击复制</div></div>`;
                    card.onclick = () => copyToClipboard(sig.raw);
                    grid.appendChild(card);
                });
                container.appendChild(grid);
                statusTag.textContent = `签名合集 · 共${allSignatures.length}个`;
                innerDynamic.innerHTML = '';
                innerDynamic.appendChild(container);
                refreshBackButton();
                setTimeout(performGlobalSearch, 10);
            }
            
            function showSubmitSignature(pushToHistory = true) {
                resetAll();
                if (pushToHistory) historyStack.push('submit');
                statusTag.textContent = '提交投稿';
                const container = document.createElement('div');
                container.className = 'submit-form';
                container.innerHTML = `
                    <div class="type-selector"><div class="type-option selected" data-type="signature"><div class="type-icon"><i class="fas fa-signature"></i></div><div class="type-name">签名投稿</div><div class="type-desc">分享个性签名</div></div><div class="type-option" data-type="report"><div class="type-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="type-name">倒卖举报</div><div class="type-desc">举报倒卖行为（可传图）</div></div><div class="type-option" data-type="bug"><div class="type-icon"><i class="fas fa-bug"></i></div><div class="type-name">Bug反馈</div><div class="type-desc">反馈问题</div></div></div>
                    <div class="platform-selector"><div class="platform-option selected" data-platform="qq"><div class="platform-icon"><i class="fab fa-qq"></i></div><div class="platform-name">QQ</div></div><div class="platform-option" data-platform="douyin"><div class="platform-icon"><i class="fab fa-tiktok"></i></div><div class="platform-name">抖音</div></div><div class="platform-option" data-platform="kuaishou"><div class="platform-icon"><i class="fas fa-video"></i></div><div class="platform-name">快手</div></div></div>
                    <div class="form-group"><label class="form-label" id="accountLabel">你的QQ号</label><input type="text" class="form-input" id="submitAccount" placeholder="请输入账号"></div>
                    <div class="form-group" id="contentGroup"><label class="form-label" id="contentLabel">签名内容</label><textarea class="form-input form-textarea" id="submitContent" placeholder="请输入内容"></textarea></div>
                    <div class="form-group" id="imageUploadGroup" style="display:none;"><div class="image-upload-area" id="imageUploadArea"><i class="fas fa-cloud-upload-alt"></i><div class="upload-text">点击上传图片证据</div><div class="upload-hint">支持多张，最多9张</div></div><input type="file" id="fileInput" multiple accept="image/*" style="display:none;"><div class="image-preview" id="imagePreview"></div></div>
                    <button class="submit-button" id="doSubmitBtn">提交</button>
                    <div class="submit-info" id="submitInfo"></div>
                    <div class="query-section"><div class="query-input-group"><input type="text" class="form-input" id="queryAccount" placeholder="输入账号查询提交状态"><button class="query-button" id="queryBtn">查询</button></div><div class="query-result" id="queryResult"></div></div>
                `;
                innerDynamic.innerHTML = '';
                innerDynamic.appendChild(container);
                let currentType = 'signature', currentPlatform = 'qq', uploadedImages = [];
                document.querySelectorAll('.type-option').forEach(opt => opt.onclick = function() {
                    document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    currentType = this.dataset.type;
                    const cg = document.getElementById('contentGroup'), ig = document.getElementById('imageUploadGroup'), cl = document.getElementById('contentLabel'), al = document.getElementById('accountLabel');
                    if (currentType === 'signature') { cg.style.display = 'block'; ig.style.display = 'none'; cl.textContent = '签名内容'; al.textContent = '你的账号'; }
                    else if (currentType === 'report') { cg.style.display = 'block'; ig.style.display = 'block'; cl.textContent = '举报说明'; al.textContent = '你的账号'; }
                    else { cg.style.display = 'block'; ig.style.display = 'none'; cl.textContent = 'Bug描述'; al.textContent = '你的账号'; }
                });
                document.querySelectorAll('.platform-option').forEach(opt => opt.onclick = function() {
                    document.querySelectorAll('.platform-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    currentPlatform = this.dataset.platform;
                    const al = document.getElementById('accountLabel');
                    if (currentPlatform === 'qq') al.textContent = '你的QQ号';
                    else if (currentPlatform === 'douyin') al.textContent = '你的抖音号';
                    else al.textContent = '你的快手号';
                });
                const uploadArea = document.getElementById('imageUploadArea'), fileInput = document.getElementById('fileInput'), preview = document.getElementById('imagePreview');
                uploadArea.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    uploadedImages = []; preview.innerHTML = '';
                    Array.from(e.target.files).slice(0,9).forEach(f => {
                        const r = new FileReader();
                        r.onload = (ev) => {
                            uploadedImages.push(ev.target.result);
                            const item = document.createElement('div');
                            item.className = 'preview-item';
                            item.innerHTML = `<img src="${ev.target.result}"><div class="remove-image">×</div>`;
                            item.querySelector('.remove-image').onclick = () => item.remove();
                            preview.appendChild(item);
                        };
                        r.readAsDataURL(f);
                    });
                };
                document.getElementById('doSubmitBtn').onclick = async () => {
                    const acc = document.getElementById('submitAccount').value.trim(), cont = document.getElementById('submitContent').value.trim(), info = document.getElementById('submitInfo');
                    if (!acc) { info.textContent = `请输入${currentPlatform === 'qq' ? 'QQ号' : (currentPlatform === 'douyin' ? '抖音号' : '快手号')}`; info.style.color = '#ef4444'; return; }
                    if (currentType === 'signature') {
                        if (!cont) { info.textContent = '请输入签名内容'; info.style.color = '#ef4444'; return; }
                        const dup = checkDuplicate(cont);
                        if (dup.duplicate) {
                            let platformName = dup.platform === 'qq' ? 'QQ' : (dup.platform === 'douyin' ? 'dy' : 'ks');
                            info.textContent = `该签名已存在 (${platformName}：${dup.qq})`;
                            info.style.color = '#f59e0b'; return;
                        }
                    }
                    if (currentType === 'report' && !cont) { info.textContent = '请输入举报说明'; info.style.color = '#ef4444'; return; }
                    if (currentType === 'bug' && !cont) { info.textContent = '请输入Bug描述'; info.style.color = '#ef4444'; return; }
                    if (await saveToSupabase({ qq: acc, content: cont || '无内容', platform: currentPlatform, status: 'pending', type: 'user', submit_type: currentType, images: uploadedImages, submit_time: new Date().toISOString() })) {
                        await addLog('提交', `${currentPlatform === 'qq' ? 'QQ' : (currentPlatform === 'douyin' ? 'dy' : 'ks')}:${acc} 提交了${currentType === 'signature' ? '签名' : (currentType === 'report' ? '举报' : 'Bug反馈')}`);
                        info.textContent = '提交成功！管理员审核后将显示'; info.style.color = '#10b981';
                        document.getElementById('submitAccount').value = ''; document.getElementById('submitContent').value = ''; uploadedImages = []; preview.innerHTML = '';
                        await loadFromSupabase();
                    } else { info.textContent = '提交失败，请重试'; info.style.color = '#ef4444'; }
                };
                document.getElementById('queryBtn').onclick = () => {
                    const acc = document.getElementById('queryAccount').value.trim(), res = document.getElementById('queryResult');
                    if (!acc) { res.innerHTML = '<div style="color:#ef4444;">请输入账号</div>'; return; }
                    const items = [...pendingSignatures, ...approvedSignatures].filter(s => s.qq === acc);
                    if (!items.length) res.innerHTML = '<div style="color:#9ca3af;">没有找到记录</div>';
                    else res.innerHTML = items.map(s => `<div class="query-item"><div><div>${s.submit_type === 'signature' ? '签名投稿' : (s.submit_type === 'report' ? '倒卖举报' : 'Bug反馈')} - ${s.platform === 'qq' ? 'QQ' : (s.platform === 'douyin' ? 'dy' : 'ks')}：${s.qq}</div><div class="query-item-qq">提交: ${new Date(s.submit_time).toLocaleString()}</div></div><span class="query-item-status ${s.status === 'pending' ? 'pending' : ''}">${s.status === 'pending' ? '待审核' : '已通过'}</span></div>`).join('');
                };
                refreshBackButton();
            }
            
            function showAdminPage(pushToHistory = true) {
                resetAll();
                if (pushToHistory) historyStack.push('admin');
                statusTag.textContent = '管理员系统';
                const container = document.createElement('div');
                if (currentAdminLevel !== 'guest') showAdminPanel();
                else {
                    container.innerHTML = `<div class="submit-form"><div class="form-group"><label class="form-label">管理员密码</label><input type="password" class="form-input" id="adminPassword" placeholder="请输入密码"></div><button class="submit-button" id="adminLoginBtn">登录</button><div class="submit-info" id="adminLoginInfo"></div></div>`;
                    innerDynamic.innerHTML = '';
                    innerDynamic.appendChild(container);
                    document.getElementById('adminLoginBtn').onclick = () => {
                        const pwd = document.getElementById('adminPassword').value;
                        if (pwd === 'NXLD_RX') { currentAdminLevel = 'admin'; showAdminPanel(); document.getElementById('adminLoginInfo').textContent = '登录成功（普通管理员）'; }
                        else if (pwd === 'NXLD_MZRW') { currentAdminLevel = 'super'; showAdminPanel(); document.getElementById('adminLoginInfo').textContent = '登录成功（超级管理员）'; }
                        else { document.getElementById('adminLoginInfo').textContent = '密码错误'; document.getElementById('adminLoginInfo').style.color = '#ef4444'; }
                    };
                }
                refreshBackButton();
            }
            
            function resetAll() { innerDynamic.innerHTML = ''; backContainer.innerHTML = ''; }
            function createBackButton() {
                const btn = document.createElement('div');
                btn.className = 'back-btn-modern';
                btn.innerHTML = '<i class="fas fa-arrow-left"></i> 返回';
                btn.onclick = () => {
                    historyStack.pop();
                    const v = historyStack[historyStack.length - 1];
                    if (v === 'signature') showSignaturePage(false);
                    else if (v === 'submit') showSubmitSignature(false);
                    else if (v === 'admin') showAdminPage(false);
                    else showSupernaturalInitial(false);
                    searchInput.value = '';
                    setTimeout(() => document.querySelector('.content-area').scrollTop = 0, 10);
                };
                return btn;
            }
            function refreshBackButton() { backContainer.innerHTML = ''; if (historyStack.length >= 2) backContainer.appendChild(createBackButton()); }
            function performGlobalSearch() {
                const term = searchInput.value.toLowerCase().trim();
                const cards = document.querySelectorAll('#innerDynamic .menu-card, #innerDynamic .signature-card');
                if (!term) { cards.forEach(c => { c.style.display = ''; c.classList.remove('search-highlight'); }); return; }
                let has = false;
                cards.forEach(c => {
                    const txt = c.textContent.toLowerCase();
                    if (txt.includes(term)) { c.style.display = ''; c.classList.add('search-highlight'); has = true; }
                    else c.style.display = 'none';
                });
                const tip = document.getElementById('searchNoResultTip');
                if (tip) tip.remove();
                if (!has && cards.length) {
                    const t = document.createElement('div');
                    t.id = 'searchNoResultTip';
                    t.style.cssText = 'text-align:center;color:#9ca3af;padding:2rem;';
                    t.innerHTML = `🔍 未找到"${searchInput.value}"`;
                    innerDynamic.appendChild(t);
                }
            }
            let searchTimeout;
            searchInput.oninput = () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(performGlobalSearch, 50); };
            
            function showSupernaturalInitial(pushToHistory = true) {
                resetAll();
                if (pushToHistory) historyStack.push('main');
                statusTag.textContent = 'NXLD数值库';
                const grid = document.createElement('div');
                grid.className = 'main-menu-grid';
                const items = [{ icon: 'layer-group', name: '模式数值', desc: '开发中' }, { icon: 'box', name: '局内物品', desc: '开发中' }, { icon: 'palette', name: '皮肤数值', desc: '开发中' }, { icon: 'signature', name: '主页签名', desc: '点击查看', isSignature: true }];
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = `menu-card ${item.isSignature ? 'signature' : ''}`;
                    card.innerHTML = `<div class="menu-icon"><i class="fas fa-${item.icon}"></i></div><span>${item.name}</span><small>${item.desc}</small>`;
                    if (item.isSignature) card.onclick = () => showSignaturePage();
                    else card.onclick = () => showToast('功能开发中');
                    grid.appendChild(card);
                });
                innerDynamic.appendChild(grid);
                refreshBackButton();
                setTimeout(performGlobalSearch, 10);
            }
            
            supernaturalBtn.onclick = () => { if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== 'main') { historyStack = []; showSupernaturalInitial(); searchInput.value = ''; } };
            agreementBtn.onclick = () => agreementModal.classList.add('show');
            closeAgreement.onclick = () => agreementModal.classList.remove('show');
            agreementModal.onclick = (e) => { if (e.target === agreementModal) agreementModal.classList.remove('show'); };
            thanksBtn.onclick = () => thanksModal.classList.add('show');
            closeThanks.onclick = () => thanksModal.classList.remove('show');
            thanksModal.onclick = (e) => { if (e.target === thanksModal) thanksModal.classList.remove('show'); };
            submitSignatureBtn.onclick = () => showSubmitSignature();
            adminBtn.onclick = () => { currentAdminLevel = 'guest'; showAdminPage(); searchInput.value = ''; };
            
            window.addEventListener('load', async () => {
                setCloudStatus('syncing', '连接数据库...');
                await loadFromSupabase();
                setupRealtime();
                showSupernaturalInitial();
                if (loadingSpinner) loadingSpinner.style.display = 'none';
            });
        })();
    </script>
</body>
</html>
