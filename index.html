<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NXLD数值库</title>
    <!-- 现代字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase JavaScript 库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 样式保持不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0f1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .modern-container {
            position: relative;
            z-index: 10;
            max-width: 1600px;
            width: 100%;
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            padding: 2.5rem;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .logo-text .sub {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            width: 300px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .search-box-modern {
            width: 100%;
            padding: 0.8rem 0.8rem 0.8rem 2.5rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f0f2ff;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .search-box-modern:focus {
            outline: none;
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .search-box-modern::placeholder {
            color: #6b7280;
            font-weight: 300;
            font-size: 0.85rem;
        }

        .agreement-btn, .submit-signature-btn, .admin-btn, .thanks-btn, .year-badge {
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .agreement-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .agreement-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .agreement-btn i {
            color: #818cf8;
            font-size: 0.9rem;
        }

        .submit-signature-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-signature-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        .admin-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .admin-btn i {
            color: #f59e0b;
            font-size: 0.9rem;
        }

        .thanks-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .thanks-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
            color: #a5b4fc;
        }

        .thanks-btn i {
            color: #fbbf24;
            font-size: 0.9rem;
        }

        .year-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .year-badge i {
            color: #818cf8;
            font-size: 0.8rem;
        }

        .faction-switch {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            width: fit-content;
        }

        .faction-btn {
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #9ca3af;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .faction-btn i {
            font-size: 1.1rem;
        }

        .faction-btn.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        .content-area {
            background: rgba(10, 12, 26, 0.4);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            min-height: 500px;
            max-height: 800px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4b5563 #1f2937;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }

        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }

        .status-badge {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge i {
            font-size: 0.8rem;
            color: #818cf8;
        }

        .back-btn-modern {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d5db;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .back-btn-modern:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(5px);
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -15px #000;
        }

        .menu-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
        }

        .menu-card.skin .menu-icon {
            background: linear-gradient(135deg, #b453b6, #d946ef);
        }

        .menu-card.signature .menu-icon {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .menu-card span {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e5e7eb;
        }

        .menu-card small {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .category-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(129, 140, 248, 0.3);
            transform: scale(1.02);
        }

        .category-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 1rem;
            background: rgba(129, 140, 248, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #818cf8;
            font-size: 1.2rem;
        }

        .category-card span {
            font-size: 0.95rem;
            font-weight: 500;
            color: #d1d5db;
        }

        .item-grid-modern {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.2rem;
            padding: 0.9rem 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 400;
            color: #d1d5db;
            cursor: pointer;
            transition: all 0.18s;
            min-height: 60px;
            word-break: break-word;
        }

        .item-card:hover {
            background: rgba(129, 140, 248, 0.1);
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 8px 16px -8px #4f46e5;
        }

        .value-card-modern {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.15), rgba(124, 58, 237, 0.15));
            border: 2px solid rgba(129, 140, 248, 0.4);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px -20px #4f46e5;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .value-card-modern:hover {
            background: linear-gradient(145deg, rgba(79, 70, 229, 0.25), rgba(124, 58, 237, 0.25));
            border-color: #818cf8;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(129, 140, 248, 0.4);
        }

        .value-card-modern:active {
            transform: scale(0.98);
        }

        .value-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f0f2ff;
            text-shadow: 0 0 20px rgba(129, 140, 248, 0.5);
            word-break: break-all;
            margin-bottom: 1rem;
        }

        .copy-hint-value {
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .value-card-modern:hover .copy-hint-value {
            opacity: 1;
        }

        .signature-card-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .signature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 1.2rem;
            padding: 1rem 0.8rem 0.4rem 0.8rem;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 192, 203, 0.1);
            line-height: 1.4;
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 130px;
            justify-content: space-between;
        }

        .signature-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 182, 193, 0.6);
            transform: scale(1.01);
            box-shadow: 0 0 15px rgba(255, 192, 203, 0.2);
        }

        .signature-card:active {
            transform: scale(0.99);
        }

        .signature-text {
            font-size: 0.8rem;
            font-weight: 400;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.2);
            line-height: 1.4;
            margin-bottom: 0.3rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            color: inherit;
        }

        .signature-text * {
            all: revert;
        }

        .signature-qq {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.3px;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.3rem;
            border-radius: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            width: fit-content;
            margin: 0.1rem auto 0 auto;
            transition: color 0.2s;
            line-height: 1.2;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signature-card:hover .signature-qq {
            color: rgba(255, 255, 255, 0.7);
        }

        .copy-hint {
            margin-top: 0.2rem;
            font-size: 0.5rem;
            color: #9ca3af;
            opacity: 0.4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
        }

        .signature-card:hover .copy-hint {
            opacity: 0.7;
        }

        .signature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
            position: relative;
        }

        .submit-form {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(129, 140, 248, 0.2);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: #d1d5db;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f2ff;
            font-size: 0.95rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            resize: vertical;
        }

        .form-input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        .form-textarea {
            min-height: 120px;
        }

        .submit-button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 1rem 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px #10b981;
        }

        .submit-info {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.5rem;
            background: rgba(129, 140, 248, 0.05);
            border-radius: 1rem;
        }

        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .type-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 1rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.3);
        }

        .type-option.selected {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-color: transparent;
        }

        .type-option.selected .type-icon,
        .type-option.selected .type-name {
            color: white;
        }

        .type-icon {
            font-size: 1.5rem;
            color: #818cf8;
            margin-bottom: 0.3rem;
        }

        .type-name {
            font-size: 0.9rem;
            color: #d1d5db;
        }

        .type-desc {
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 0.2rem;
        }

        .image-upload-area {
            border: 2px dashed rgba(129, 140, 248, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .image-upload-area:hover {
            border-color: #818cf8;
            background: rgba(129, 140, 248, 0.05);
        }

        .image-upload-area i {
            font-size: 2rem;
            color: #818cf8;
            margin-bottom: 0.5rem;
        }

        .image-upload-area .upload-text {
            color: #d1d5db;
            font-size: 0.9rem;
        }

        .image-upload-area .upload-hint {
            color: #9ca3af;
            font-size: 0.7rem;
            margin-top: 0.3rem;
        }

        .image-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 0.8rem;
            overflow: hidden;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-item .remove-image {
            position: absolute;
            top: 0.2rem;
            right: 0.2rem;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            cursor: pointer;
        }

        .platform-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .platform-option {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;

    <script>
        // 防调试功能
        (function() {
            // 禁用右键菜单
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            // 禁用F12、Ctrl+Shift+I、Ctrl+Shift+J、Ctrl+U等快捷键
            document.addEventListener('keydown', function(e) {
                // F12
                if (e.keyCode === 123) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+I
                if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+J
                if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+U
                if (e.ctrlKey && e.keyCode === 85) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+S
                if (e.ctrlKey && e.keyCode === 83) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+C
                if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
                    e.preventDefault();
                    return false;
                }
            });

            // 检测开发者工具打开
            let devtools = {
                open: false,
                orientation: undefined
            };

            // 方法1：检测窗口大小变化
            const threshold = 160;
            const emitEvent = (isOpen, orientation) => {
                if (devtools.open !== isOpen || devtools.orientation !== orientation) {
                    devtools.open = isOpen;
                    devtools.orientation = orientation;
                    if (isOpen) {
                        // 开发者工具打开时，清空控制台并显示警告
                        console.clear();
                        console.log('%c⚠️ 检测到开发者工具打开，请尊重作者劳动成果！', 'color: #ff0000; font-size: 16px; font-weight: bold;');
                        console.log('%c本网站代码受保护，请勿恶意篡改', 'color: #ff9900; font-size: 14px;');
                        
                        // 可选：重定向或刷新页面
                        // window.location.reload();
                    }
                }
            };

            setInterval(() => {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                const orientation = widthThreshold ? 'vertical' : 'heightThreshold' ? 'horizontal' : 'undefined';

                if (!devtools.open && (widthThreshold || heightThreshold)) {
                    emitEvent(true, orientation);
                } else if (devtools.open && !(widthThreshold || heightThreshold)) {
                    emitEvent(false, orientation);
                }
            }, 500);

            // 方法2：使用debugger检测
            setInterval(function() {
                const start = performance.now();
                debugger;
                const end = performance.now();
                if (end - start > 100) {
                    // 检测到调试器
                    console.clear();
                    console.log('%c⚠️ 检测到调试模式，请关闭开发者工具', 'color: #ff0000; font-size: 16px; font-weight: bold;');
                    
                    // 可选：重定向
                    // window.location.href = 'about:blank';
                }
            }, 1000);
        })();
    </script>
